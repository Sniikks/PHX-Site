<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Mot Caché</title>
<meta name="description" content="Devine le nom du jeu vidéo caché en 6 essais, façon Wordle.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0e14; --bg2:#12141d; --bg3:#181a25;
    --gold:#00f0ff; --gold2:#00c4cc; --gold-dim:#0097a7;
    --text:#f0f1f5; --text2:#939ab0;
    --border:#2a2d3a;
    --good:#5fbf86; --bad:#e2685f; --warn:#e0b84a;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { min-height:100%; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(0,240,255,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:1.6rem 1.2rem 3rem;
    padding-left:max(1.2rem, env(safe-area-inset-left));
    padding-right:max(1.2rem, env(safe-area-inset-right));
  }

  .menu-btn {
    align-self:flex-start;
    display:inline-flex; align-items:center; gap:6px;
    padding:9px 16px;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:3px;
    color:#e5e5e5;
    font-family:'Exo 2',sans-serif; font-size:12.5px; font-weight:600; letter-spacing:.02em;
    text-decoration:none; white-space:nowrap;
    margin-bottom:1rem;
    cursor:pointer; transition:all .15s ease;
  }
  .menu-btn:hover { background:rgba(255,255,255,.09); border-color:rgba(255,255,255,.24); color:#fff; }

  .title {
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(1.3rem,4vw,1.9rem);
    font-weight:700;
    letter-spacing:.1em;
    color:var(--gold);
    text-transform:uppercase;
  }
  .subtitle { color:var(--text2); font-size:12.5px; margin-top:.35rem; margin-bottom:1.4rem; letter-spacing:.03em; text-align:center; }

  #loading { color:var(--text2); font-size:13px; margin-top:2rem; }

  #game { display:none; flex-direction:column; align-items:center; width:100%; max-width:480px; }

  .grid {
    display:flex; flex-direction:column; gap:6px;
    margin-bottom:1.4rem;
  }
  .row { display:flex; gap:6px; justify-content:center; }
  .cell {
    width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg2); border:2px solid var(--border);
    border-radius:6px;
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.25rem;
    text-transform:uppercase; color:var(--text);
    transition:transform .15s ease;
  }
  .cell.filled { border-color:var(--text2); }
  .cell.pop { animation:pop .12s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
  .cell.flip { animation:flip .5s ease forwards; }
  @keyframes flip {
    0% { transform:rotateX(0deg); }
    50% { transform:rotateX(90deg); }
    51% { }
    100% { transform:rotateX(0deg); }
  }
  .cell.correct { background:var(--good); border-color:var(--good); color:#08130c; }
  .cell.present { background:var(--warn); border-color:var(--warn); color:#1a1206; }
  .cell.absent  { background:var(--bg3); border-color:var(--bg3); color:var(--text2); }

  .keyboard { display:flex; flex-direction:column; gap:7px; width:100%; max-width:460px; }
  .kb-row { display:flex; gap:5px; justify-content:center; }
  .key {
    flex:1; max-width:38px; height:48px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg3); border:none; border-radius:6px;
    color:var(--text); font-family:'Exo 2',sans-serif; font-weight:700; font-size:.82rem;
    text-transform:uppercase; cursor:pointer; user-select:none;
    transition:background .15s ease, transform .1s ease;
  }
  .key:active { transform:scale(.92); }
  .key.wide { max-width:64px; font-size:.68rem; }
  .key.correct { background:var(--good); color:#08130c; }
  .key.present { background:var(--warn); color:#1a1206; }
  .key.absent  { background:#232634; color:var(--text2); }
  .key:hover:not(.correct):not(.present):not(.absent) { background:#232634; }

  .msg-banner {
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    padding:.55rem 1.1rem; font-size:13px; font-weight:600; color:var(--text);
    z-index:800; opacity:0; pointer-events:none; transition:opacity .2s ease, top .2s ease;
    box-shadow:0 10px 26px rgba(0,0,0,.4);
  }
  .msg-banner.show { opacity:1; top:22px; }

  .result-modal {
    position:fixed; inset:0; background:rgba(0,0,0,.72);
    display:none; align-items:center; justify-content:center; z-index:900; padding:1.2rem;
  }
  .result-modal.open { display:flex; }
  .result-box {
    background:var(--bg2); border:1px solid var(--border); border-radius:16px;
    padding:1.8rem; max-width:360px; width:100%; text-align:center;
  }
  .result-box img { width:100%; border-radius:10px; margin-bottom:1rem; border:1px solid var(--border); }
  .result-title { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.3rem; letter-spacing:.06em; margin-bottom:.3rem; }
  .result-title.win { color:var(--good); }
  .result-title.lose { color:var(--bad); }
  .result-name { color:var(--gold); font-weight:700; font-size:1.15rem; margin-bottom:.9rem; }
  .result-stats { display:flex; justify-content:center; gap:1.6rem; margin-bottom:1.1rem; }
  .stat-num { font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700; color:var(--text); }
  .stat-label { font-size:10px; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; }
  .result-actions { display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap; }
  .btn-io {
    padding:.6rem 1.1rem; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .btn-io:hover { border-color:var(--gold-dim); color:var(--gold); }
  .btn-io.primary { background:var(--gold-dim); color:#04262a; border-color:var(--gold-dim); }

  .solvers { margin-top:.9rem; font-size:11.5px; color:var(--text2); max-width:300px; }
  .solvers b { color:var(--text); }

  @media (max-width:420px) {
    .cell { width:38px; height:38px; font-size:1.1rem; }
    .key { height:44px; }
  }
</style>
<link rel="stylesheet" href="cyber-theme.css">
</head>
<body>

<a class="menu-btn" href="index.html">☰ Menu</a>
<div class="title">🔤 Mot Caché</div>
<div class="subtitle" id="subtitle">Devine le jeu vidéo du jour en 6 essais</div>

<div id="loading">Chargement du pool de jeux…</div>

<div id="game">
  <div class="grid" id="grid"></div>
  <div class="keyboard" id="keyboard"></div>
</div>

<div class="msg-banner" id="banner"></div>

<div class="result-modal" id="resultModal">
  <div class="result-box">
    <img id="resultImg" src="" alt="">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-stats">
      <div><div class="stat-num" id="statStreak">0</div><div class="stat-label">Série</div></div>
      <div><div class="stat-num" id="statMax">0</div><div class="stat-label">Record</div></div>
      <div><div class="stat-num" id="statPlayed">0</div><div class="stat-label">Joués</div></div>
    </div>
    <div class="solvers" id="solversList"></div>
    <div class="result-actions">
      <button class="btn-io primary" id="closeResultBtn">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="nav.js"></script>
<script>
(function () {
  const LAUNCH_DATE = '2026-01-01';

  function normalize(str) {
    return String(str || '')
      .toUpperCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^A-Z]/g, '');
  }

  function getParisDateString(offsetDays = 0) {
    const now = new Date(Date.now() + offsetDays * 86400000);
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone:'Europe/Paris', year:'numeric', month:'2-digit', day:'2-digit' }).formatToParts(now);
    const get = t => parts.find(p => p.type === t).value;
    return `${get('year')}-${get('month')}-${get('day')}`;
  }
  function dayIndex(dateStr) {
    const d1 = new Date(`${LAUNCH_DATE}T00:00:00Z`);
    const d2 = new Date(`${dateStr}T00:00:00Z`);
    return Math.max(0, Math.round((d2 - d1) / 86400000));
  }

  // ── Construit le pool de mots à partir de bracket_games.json :
  // on ne garde que les jeux dont le nom est un seul mot de 5 à 9 lettres,
  // pour rester fidèle à l'esprit "Portal / Skyrim / Halo / Celeste".
  async function buildPool() {
    const res = await fetch('bracket_games.json');
    const games = await res.json();
    const seen = new Set();
    const pool = [];
    games.forEach(g => {
      const name = (g.name || '').trim();
      if (!name || name.includes(' ')) return;
      const core = name.split(/[:\-]/)[0].trim();
      if (core.includes(' ')) return;
      const clean = normalize(core);
      if (clean.length < 5 || clean.length > 9) return;
      if (seen.has(clean)) return;
      seen.add(clean);
      pool.push({ word: clean, name, src: g.src });
    });
    pool.sort((a, b) => a.word.localeCompare(b.word)); // ordre stable dans le temps
    return pool;
  }

  const ROWS_LABELS = [
    ['A','Z','E','R','T','Y','U','I','O','P'],
    ['Q','S','D','F','G','H','J','K','L','M'],
    ['ENTER','W','X','C','V','B','N','←']
  ];

  let target = null;     // { word, name, src }
  let maxTries = 6;
  let wordLen = 5;
  let curRow = 0;
  let curGuess = '';
  let finished = false;
  let letterStates = {}; // letter -> 'correct'|'present'|'absent'
  let pseudo = null;
  const todayKey = getParisDateString();
  const statsKey = 'motcache_stats';

  function loadStats() {
    try { return JSON.parse(localStorage.getItem(statsKey)) || { played:0, wins:0, streak:0, maxStreak:0, lastWinDate:null }; }
    catch (e) { return { played:0, wins:0, streak:0, maxStreak:0, lastWinDate:null }; }
  }
  function saveStats(s) { localStorage.setItem(statsKey, JSON.stringify(s)); }

  function showBanner(text, ms = 1500) {
    const b = document.getElementById('banner');
    b.textContent = text;
    b.classList.add('show');
    clearTimeout(showBanner._t);
    showBanner._t = setTimeout(() => b.classList.remove('show'), ms);
  }

  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let r = 0; r < maxTries; r++) {
      const row = document.createElement('div');
      row.className = 'row';
      row.id = 'row-' + r;
      for (let c = 0; c < wordLen; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.id = `cell-${r}-${c}`;
        row.appendChild(cell);
      }
      grid.appendChild(row);
    }
  }

  function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    ROWS_LABELS.forEach(rowKeys => {
      const row = document.createElement('div');
      row.className = 'kb-row';
      rowKeys.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k.length > 1 ? ' wide' : '');
        btn.textContent = k === '←' ? '⌫' : k;
        btn.dataset.key = k;
        btn.addEventListener('click', () => handleKey(k));
        row.appendChild(btn);
      });
      kb.appendChild(row);
    });
  }

  function refreshKeyboardColors() {
    document.querySelectorAll('.key').forEach(btn => {
      const k = btn.dataset.key;
      btn.classList.remove('correct', 'present', 'absent');
      if (letterStates[k]) btn.classList.add(letterStates[k]);
    });
  }

  function handleKey(k) {
    if (finished) return;
    if (k === 'ENTER') { submitGuess(); return; }
    if (k === '←') {
      curGuess = curGuess.slice(0, -1);
      renderCurrentRow();
      return;
    }
    if (/^[A-Z]$/.test(k) && curGuess.length < wordLen) {
      curGuess += k;
      renderCurrentRow(true);
    }
  }

  function renderCurrentRow(pop) {
    for (let c = 0; c < wordLen; c++) {
      const cell = document.getElementById(`cell-${curRow}-${c}`);
      const letter = curGuess[c] || '';
      cell.textContent = letter;
      cell.classList.toggle('filled', !!letter);
      if (pop && c === curGuess.length - 1) {
        cell.classList.remove('pop'); void cell.offsetWidth; cell.classList.add('pop');
      }
    }
  }

  function submitGuess() {
    if (curGuess.length !== wordLen) { showBanner('Pas assez de lettres'); shakeRow(); return; }

    const guess = curGuess;
    const answer = target.word;
    const result = new Array(wordLen).fill('absent');
    const answerLetters = answer.split('');
    const used = new Array(wordLen).fill(false);

    for (let i = 0; i < wordLen; i++) {
      if (guess[i] === answerLetters[i]) { result[i] = 'correct'; used[i] = true; }
    }
    for (let i = 0; i < wordLen; i++) {
      if (result[i] === 'correct') continue;
      const idx = answerLetters.findIndex((l, j) => l === guess[i] && !used[j]);
      if (idx !== -1) { result[i] = 'present'; used[idx] = true; }
    }

    for (let c = 0; c < wordLen; c++) {
      const cell = document.getElementById(`cell-${curRow}-${c}`);
      setTimeout(() => {
        cell.classList.add('flip');
        cell.classList.add(result[c]);
        const letter = guess[c];
        const rank = { absent:0, present:1, correct:2 };
        if (!letterStates[letter] || rank[result[c]] > rank[letterStates[letter]]) {
          letterStates[letter] = result[c];
        }
      }, c * 90);
    }

    setTimeout(() => {
      refreshKeyboardColors();
      if (guess === answer) {
        endGame(true);
      } else if (curRow === maxTries - 1) {
        endGame(false);
      } else {
        curRow++; curGuess = '';
      }
    }, wordLen * 90 + 200);
  }

  function shakeRow() {
    const row = document.getElementById('row-' + curRow);
    row.style.transform = 'translateX(-6px)';
    setTimeout(() => { row.style.transform = 'translateX(6px)'; }, 60);
    setTimeout(() => { row.style.transform = ''; }, 120);
  }

  function ensurePseudo() {
    pseudo = localStorage.getItem('phx_pseudo');
    if (!pseudo) {
      pseudo = (prompt('Ton pseudo (pour le classement du jour, optionnel) :', '') || '').trim().slice(0, 24) || null;
      if (pseudo) localStorage.setItem('phx_pseudo', pseudo);
    }
    return pseudo;
  }

  async function endGame(won) {
    finished = true;
    const s = loadStats();
    s.played++;
    if (won) {
      s.wins++;
      if (s.lastWinDate !== todayKey) {
        s.streak = (s.lastWinDate === yesterdayKey()) ? s.streak + 1 : 1;
      }
      s.lastWinDate = todayKey;
    } else {
      s.streak = 0;
    }
    s.maxStreak = Math.max(s.maxStreak || 0, s.streak);
    saveStats(s);

    document.getElementById('resultImg').src = target.src || '';
    document.getElementById('resultTitle').textContent = won ? '🎉 Gagné !' : '💀 Perdu';
    document.getElementById('resultTitle').className = 'result-title ' + (won ? 'win' : 'lose');
    document.getElementById('resultName').textContent = target.name;
    document.getElementById('statStreak').textContent = s.streak;
    document.getElementById('statMax').textContent = s.maxStreak;
    document.getElementById('statPlayed').textContent = s.played;
    document.getElementById('resultModal').classList.add('open');

    // Partage optionnel du résultat du jour avec les potes (clé partagée Supabase)
    try {
      const key = 'motcache_' + todayKey;
      await RemoteStore.init([key]);
      const list = RemoteStore.get(key, []) || [];
      const name = ensurePseudo();
      if (name && !list.some(e => e.pseudo === name)) {
        list.push({ pseudo: name, tries: curRow + 1, won });
        RemoteStore.set(key, list);
      }
      renderSolvers(list, name);
    } catch (e) { /* pas grave si hors-ligne */ }
  }

  function renderSolvers(list, me) {
    const el = document.getElementById('solversList');
    if (!list || !list.length) { el.textContent = ''; return; }
    el.innerHTML = '<b>Aujourd\'hui :</b> ' + list.map(e =>
      `${e.pseudo}${e.pseudo === me ? ' (toi)' : ''} — ${e.won ? e.tries + '/' + maxTries : '❌'}`
    ).join(' · ');
  }

  document.getElementById('closeResultBtn').addEventListener('click', () => {
    document.getElementById('resultModal').classList.remove('open');
  });

  function yesterdayKey() { return getParisDateString(-1); }

  document.addEventListener('keydown', e => {
    if (finished) return;
    if (document.getElementById('resultModal').classList.contains('open')) return;
    if (e.key === 'Enter') handleKey('ENTER');
    else if (e.key === 'Backspace') handleKey('←');
    else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
  });

  async function init() {
    RemoteStore.init([]);
    const pool = await buildPool();
    if (!pool.length) {
      document.getElementById('loading').textContent = "Aucun jeu exploitable trouvé dans bracket_games.json.";
      return;
    }
    const idx = dayIndex(todayKey) % pool.length;
    target = pool[idx];
    wordLen = target.word.length;
    maxTries = Math.min(8, wordLen + 1);

    document.getElementById('subtitle').textContent = `Jeu #${dayIndex(todayKey) + 1} du jour · ${wordLen} lettres · ${maxTries} essais`;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    buildGrid();
    buildKeyboard();

    // Si déjà joué aujourd'hui (stat locale + clé du jour), on pourrait bloquer une 2e partie ;
    // ici on laisse rejouer librement en local (pas de triche possible entre potes de toute façon,
    // chacun a son propre navigateur), on affiche juste les scores partagés au clic sur Entrée du 1er coup.
  }

  init();
})();
</script>
</body>
</html>
