<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZoomJeu - PHX</title>
<link rel="shortcut icon" href="https://cdn.discordapp.com/icons/1030553621252821053/2e7356a5d822245ad7953afdb143581a.webp?size=160&quality=lossless">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap');

  :root {
    --bg:#0a0a0c; --bg2:#111114; --bg3:#161619;
    --gold:#e8b84b; --gold2:#c49a30; --gold-dim:#9c7d33;
    --text:#ededf0; --text2:#8c8c94;
    --border:#232327;
    --good:#5fbf86; --bad:#e2685f;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(232,184,75,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Manrope',sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:1.6rem 1.2rem 3rem;
  }

  a.back {
    align-self:flex-start;
    color:var(--text2);
    text-decoration:none;
    font-size:12px;
    letter-spacing:.05em;
    margin-bottom:1rem;
  }
  a.back:hover { color:var(--gold); }

  .title {
    font-family:'Sora',sans-serif;
    font-size:clamp(1.3rem,4vw,1.9rem);
    font-weight:700;
    letter-spacing:.1em;
    color:var(--gold);
    text-transform:uppercase;
  }
  .subtitle { color:var(--text2); font-size:12.5px; margin-top:.35rem; margin-bottom:1rem; letter-spacing:.03em; text-align:center; }

  .date-nav {
    display:flex; align-items:center; justify-content:center; gap:.4rem;
    margin-bottom:1.2rem;
  }
  .date-nav button {
    width:34px; height:34px; padding:0;
    display:flex; align-items:center; justify-content:center;
    border-radius:9px; border:1px solid var(--border); background:var(--bg2); color:var(--text2);
    font-size:.85rem; cursor:pointer;
  }
  .date-nav button:hover:not(:disabled) { border-color:var(--gold-dim); color:var(--gold); }
  .date-nav button:disabled { opacity:.3; cursor:default; }
  .date-nav .date-label {
    font-family:'Sora',sans-serif; font-weight:600; font-size:.85rem; color:var(--text);
    min-width:190px; text-align:center; letter-spacing:.02em;
  }
  .archive-toggle {
    width:auto !important; padding:0 .8rem !important; gap:.35rem; display:flex; align-items:center;
    font-family:'Sora',sans-serif; font-size:.72rem !important; font-weight:600; letter-spacing:.03em;
  }

  .card {
    width:100%; max-width:920px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:18px;
    padding:1.3rem;
  }

  .game-layout { display:flex; gap:1.3rem; align-items:flex-start; }
  .game-left { flex:1 1 auto; min-width:0; }
  .game-right { flex:0 0 260px; display:flex; flex-direction:column; gap:.55rem; }

  .zoom-frame {
    width:100%;
    aspect-ratio:16/10;
    border-radius:14px;
    overflow:hidden;
    background-color:#000;
    position:relative;
    border:1px solid var(--border);
  }
  .zoom-frame img {
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transition:transform .65s cubic-bezier(.22,.85,.3,1);
    will-change:transform;
  }

  .attempts-tabs {
    display:flex; margin-top:.7rem; border-radius:10px; overflow:hidden;
    border:1px solid var(--border);
  }
  .attempt-tab {
    flex:1; padding:.65rem 0; text-align:center;
    background:var(--bg3); color:var(--text2);
    font-family:'Sora',sans-serif; font-weight:600; font-size:.82rem;
    border-right:1px solid var(--border);
  }
  .attempt-tab:last-child { border-right:none; }
  .attempt-tab.active { background:var(--bg2); color:var(--gold); box-shadow:inset 0 -2px 0 var(--gold); }
  .attempt-tab.correct { background:rgba(95,191,134,.15); color:var(--good); }
  .attempt-tab.wrong { background:rgba(226,104,95,.15); color:var(--bad); }
  .attempt-tab.skipped { background:rgba(156,125,51,.15); color:var(--gold-dim); }

  .guess-list { margin-top:.7rem; display:flex; flex-direction:column; gap:.4rem; }
  .guess-item {
    font-size:.82rem; padding:.5rem .7rem; border-radius:9px;
    background:var(--bg3); border:1px solid var(--border); color:var(--text2);
  }
  .guess-item.wrong { color:var(--bad); border-color:rgba(226,104,95,.3); }
  .guess-item.skipped { color:var(--gold-dim); border-color:rgba(156,125,51,.3); font-style:italic; }

  form.guess-form { position:relative; }
  .input-wrap { position:relative; }
  input#guessInput {
    width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:.75rem 2.2rem .75rem .9rem; font-family:'Manrope',sans-serif; font-size:.9rem;
    outline:none;
  }
  input#guessInput:focus { border-color:var(--gold-dim); }
  .input-clear {
    position:absolute; right:.5rem; top:50%; transform:translateY(-50%);
    width:22px; height:22px; border-radius:6px; border:none; background:var(--bg2); color:var(--text2);
    display:none; align-items:center; justify-content:center; font-size:.7rem; padding:0; cursor:pointer;
  }
  .input-clear.visible { display:flex; }
  .input-clear:hover { background:var(--border); color:var(--text); }
  button {
    font-family:'Sora',sans-serif; font-weight:600; font-size:.8rem; letter-spacing:.04em;
    border-radius:10px; border:1px solid var(--gold-dim); background:transparent; color:var(--gold);
    padding:.75rem 1.1rem; cursor:pointer; transition:background .2s ease, color .2s ease;
    white-space:nowrap;
  }
  button:hover:not(:disabled) { background:var(--gold); color:#151510; }
  button:disabled { opacity:.35; cursor:default; }
  button.ghost { border-color:var(--border); color:var(--text2); }
  button.ghost:hover:not(:disabled) { background:var(--bg3); color:var(--text); }
  button.wide { width:100%; }
  button.small-link {
    border:none; background:none; color:var(--text2); font-size:.72rem; padding:.3rem; text-decoration:underline;
  }
  button.small-link:hover { color:var(--bad); background:none; }

  .suggestions {
    position:absolute; top:calc(100% + 6px); left:0; right:0;
    background:var(--bg3); border:1px solid var(--border); border-radius:10px;
    overflow-y:auto; max-height:280px; z-index:10;
    box-shadow:0 14px 30px rgba(0,0,0,.55);
  }
  .suggestion-item {
    padding:.6rem .8rem; font-size:.85rem; color:var(--text); cursor:pointer;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:.5rem;
  }
  .suggestion-item .sugg-year { color:var(--text2); font-size:.72rem; flex-shrink:0; }
  .suggestion-item:last-child { border-bottom:none; }
  .suggestion-item:hover, .suggestion-item.active { background:rgba(232,184,75,.1); color:var(--gold); }
  .suggestion-item.top-match {
    background:rgba(232,184,75,.14); font-weight:700;
  }
  .suggestion-item.top-match .sugg-badge {
    font-family:'Sora',sans-serif; font-size:.65rem; font-weight:700; letter-spacing:.04em;
    color:#151510; background:var(--gold); border-radius:6px; padding:2px 7px; flex-shrink:0;
  }

  .result-box {
    padding:1rem; border-radius:12px;
    background:var(--bg3); border:1px solid var(--border);
    text-align:center;
  }
  .result-box .answer {
    font-family:'Sora',sans-serif; font-weight:700; font-size:1.05rem; color:var(--gold); margin-bottom:.3rem;
  }
  .result-box .verdict { font-size:.85rem; color:var(--text2); }
  .result-box.win .verdict { color:var(--good); }
  .result-box.lose .verdict { color:var(--bad); }

  .state-msg { color:var(--text2); font-size:.85rem; text-align:center; margin-top:2rem; }

  .archive-header {
    display:flex; flex-direction:column; align-items:center; gap:.6rem; margin-bottom:1rem;
  }
  .archive-header .archive-nav-row { display:flex; align-items:center; justify-content:center; gap:.5rem; }
  .archive-header .archive-month-label {
    font-family:'Sora',sans-serif; font-weight:700; font-size:1rem; color:var(--gold);
    min-width:180px; text-align:center; text-transform:capitalize;
  }
  .names-toggle {
    display:flex; align-items:center; gap:.4rem; font-size:.75rem; color:var(--text2); cursor:pointer; user-select:none;
  }
  .names-toggle input { accent-color:var(--gold); cursor:pointer; }
  .archive-grid {
    display:grid; grid-template-columns:repeat(7, 1fr); gap:.5rem;
  }
  .archive-weekday {
    text-align:center; font-size:10.5px; color:var(--text2); letter-spacing:.06em; padding-bottom:.2rem;
  }
  .archive-cell {
    aspect-ratio:1/1; border-radius:10px; overflow:hidden; position:relative;
    background:var(--bg3); border:2px solid var(--border);
    cursor:pointer;
  }
  .archive-cell.empty { visibility:hidden; cursor:default; }
  .archive-cell.disabled { opacity:.25; cursor:default; pointer-events:none; border-color:var(--border); }
  .archive-cell.status-green { border-color:var(--good); }
  .archive-cell.status-red { border-color:var(--bad); }
  .archive-cell.status-yellow { border-color:var(--gold); }
  .archive-cell img.cell-img {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  .archive-cell::after {
    content:''; position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.75), transparent 50%);
    z-index:1;
  }
  .archive-cell .cell-day {
    position:absolute; top:.3rem; left:.35rem; font-family:'Sora',sans-serif; font-size:.68rem; font-weight:700;
    color:#151510; background:var(--text2); padding:1px 5px; border-radius:5px; z-index:2;
  }
  .archive-cell.status-green .cell-day { background:var(--good); }
  .archive-cell.status-red .cell-day { background:var(--bad); }
  .archive-cell.status-yellow .cell-day { background:var(--gold); }
  .cell-mini-guesses {
    position:absolute; top:.35rem; right:.35rem; display:flex; gap:2px; z-index:2;
  }
  .cell-mini-guesses span { width:6px; height:6px; border-radius:1.5px; background:rgba(255,255,255,.25); }
  .cell-mini-guesses span.correct { background:var(--good); }
  .cell-mini-guesses span.wrong { background:var(--bad); }
  .cell-mini-guesses span.skipped { background:var(--gold-dim); }
  .archive-cell .cell-name {
    position:absolute; bottom:.35rem; left:.35rem; right:.35rem; z-index:2;
    font-size:9.5px; color:var(--text); font-weight:600; line-height:1.15;
    overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .archive-grid.hide-names .cell-name { display:none; }
  .archive-cell:hover:not(.disabled) { filter:brightness(1.15); }

  footer { margin-top:2rem; font-size:11px; color:var(--gold-dim); letter-spacing:.1em; }
  #dbStatus.db-ok { color:#5fbf86; }
  #dbStatus.db-error { color:#e2685f; }

  @media (max-width:760px) {
    .game-layout { flex-direction:column; }
    .game-right { flex:1 1 auto; width:100%; }
  }
  @media (max-width:640px) {
    body { padding:1.2rem .8rem 2.4rem; }
    .card { padding:1rem; }
    .date-nav .date-label { min-width:120px; font-size:.72rem; }
    .archive-cell .cell-name { display:none; }
  }
</style>
</head>
<body>

  <a class="back" href="index.html">← Retour</a>
  <div class="title">ZoomJeu</div>
  <div class="subtitle" id="subtitleEl">Devine le jeu à partir d'un screenshot zoomé.</div>

  <div class="date-nav" id="dateNavEl">
    <button id="navFirst" title="Premier puzzle">⏮</button>
    <button id="navPrev" title="Jour précédent">◀</button>
    <div class="date-label" id="dateLabel">—</div>
    <button id="navNext" title="Jour suivant">▶</button>
    <button id="navLast" title="Aujourd'hui">⏭</button>
    <button id="archiveToggle" class="archive-toggle" title="Archives">🗓 Archives</button>
  </div>

  <div class="card" id="cardEl">
    <div class="state-msg" id="loadingMsg">Chargement du puzzle…</div>
  </div>

  <footer>PHX © 2026 <span id="dbStatus" style="margin-left:.6rem;"></span></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
  // ==========================================================
  // ZoomJeu — logique client
  // Une seule ligne Supabase par jour (app_data.id = "zoomjeu_YYYY-MM-DD"),
  // qui contient à la fois les infos du puzzle et la session partagée
  // (data.session = { guesses, solved, gaveUp }).
  // ==========================================================

  const MAX_ATTEMPTS = 5;
  const ZOOM_LEVELS = [6.5, 4, 2.5, 1.5, 1]; // facteur de scale() CSS, essai 1 -> 5
  const ARCHIVE_PEEK_ZOOM = 3.5; // zoom utilisé pour l'aperçu d'un puzzle pas encore terminé, dans l'archive
  const LAUNCH_DATE = '2026-07-06';
  const WEEKDAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

  // ── Utils de comparaison texte (identiques au bot Discord "369") ──
  function normalize(str) {
    return str
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[™®©]/g, '')
      .replace(/[^a-z0-9\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }
  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    if (m === 0) return n;
    if (n === 0) return m;
    const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) {
        dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
      }
    }
    return dp[m][n];
  }
  function getVariants(name) {
    const cleanName = name.replace(/\s*\(\d{4}\)\s*$/, '');
    const base = normalize(cleanName);
    const parts = cleanName.split(/[:\-]/).map(p => normalize(p)).filter(p => p.length >= 3);
    return [...new Set([base, ...parts])];
  }
  function tokensMatch(a, b) {
    if (a === b) return true;
    if (/\d/.test(a) || /\d/.test(b)) return false;
    if (a.length <= 3 || b.length <= 3) return false;
    const maxLen = Math.max(a.length, b.length);
    const threshold = maxLen <= 6 ? 1 : 2;
    return levenshtein(a, b) <= threshold;
  }
  function tokenWindowMatch(guessTokens, targetTokens) {
    const gLen = guessTokens.length;
    if (gLen === 0 || gLen > targetTokens.length) return false;
    for (let start = 0; start + gLen <= targetTokens.length; start++) {
      let ok = true;
      for (let k = 0; k < gLen; k++) {
        if (!tokensMatch(guessTokens[k], targetTokens[start + k])) { ok = false; break; }
      }
      if (ok) return true;
    }
    return false;
  }
  function isCorrectGuess(guessRaw, gameName) {
    const guess = normalize(guessRaw);
    if (guess.length < 2) return false;
    const guessTokens = guess.split(' ').filter(Boolean);
    for (const variant of getVariants(gameName)) {
      if (guess === variant) return true;
      const variantTokens = variant.split(' ').filter(Boolean);
      if (tokenWindowMatch(guessTokens, variantTokens)) return true;
    }
    return false;
  }

  // ── Dates ──
  function parisDateString(offset = 0) {
    const now = new Date(Date.now() + offset * 86400000);
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Paris', year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(now);
    const get = t => parts.find(p => p.type === t).value;
    return `${get('year')}-${get('month')}-${get('day')}`;
  }
  function puzzleNumber(dateStr) {
    const d1 = new Date(`${LAUNCH_DATE}T00:00:00Z`);
    const d2 = new Date(`${dateStr}T00:00:00Z`);
    return Math.max(1, Math.round((d2 - d1) / 86400000) + 1);
  }
  function addDays(dateStr, n) {
    const d = new Date(`${dateStr}T00:00:00Z`);
    d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }
  function formatDateFr(dateStr) {
    const d = new Date(`${dateStr}T00:00:00Z`);
    return new Intl.DateTimeFormat('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', timeZone: 'UTC' }).format(d);
  }

  // ── État global ──
  const todayStr = parisDateString();
  const urlParams = new URLSearchParams(location.search);
  let viewingDate = urlParams.get('date') || todayStr;
  if (viewingDate > todayStr) viewingDate = todayStr;

  let mode = 'play'; // 'play' | 'archive'
  let archiveYear = parseInt(viewingDate.slice(0, 4), 10);
  let archiveMonth = parseInt(viewingDate.slice(5, 7), 10);

  let puzzle = null; // objet complet { ...infos puzzle, session:{guesses,solved,gaveUp} }
  let state = { guesses: [], solved: false, gaveUp: false }; // alias pratique vers puzzle.session
  let realtimeChannel = null;
  let suggestTimer = null;
  let currentSuggestions = [];

  function isValidPuzzle(p) {
    return !!(p && p.answer && p.image && p.focus && typeof p.focus.x === 'number');
  }

  function cacheKey(d) { return 'zoomjeu_cache_' + d; }
  function loadLocalCache(d) {
    try { const raw = localStorage.getItem(cacheKey(d)); if (raw) return JSON.parse(raw); } catch (e) {}
    return null;
  }
  function saveLocalCache(d, p) {
    try { localStorage.setItem(cacheKey(d), JSON.stringify(p)); } catch (e) {}
  }

  // ── Navigation par date ──
  function updateNavUI() {
    document.getElementById('dateNavEl').style.display = mode === 'play' ? 'flex' : 'none';
    if (mode !== 'play') return;
    document.getElementById('dateLabel').textContent = formatDateFr(viewingDate) + ` · #${puzzleNumber(viewingDate)}`;
    document.getElementById('navFirst').disabled = viewingDate <= LAUNCH_DATE;
    document.getElementById('navPrev').disabled = viewingDate <= LAUNCH_DATE;
    document.getElementById('navNext').disabled = viewingDate >= todayStr;
    document.getElementById('navLast').disabled = viewingDate >= todayStr;
  }
  function goToDate(d) {
    if (d < LAUNCH_DATE) d = LAUNCH_DATE;
    if (d > todayStr) d = todayStr;
    viewingDate = d;
    mode = 'play';
    const params = new URLSearchParams(location.search);
    params.set('date', viewingDate);
    history.replaceState(null, '', location.pathname + '?' + params.toString());
    loadPuzzle();
  }
  document.getElementById('navFirst').addEventListener('click', () => goToDate(LAUNCH_DATE));
  document.getElementById('navPrev').addEventListener('click', () => goToDate(addDays(viewingDate, -1)));
  document.getElementById('navNext').addEventListener('click', () => goToDate(addDays(viewingDate, 1)));
  document.getElementById('navLast').addEventListener('click', () => goToDate(todayStr));
  document.getElementById('archiveToggle').addEventListener('click', () => {
    mode = 'archive';
    archiveYear = parseInt(viewingDate.slice(0, 4), 10);
    archiveMonth = parseInt(viewingDate.slice(5, 7), 10);
    updateNavUI();
    renderArchive();
  });

  // ── Chargement du puzzle (+ session intégrée) depuis Supabase ──
  async function loadPuzzle() {
    updateNavUI();
    document.getElementById('cardEl').innerHTML = '<div class="state-msg">Chargement du puzzle…</div>';
    if (realtimeChannel) { supabaseClient.removeChannel(realtimeChannel); realtimeChannel = null; }

    // Cache local pour un affichage instantané, écrasé dès que Supabase répond
    const cached = loadLocalCache(viewingDate);
    if (isValidPuzzle(cached)) {
      puzzle = cached;
      state = puzzle.session || { guesses: [], solved: false, gaveUp: false };
      renderGame();
    }

    const { data: row, error } = await supabaseClient.from('app_data').select('data').eq('id', 'zoomjeu_' + viewingDate).maybeSingle();
    setDbStatus(error);

    if (!isValidPuzzle(row?.data)) {
      puzzle = null;
      document.getElementById('cardEl').innerHTML = `<div class="state-msg">Aucun puzzle pour cette date.${viewingDate === todayStr ? '<br>Reviens un peu plus tard 🙂' : ''}</div>`;
      return;
    }

    puzzle = row.data;
    state = puzzle.session || { guesses: [], solved: false, gaveUp: false };
    puzzle.session = state;
    saveLocalCache(viewingDate, puzzle);
    renderGame();
    subscribeRealtime();
  }

  function setDbStatus(error) {
    const dbEl = document.getElementById('dbStatus');
    if (error) { dbEl.textContent = '● Base de données non configurée'; dbEl.className = 'db-error'; }
    else { dbEl.textContent = '● Connecté à Supabase'; dbEl.className = 'db-ok'; }
  }

  function subscribeRealtime() {
    realtimeChannel = supabaseClient
      .channel('zoomjeu_' + viewingDate)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'app_data', filter: `id=eq.zoomjeu_${viewingDate}` }, payload => {
        if (isValidPuzzle(payload.new?.data)) {
          puzzle = payload.new.data;
          state = puzzle.session || { guesses: [], solved: false, gaveUp: false };
          saveLocalCache(viewingDate, puzzle);
          renderGame();
        }
      })
      .subscribe();
  }

  async function saveSession() {
    puzzle.session = state;
    saveLocalCache(viewingDate, puzzle);
    try {
      await supabaseClient.from('app_data').upsert({ id: 'zoomjeu_' + viewingDate, data: puzzle, updated_at: new Date().toISOString() });
    } catch (e) {
      console.error('Erreur sauvegarde ZoomJeu:', e);
    }
  }

  // ── Rendu du jeu ──
  function currentZoomIndex() {
    return Math.min(state.guesses.length, MAX_ATTEMPTS - 1);
  }

  function renderGame() {
    const finished = state.solved || state.gaveUp || state.guesses.length >= MAX_ATTEMPTS;
    const zoomFactor = finished ? 1 : ZOOM_LEVELS[currentZoomIndex()];

    let tabsHtml = '<div class="attempts-tabs">';
    for (let i = 0; i < MAX_ATTEMPTS; i++) {
      let cls = '', label = i + 1;
      if (i < state.guesses.length) {
        const g = state.guesses[i];
        cls = g.correct ? 'correct' : (g.skipped ? 'skipped' : 'wrong');
        label = g.correct ? '✓' : (g.skipped ? '⏭' : '✕');
      } else if (i === state.guesses.length && !finished) {
        cls = 'active'; label = '🔍 ' + (i + 1);
      }
      tabsHtml += `<div class="attempt-tab ${cls}">${label}</div>`;
    }
    tabsHtml += '</div>';

    let guessListHtml = '';
    if (state.guesses.length > 0) {
      guessListHtml = '<div class="guess-list">';
      state.guesses.forEach(g => {
        const cls = g.correct ? '' : (g.skipped ? 'skipped' : 'wrong');
        const label = g.correct ? '✓ ' + escapeHtml(g.text) : (g.skipped ? '⏭ Passé' : '✕ ' + escapeHtml(g.text));
        guessListHtml += `<div class="guess-item ${cls}">${label}</div>`;
      });
      guessListHtml += '</div>';
    }

    let sidebarHtml;
    if (finished) {
      const success = state.solved;
      sidebarHtml = `
        <div class="result-box ${success ? 'win' : 'lose'}">
          <div class="answer">${escapeHtml(puzzle.answer)}</div>
          <div class="verdict">${success ? `Trouvé en ${state.guesses.length} essai${state.guesses.length > 1 ? 's' : ''} 🎉` : (state.gaveUp ? 'Abandonné' : 'Perdu — bien joué quand même')}</div>
        </div>
      `;
    } else {
      sidebarHtml = `
        <form class="guess-form" id="guessForm" autocomplete="off">
          <div class="input-wrap">
            <input id="guessInput" type="text" placeholder="Quel est ce jeu ?" />
            <button type="button" class="input-clear" id="clearBtn" title="Effacer">✕</button>
          </div>
          <div class="suggestions" id="suggestionsBox" style="display:none;"></div>
        </form>
        <button type="button" class="wide" id="skipBtn">Passer ⏭</button>
        <button type="button" class="small-link" id="giveUpBtn">Abandonner la partie</button>
      `;
    }

    document.getElementById('cardEl').innerHTML = `
      <div class="game-layout">
        <div class="game-left">
          <div class="zoom-frame">
            <img id="zoomImg" src="${puzzle.image}" style="transform-origin:${puzzle.focus.x}% ${puzzle.focus.y}%; transform:scale(${zoomFactor});">
          </div>
          ${tabsHtml}
        </div>
        <div class="game-right">
          ${sidebarHtml}
          ${guessListHtml}
        </div>
      </div>
    `;

    if (!finished) {
      document.getElementById('guessForm').addEventListener('submit', onGuessSubmit);
      document.getElementById('skipBtn').addEventListener('click', onSkip);
      document.getElementById('giveUpBtn').addEventListener('click', onGiveUp);
      const input = document.getElementById('guessInput');
      const clearBtn = document.getElementById('clearBtn');
      input.addEventListener('input', e => { onInputChange(e); clearBtn.classList.toggle('visible', !!e.target.value); });
      input.addEventListener('keydown', onInputKeydown);
      clearBtn.addEventListener('click', () => { input.value = ''; clearBtn.classList.remove('visible'); hideSuggestions(); input.focus(); });
      document.addEventListener('click', onDocClickCloseSuggestions);
      if (viewingDate === todayStr) input.focus();
    }
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── Autocomplétion ──
  function onInputChange(e) {
    const q = e.target.value.trim();
    clearTimeout(suggestTimer);
    if (q.length < 2) { hideSuggestions(); return; }
    suggestTimer = setTimeout(() => fetchSuggestions(q), 250);
  }
  async function fetchSuggestions(q) {
    try {
      const res = await fetch('/api/search-games?q=' + encodeURIComponent(q));
      const data = await res.json();
      currentSuggestions = data.suggestions || [];
      renderSuggestions();
    } catch (e) {
      hideSuggestions();
    }
  }
  function renderSuggestions() {
    const box = document.getElementById('suggestionsBox');
    if (!box) return;
    if (currentSuggestions.length === 0) { hideSuggestions(); return; }
    box.innerHTML = currentSuggestions.map((name, i) => `
      <div class="suggestion-item${i === 0 ? ' top-match' : ''}">
        <span>${escapeHtml(name)}</span>
        ${i === 0 ? '<span class="sugg-badge">↵ Entrée</span>' : ''}
      </div>
    `).join('');
    box.style.display = 'block';
    box.querySelectorAll('.suggestion-item').forEach((el, i) => {
      el.addEventListener('click', () => selectSuggestion(currentSuggestions[i]));
    });
  }
  function hideSuggestions() {
    const box = document.getElementById('suggestionsBox');
    if (box) { box.style.display = 'none'; box.innerHTML = ''; }
    currentSuggestions = [];
  }
  function selectSuggestion(name) {
    const input = document.getElementById('guessInput');
    if (input) input.value = name;
    hideSuggestions();
    submitGuess(name);
  }
  function onInputKeydown(e) {
    if (e.key === 'Escape') { hideSuggestions(); return; }
    if (e.key === 'Enter' && currentSuggestions.length > 0) {
      e.preventDefault();
      selectSuggestion(currentSuggestions[0]);
    }
  }
  function onDocClickCloseSuggestions(e) {
    const form = document.getElementById('guessForm');
    if (form && !form.contains(e.target)) hideSuggestions();
  }

  // ── Actions de jeu ──
  function onGuessSubmit(e) {
    e.preventDefault();
    const input = document.getElementById('guessInput');
    const text = input.value.trim();
    if (!text) return;
    hideSuggestions();
    submitGuess(text);
  }
  function submitGuess(text) {
    const correct = isCorrectGuess(text, puzzle.answer);
    state.guesses.push({ text, correct });
    if (correct) state.solved = true;
    saveSession();
    renderGame();
  }
  function onSkip() {
    state.guesses.push({ text: '', correct: false, skipped: true });
    saveSession();
    renderGame();
  }
  function onGiveUp() {
    state.gaveUp = true;
    saveSession();
    renderGame();
  }

  // ── Archives (vue calendrier) ──
  function monthPrefix(y, m) { return `zoomjeu_${y}-${String(m).padStart(2, '0')}-`; }
  let showNames = true;

  async function renderArchive() {
    document.getElementById('cardEl').innerHTML = '<div class="state-msg">Chargement des archives…</div>';

    const prefix = monthPrefix(archiveYear, archiveMonth);
    const { data: rows, error } = await supabaseClient.from('app_data').select('id,data').ilike('id', prefix + '%');
    setDbStatus(error);

    const puzzleByDate = {};
    (rows || []).forEach(r => {
      const d = r.id.replace('zoomjeu_', '');
      if (isValidPuzzle(r.data)) puzzleByDate[d] = r.data;
    });

    const daysInMonth = new Date(Date.UTC(archiveYear, archiveMonth, 0)).getUTCDate();
    const firstWeekday = (new Date(Date.UTC(archiveYear, archiveMonth - 1, 1)).getUTCDay() + 6) % 7; // 0 = lundi

    let cellsHtml = '';
    for (let i = 0; i < firstWeekday; i++) cellsHtml += '<div class="archive-cell empty"></div>';

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${archiveYear}-${String(archiveMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const p = puzzleByDate[dateStr];
      const isFuture = dateStr > todayStr;
      const isBeforeLaunch = dateStr < LAUNCH_DATE;

      if (!p || isFuture || isBeforeLaunch) {
        cellsHtml += `<div class="archive-cell disabled"><div class="cell-day">${day}</div></div>`;
        continue;
      }

      const s = p.session || { guesses: [] };
      const guesses = s.guesses || [];
      const finished = s.solved || s.gaveUp || guesses.length >= MAX_ATTEMPTS;

      // Jaune = pas encore trouvé (en cours ou pas commencé) · Rouge = perdu · Vert = gagné
      let status = 'yellow';
      if (finished) status = s.solved ? 'green' : 'red';

      let miniHtml = '<div class="cell-mini-guesses">';
      for (let i = 0; i < MAX_ATTEMPTS; i++) {
        let segCls = '';
        if (i < guesses.length) {
          const g = guesses[i];
          segCls = g.correct ? 'correct' : (g.skipped ? 'skipped' : 'wrong');
        }
        miniHtml += `<span class="${segCls}"></span>`;
      }
      miniHtml += '</div>';

      // Terminé -> image complète (scale 1). Pas encore fini -> aperçu zoomé (ne spoile pas).
      const scale = finished ? 1 : ARCHIVE_PEEK_ZOOM;
      cellsHtml += `
        <div class="archive-cell status-${status}" data-date="${dateStr}">
          <img class="cell-img" src="${p.image}" style="transform-origin:${p.focus.x}% ${p.focus.y}%; transform:scale(${scale});">
          <div class="cell-day">${day}</div>
          ${miniHtml}
          ${finished ? `<div class="cell-name">${escapeHtml(p.answer)}</div>` : ''}
        </div>
      `;
    }

    const monthLabel = `${MONTHS_FR[archiveMonth - 1]} ${archiveYear}`;
    const isFirstMonth = archiveYear < parseInt(LAUNCH_DATE.slice(0,4)) || (archiveYear === parseInt(LAUNCH_DATE.slice(0,4)) && archiveMonth <= parseInt(LAUNCH_DATE.slice(5,7)));
    const isLastMonth = archiveYear > parseInt(todayStr.slice(0,4)) || (archiveYear === parseInt(todayStr.slice(0,4)) && archiveMonth >= parseInt(todayStr.slice(5,7)));

    document.getElementById('cardEl').innerHTML = `
      <div class="archive-header">
        <div class="archive-nav-row">
          <button id="archFirst" title="Premier mois" ${isFirstMonth ? 'disabled' : ''}>⏮</button>
          <button id="archPrev" title="Mois précédent" ${isFirstMonth ? 'disabled' : ''}>◀</button>
          <div class="archive-month-label">${monthLabel}</div>
          <button id="archNext" title="Mois suivant" ${isLastMonth ? 'disabled' : ''}>▶</button>
          <button id="archLast" title="Mois actuel" ${isLastMonth ? 'disabled' : ''}>⏭</button>
          <button id="archClose" class="ghost" title="Retour au jeu">✕</button>
        </div>
        <label class="names-toggle">
          <input type="checkbox" id="showNamesToggle" ${showNames ? 'checked' : ''}>
          Afficher les noms
        </label>
      </div>
      <div class="archive-grid${showNames ? '' : ' hide-names'}">
        ${WEEKDAYS_FR.map(w => `<div class="archive-weekday">${w}</div>`).join('')}
        ${cellsHtml}
      </div>
    `;

    document.getElementById('archFirst').addEventListener('click', () => { archiveYear = parseInt(LAUNCH_DATE.slice(0,4)); archiveMonth = parseInt(LAUNCH_DATE.slice(5,7)); renderArchive(); });
    document.getElementById('archLast').addEventListener('click', () => { archiveYear = parseInt(todayStr.slice(0,4)); archiveMonth = parseInt(todayStr.slice(5,7)); renderArchive(); });
    document.getElementById('archPrev').addEventListener('click', () => { archiveMonth--; if (archiveMonth < 1) { archiveMonth = 12; archiveYear--; } renderArchive(); });
    document.getElementById('archNext').addEventListener('click', () => { archiveMonth++; if (archiveMonth > 12) { archiveMonth = 1; archiveYear++; } renderArchive(); });
    document.getElementById('archClose').addEventListener('click', () => { mode = 'play'; updateNavUI(); loadPuzzle(); });
    document.getElementById('showNamesToggle').addEventListener('change', e => {
      showNames = e.target.checked;
      document.querySelector('.archive-grid').classList.toggle('hide-names', !showNames);
    });
    document.querySelectorAll('.archive-cell[data-date]').forEach(el => {
      el.addEventListener('click', () => goToDate(el.getAttribute('data-date')));
    });
  }

  loadPuzzle();
  </script>
</body>
</html>
