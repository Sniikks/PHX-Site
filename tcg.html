<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PHX — TCG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="cyber-theme.css">
<link rel="stylesheet" href="tcg.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="tcg-header">
  <a href="index.html" class="menu-btn">☰ Menu</a>
  <h1 class="tcg-title">TCG</h1>
</header>

<main class="tcg-main">

  <!-- ============ Bloc Boosters ============ -->
  <section class="tcg-panel booster-panel">
    <h2 class="panel-title">Boosters</h2>

    <div class="booster-inventory">
      <div class="booster-stack" id="boosterStack">
        <div class="booster-card" id="boosterCardTop">📦</div>
      </div>
      <div class="inventory-count">
        <span id="unopenedCount">0</span> booster<span id="unopenedPlural">s</span> en stock
      </div>
    </div>

    <button class="btn-primary" id="openBoosterBtn" disabled>Ouvrir un booster</button>

    <div class="slot-status">
      <div class="slot-line" id="claimLine">
        <span id="claimStatusText">Chargement…</span>
      </div>
      <button class="btn-secondary" id="claimBtn" disabled>Récupérer le booster</button>
      <div class="countdown" id="countdown"></div>
    </div>
  </section>

  <!-- ============ Bloc Collection ============ -->
  <section class="tcg-panel collection-panel">
    <h2 class="panel-title">Collection</h2>

    <div class="collection-controls">
      <select id="setSelect" class="set-select">
        <option value="">Choisis un set…</option>
      </select>
      <div class="collection-progress" id="collectionProgress"></div>
    </div>

    <div class="card-grid" id="cardGrid"></div>
  </section>

</main>

<!-- ============ Overlay ouverture de booster ============ -->
<div class="opening-overlay" id="openingOverlay">
  <div class="opening-stage" id="openingStage"></div>
  <button class="btn-secondary opening-close" id="openingClose">Fermer</button>
</div>

<div id="phx-bg-particles"></div>

<script src="config.js"></script>
<script src="nav.js"></script>
<script src="bg-animate.js"></script>
<script src="tcg.js"></script>
</body>
</html>
