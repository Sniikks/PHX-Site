<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Liste de Sniikks</title>
<link rel="shortcut icon" href="https://cdn.discordapp.com/icons/1030553621252821053/2e7356a5d822245ad7953afdb143581a.webp?size=160&quality=lossless">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap');

  :root {
    --bg:#0a0a0c; --bg2:#111114; --bg3:#161619;
    --border:#232327; --border-soft:#1a1a1d;
    --gold:#e8b84b; --gold2:#c79530; --gold-dim:#9c7d33;
    --gold-soft:rgba(232,184,75,.10); --gold-ring:rgba(232,184,75,.35);
    --violet:#a78bfa; --violet-soft:rgba(167,139,250,.12);
    --text:#ededf0; --text-dim:#8c8c94; --text-faint:#55555c;
    --done:#3a6a3a; --abandon:#6a3a3a; --red:#e2685f;
    --note-10:#e2685f; --note-89:#e8a04b; --note-67:#e8cf4b;
    --note-5:#6699e8; --note-34:#a78bfa; --note-12:#5fbf86;
    --radius-sm:6px; --radius:10px; --radius-lg:16px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; scrollbar-color:var(--border) transparent; overflow-x:clip; }
  *:focus-visible { outline:2px solid var(--gold); outline-offset:2px; border-radius:3px; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:var(--bg2); }
  ::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--gold2); }
  ::selection { background:var(--gold-soft); color:var(--gold); }
  body {
    background:radial-gradient(1200px 600px at 50% -200px, rgba(232,184,75,.08), transparent 60%), var(--bg);
    color:var(--text); font-family:'Manrope',sans-serif; font-size:14px; line-height:1.5;
    min-height:100vh; -webkit-font-smoothing:antialiased;
    overflow-x:clip; max-width:100%;
  }

  /* ══════════════ HEADER ══════════════ */
  .app-header { position:sticky; top:0; z-index:55; background:rgba(10,10,12,.88); backdrop-filter:blur(16px) saturate(140%); -webkit-backdrop-filter:blur(16px) saturate(140%); border-bottom:1px solid var(--border-soft); }
  .app-header.scrolled { box-shadow:0 8px 22px rgba(0,0,0,.5); }
  .page-header { position:relative; display:flex; align-items:center; justify-content:center; padding:16px 32px; max-width:1320px; margin:0 auto; border-bottom:1px solid var(--border-soft); padding-left:max(32px, env(safe-area-inset-left)); padding-right:max(32px, env(safe-area-inset-right)); }
  .header-io { position:absolute; right:max(32px, env(safe-area-inset-right)); top:50%; transform:translateY(-50%); display:flex; gap:8px; }
  .menu-btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:var(--radius); color:#e5e5e5; font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:600; letter-spacing:.02em; text-decoration:none; cursor:pointer; transition:all .15s ease; white-space:nowrap; position:absolute; left:max(32px, env(safe-area-inset-left)); top:50%; transform:translateY(-50%); }
  .menu-btn:hover { background:rgba(255,255,255,.09); border-color:rgba(255,255,255,.24); color:#fff; }
  .text-action-btn { background:transparent; border:1px solid var(--border); color:var(--text-dim); font-family:inherit; font-size:12px; cursor:pointer; transition:all .15s; padding:7px 13px; border-radius:var(--radius); }
  .text-action-btn:hover { color:var(--text); background:var(--bg3); border-color:var(--gold-dim); }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand-icon { width:28px; height:28px; border-radius:8px; background:linear-gradient(155deg,var(--gold) 0%, #c79530 100%); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; box-shadow:0 0 0 3px var(--violet-soft); }
  h1 { font-family:'Sora',sans-serif; font-size:15px; color:var(--text); letter-spacing:.01em; font-weight:600; }

  .sticky-header { border-bottom:1px solid var(--border-soft); }
  .sticky-header.scrolled { border-bottom-color:transparent; }
  .sticky-inner { max-width:1320px; margin:0 auto; padding:0 32px; padding-left:max(32px, env(safe-area-inset-left)); padding-right:max(32px, env(safe-area-inset-right)); }
  .toolbar-row { display:flex; align-items:center; justify-content:center; gap:10px; padding:14px 0 6px; flex-wrap:wrap; }
  .toolbar-row.split { justify-content:center; gap:28px; }
  .toolbar-row + .toolbar-row { padding-top:0; }
  .toolbar-block:last-child .toolbar-row:last-child { padding-bottom:14px; }

  .inline-stats { display:flex; align-items:center; gap:22px; flex-shrink:0; }
  .top-stat { text-align:center; line-height:1.2; }
  .top-stat-num { display:block; font-family:'Sora',sans-serif; font-size:16px; font-weight:600; color:var(--text); }
  .top-stat.is-done .top-stat-num { color:var(--gold); }
  .top-stat-label { display:block; font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.08em; }

  .search-wrap { position:relative; flex-shrink:0; }
  .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-faint); font-size:14px; pointer-events:none; }
  .search-box { background:var(--bg2); border:1px solid var(--border); color:var(--text); padding:8px 14px 8px 32px; font-family:'Manrope',sans-serif; font-size:13px; outline:none; border-radius:var(--radius); width:220px; transition:border-color .15s,background .15s,box-shadow .15s; }
  .search-box:focus { border-color:var(--gold-dim); background:var(--bg3); box-shadow:0 0 0 3px var(--violet-soft); }
  .search-box::placeholder { color:var(--text-faint); }

  .status-pills { display:flex; align-items:center; justify-content:center; gap:4px; flex-wrap:wrap; }
  .status-pill { background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:7px 13px; font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:600; cursor:pointer; border-radius:var(--radius); white-space:nowrap; transition:all .15s; }
  .status-pill:hover { color:var(--text); background:var(--bg3); }
  .status-pill.active { color:#0a0a0c; background:var(--gold); border-color:var(--gold); }
  .status-pill .sp-count { font-size:10.5px; opacity:.75; margin-left:3px; }

  .row2-right { display:flex; align-items:center; gap:10px; flex-wrap:nowrap; justify-content:flex-end; }
  .view-toggle { display:flex; align-items:center; gap:4px; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:3px; flex-shrink:0; }
  .view-toggle button, .view-btn { background:transparent; border:none; color:var(--text-dim); width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:7px; font-size:14px; transition:all .15s; flex-shrink:0; }
  .view-toggle button:hover, .view-btn:hover { color:var(--gold); background:var(--bg3); }
  .view-toggle button.active { color:var(--gold); background:var(--bg3); }
  .add-btn-main { background:var(--gold); border:none; color:#0a0a0c; padding:8px 16px; font-family:'Manrope',sans-serif; font-size:12.5px; font-weight:700; cursor:pointer; border-radius:var(--radius); white-space:nowrap; transition:all .15s; }
  .add-btn-main:hover { background:#f0c563; transform:translateY(-1px); }

  .stats-years { display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; }
  .year-filters { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
  .yf-label { display:none; }
  .year-pill { display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:var(--radius); color:var(--text-dim); cursor:pointer; font-size:12px; font-weight:600; border:1px solid transparent; transition:all .15s; background:transparent; font-family:inherit; }
  .year-pill:hover { color:var(--text); background:var(--bg3); transform:none; }
  .year-pill.active { color:var(--gold); background:var(--gold-soft); border-color:var(--gold-ring); }
  .year-pill .yp-count { color:var(--text-faint); font-size:10.5px; }
  .year-pill.active .yp-count { color:var(--gold-dim); }
  .year-pill.tous-pill { color:var(--text-dim); border:1px solid var(--border); }
  .year-pill.tous-pill.active { background:var(--gold-soft); border-color:var(--gold-ring); color:var(--gold); }

  .platform-row { display:flex; align-items:center; gap:4px; flex-wrap:wrap; justify-content:center; }
  .filter-btn { background:transparent; border:1px solid var(--border); color:var(--text-dim); font-family:inherit; font-size:11.5px; padding:6px 13px; cursor:pointer; transition:all .15s; letter-spacing:.02em; white-space:nowrap; border-radius:var(--radius); }
  .filter-btn:hover { border-color:var(--gold-dim); color:var(--text); transform:none; }
  .filter-btn.active { background:var(--gold); border-color:var(--gold); color:#0a0a0c; }

  /* ══════════════ MAIN ══════════════ */
  .main-content { max-width:1320px; margin:0 auto; padding:28px 32px 80px; padding-left:max(32px, env(safe-area-inset-left)); padding-right:max(32px, env(safe-area-inset-right)); padding-bottom:max(80px, env(safe-area-inset-bottom)); }

  .year-section { margin-bottom:36px; }
  .year-heading { display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; padding-bottom:12px; margin-bottom:20px; border-bottom:1px solid var(--border-soft); border-radius:0; transition:none; }
  .year-heading:hover { background:transparent; }
  .year-heading:hover .yh-year { color:var(--gold); }
  .yh-dot { font-size:10px; color:var(--text-faint); transition:transform .2s; flex-shrink:0; }
  .year-heading.collapsed .yh-dot { transform:rotate(-90deg); }
  .year-heading.collapsed { margin-bottom:0; border-bottom-color:transparent; }
  .yh-year { font-family:'Sora',sans-serif; font-size:17px; font-weight:600; color:var(--text); letter-spacing:0; transition:color .15s; }
  .yh-count { font-size:11px; color:var(--text-faint); font-weight:600; background:var(--bg3); padding:2px 8px; border-radius:20px; }
  .year-body.collapsed { display:none; max-height:none !important; opacity:1; }

  .status-section { margin-bottom:22px; }
  .status-section:last-child { margin-bottom:0; }
  .status-heading { font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:0; margin-bottom:11px; display:flex; align-items:center; gap:8px; }
  .status-heading::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; font-size:0; }
  .status-heading .sh-count { font-size:10.5px; color:var(--text-faint); font-weight:600; background:transparent; padding:0; }
  .status-heading::after { content:''; flex:1; height:1px; background:var(--border-soft); border-top:none; margin-left:4px; min-width:20px; }
  .status-heading.sh-fini { color:#5fbf86; }
  .status-heading.sh-abandonne { color:#e2685f; }
  .status-heading.sh-encours { color:#6699e8; }
  .status-heading.sh-attente { color:#a78bfa; }
  .status-heading.sh-afaire { color:#e8b84b; }

  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(126px,1fr)); gap:12px; }
  .main-content.compact .card-grid { grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:8px; }
  .main-content.compact .game-card .card-img-wrap { aspect-ratio:16/9.4; }
  .main-content.compact .game-card .card-name { font-size:10px; height:30px; padding:6px 6px; }
  .empty-state { padding:80px 20px; text-align:center; color:var(--text-faint); font-size:13px; }

  /* ══════════════ GAME CARD ══════════════ */
  .game-card {
    width:100%; cursor:pointer; background:var(--bg2); border:1px solid var(--border-soft); border-radius:var(--radius);
    overflow:hidden; transition:transform .15s,border-color .15s,box-shadow .15s; position:relative;
    animation:cardIn .35s ease backwards;
  }
  @keyframes cardIn { from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
  .game-card:hover { transform:translateY(-3px); border-color:var(--gold-dim); box-shadow:0 12px 28px -8px rgba(0,0,0,.6),0 0 0 1px var(--violet-soft); z-index:5; }
  .game-card .card-img-wrap { position:relative; width:100%; aspect-ratio:16/9.4; background:var(--bg3); overflow:hidden; }
  .game-card .card-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s ease; }
  .game-card:hover .card-img-wrap img { transform:scale(1.05); }
  .game-card img { background:var(--bg3); }
  .game-card .card-no-img { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:var(--bg3); font-size:26px; color:var(--text-faint); opacity:.6; }
  .game-card .card-name {
    font-size:11px; font-weight:600; text-align:center; padding:8px 9px; line-height:1.35; color:var(--text-dim);
    overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; height:38px; word-break:break-word;
  }
  .card-note { position:absolute; top:6px; left:6px; font-family:'Sora',sans-serif; font-size:11px; font-weight:700; padding:2px 6px; line-height:1.4; background:rgba(10,10,12,.82); backdrop-filter:blur(4px); border-radius:5px; }
  .card-platform { position:absolute; top:6px; right:6px; font-size:11px; line-height:1; background:rgba(10,10,12,.82); backdrop-filter:blur(4px); border-radius:5px; padding:3px 4px; display:flex; align-items:center; justify-content:center; }
  .card-dlc { display:block; background:transparent; color:var(--gold); font-size:9px; font-weight:800; text-align:center; padding:6px 6px 0; letter-spacing:.08em; font-family:'Sora',sans-serif; }
  .card-dlc + .card-name { padding-top:2px; }

  .cn-10{color:var(--note-10)} .cn-89{color:var(--note-89)} .cn-67{color:var(--note-67)}
  .cn-5{color:var(--note-5)} .cn-34{color:var(--note-34)} .cn-12{color:var(--note-12)}

  /* ══════════════ OVERLAYS / MODALS ══════════════ */
  .overlay, .info-overlay { display:none; position:fixed; inset:0; background:rgba(6,6,8,.78); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center; padding:20px; pointer-events:none; }
  .overlay.open, .info-overlay.open { display:flex; pointer-events:auto; }
  .overlay .modal, .info-overlay .info-modal { pointer-events:auto; }
  @keyframes modalIn { from{ opacity:0; transform:scale(.97) translateY(8px); } to{ opacity:1; transform:scale(1) translateY(0); } }

  .modal { background:var(--bg2); border:1px solid var(--border); padding:26px 28px; width:min(480px,100%); max-height:90vh; overflow-y:auto; border-radius:var(--radius-lg); box-shadow:0 30px 70px -20px rgba(0,0,0,.7); animation:modalIn .2s ease; }
  .modal h2 { font-family:'Sora',sans-serif; font-size:14px; font-weight:600; color:var(--text); margin-bottom:22px; display:flex; align-items:center; gap:8px; letter-spacing:0; }
  .modal h2::before { content:''; width:4px; height:14px; background:var(--gold); border-radius:2px; }
  .form-row label { display:block; font-size:10.5px; color:var(--text-faint); font-weight:700; letter-spacing:.05em; margin-bottom:7px; text-transform:uppercase; }
  .form-row input, .form-row select, .form-row textarea {
    width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:10px 12px;
    font-family:'Manrope',sans-serif; font-size:13.5px; outline:none; border-radius:var(--radius); transition:border-color .15s,background .15s,box-shadow .15s; appearance:none;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color:var(--gold-dim); background:var(--bg3); box-shadow:0 0 0 3px var(--violet-soft); }
  .form-row select option { background:var(--bg2); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .note-hint { color:var(--text-faint); font-weight:400; text-transform:none; letter-spacing:0; }
  .note-bar-row { display:flex; align-items:center; gap:14px; margin-top:6px; }
  .note-bar-wrap { position:relative; flex:1; height:15px; }
  .note-bar-track { position:absolute; inset:0; background:var(--bg3); border-radius:8px; border:1px solid var(--border); }
  .note-bar-fill { position:absolute; left:0; top:0; bottom:0; width:0%; border-radius:7px; background:var(--gold-dim); transition:width .12s ease, background-color .12s ease; }
  .note-range-input { position:absolute; inset:0; width:100%; height:100%; margin:0; opacity:0; cursor:pointer; appearance:none; }
  .note-slider-val { font-family:'Sora',sans-serif; font-size:1.3rem; font-weight:700; min-width:34px; text-align:right; color:var(--text); }
  .note-stars-preview { font-size:13px; margin-top:8px; min-height:18px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

  .btn-primary { background:var(--gold); border:1px solid var(--gold); color:#0a0a0c; font-family:inherit; font-size:12.5px; font-weight:700; padding:10px 18px; cursor:pointer; letter-spacing:.02em; transition:all .15s; border-radius:var(--radius); }
  .btn-primary:hover { background:#f0c563; border-color:#f0c563; transform:translateY(-1px); }
  .btn-cancel { background:transparent; border:1px solid var(--border); color:var(--text-dim); font-family:inherit; font-size:12.5px; padding:10px 18px; cursor:pointer; transition:all .15s; border-radius:var(--radius); }
  .btn-cancel:hover { border-color:var(--text-faint); color:var(--text); background:var(--bg3); }
  .btn-danger { background:transparent; border:1px solid rgba(226,104,95,.3); color:rgba(226,104,95,.85); font-family:inherit; font-size:12.5px; padding:10px 18px; cursor:pointer; transition:all .15s; border-radius:var(--radius); }
  .btn-danger:hover { color:var(--red); border-color:var(--red); background:rgba(226,104,95,.08); }

  .url-hint { font-size:11px; color:var(--text-faint); margin-top:6px; }
  .url-detect { font-size:11px; color:var(--gold); margin-top:6px; display:none; font-weight:600; }
  .img-preview-wrap { margin-top:10px; display:none; }
  .img-preview-wrap img { width:130px; height:60px; object-fit:cover; border:1px solid var(--border); display:block; border-radius:6px; }

  /* ── INFO POPUP ── */
  .info-modal { background:var(--bg2); border:1px solid var(--border); width:min(440px,100%); max-height:88vh; overflow-y:auto; position:relative; border-radius:var(--radius-lg); animation:modalIn .2s ease; }
  .info-img-wrap { position:relative; width:100%; aspect-ratio:16/8; background:var(--bg3); overflow:hidden; }
  .info-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .info-no-img { width:100%; aspect-ratio:16/8; display:flex; align-items:center; justify-content:center; font-size:40px; background:var(--bg3); color:var(--text-faint); opacity:.5; }
  .info-img-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,transparent 35%,rgba(10,10,12,.95) 100%); }
  .info-title-block { position:absolute; bottom:14px; left:20px; right:56px; }
  .info-title { font-family:'Sora',sans-serif; font-size:18px; font-weight:600; color:#fff; line-height:1.25; }
  .info-close { position:absolute; top:12px; right:12px; background:rgba(10,10,12,.7); border:1px solid rgba(255,255,255,.1); color:#fff; font-size:14px; width:30px; height:30px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-sm); transition:background .15s; z-index:5; }
  .info-close:hover { background:rgba(10,10,12,.95); }
  .info-body { padding:18px 20px 22px; }
  .info-row { display:flex; align-items:flex-start; gap:14px; margin-bottom:13px; font-size:13px; }
  .info-row:last-of-type { margin-bottom:0; }
  .info-label { color:var(--text-faint); min-width:78px; font-size:10px; letter-spacing:.06em; padding-top:3px; text-transform:uppercase; font-weight:600; flex-shrink:0; }
  .info-val { color:var(--text); flex:1; word-break:break-word; }
  .info-actions { display:flex; gap:8px; margin-top:20px; justify-content:flex-end; }

  /* status badges */
  .status-badge { font-size:10.5px; padding:4px 10px; border:none; white-space:nowrap; display:inline-block; border-radius:20px; font-weight:700; letter-spacing:.02em; }
  .status-afaire    { color:var(--gold); background:var(--gold-soft); }
  .status-encours   { color:#6699e8; background:rgba(102,153,232,.12); }
  .status-fini      { color:#5fbf86; background:rgba(95,191,134,.12); }
  .status-abandonne { color:#e2685f; background:rgba(226,104,95,.12); }
  .status-attente   { color:#a78bfa; background:var(--violet-soft); }

  /* stars */
  .stars-wrap { display:inline-flex; align-items:center; gap:1px; }
  .star-pair { position:relative; display:inline-block; width:13px; height:14px; font-size:13px; }
  .star-pair .s-empty { color:var(--border); position:absolute; left:0; top:0; }
  .star-pair .s-full { color:inherit; position:absolute; left:0; top:0; overflow:hidden; white-space:nowrap; }
  .star-val { font-family:'Sora',sans-serif; font-size:14px; font-weight:700; margin-left:8px; color:var(--text); }
  .note-10{color:var(--note-10)} .note-89{color:var(--note-89)} .note-67{color:var(--note-67)}
  .note-5{color:var(--note-5)} .note-34{color:var(--note-34)} .note-12{color:var(--note-12)}

<script>

let games = [];

let resolvedImgSrc = '';
let urlTimer = null;

// ── PLATFORM LOGOS ──
const STEAM_SVG = `<svg viewBox="0 0 496 512" xmlns="http://www.w3.org/2000/svg"><path fill="#c9c5b8" d="M496 256c0 137-111.2 248-248.4 248-113.8 0-209.7-76.2-239-180.4l95.2 39.3c6.4 18.1 23.8 31.1 44.2 31.1 26 0 47.2-21.4 47.2-47.7l84.7-60.3c51.8 2.3 93.4-40 93.4-92.5 0-51.1-41.8-92.5-93-92.5s-93 41.4-93 92.5v1.2L180.3 279c-15.3-.2-29.1 7.4-37.5 19.4L7.7 245.7C28.1 100.3 152.7 0 248 0 385.2 0 496 114.9 496 256zM155.7 384l-30-12.4c6.7 13.2 19.7 22.4 35.2 23.4 30.7 2.1 51.1-31.6 36.5-58.4-8.1-15-24.4-24.8-42-23.4-13.7 1.1-25.4 8.1-33.1 18.5l30.7 12.7c16.8 7 24.7 26.2 17.8 43.1zm215.7-229.1c0-34.3-27.8-62.1-62.1-62.1-34.3 0-62.1 27.8-62.1 62.1s27.8 62.1 62.1 62.1c34.3 0 62.1-27.8 62.1-62.1zm-109.3.1c0-26 21.2-47.1 47.1-47.1s47.1 21.1 47.1 47.1-21.2 47.1-47.1 47.1-47.1-21.1-47.1-47.1z"/></svg>`;

// ── STEAM IMAGE DETECTION (même logique que tier list) ──
function extractSteamAppId(url) {
  const m = url.match(/store\.steampowered\.com(?:\/agecheck)?\/app\/(\d+)/i);
  return m ? m[1] : null;
}
function buildSteamUrl(appId) {
  return `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/header.jpg`;
}
function steamFallback(appId) {
  return `https://cdn.akamai.steamstatic.com/steam/apps/${appId}/header.jpg`;
}

function onImgInput() {
  clearTimeout(urlTimer);
  const url = document.getElementById('f-img').value.trim();
  const hint   = document.getElementById('imgHint');
  const detect = document.getElementById('imgDetect');
  const wrap   = document.getElementById('imgPreviewWrap');
  const prev   = document.getElementById('imgPreview');
  resolvedImgSrc = '';

  if (!url) {
    hint.style.display='block'; detect.style.display='none'; wrap.style.display='none'; return;
  }

  urlTimer = setTimeout(() => {
    const appId = extractSteamAppId(url);
    if (appId) {
      const imgUrl = buildSteamUrl(appId);
      resolvedImgSrc = imgUrl;
      prev.src = imgUrl;
      wrap.style.display = 'block';
      prev.onload = () => {
        hint.style.display='none';
        detect.textContent='✅ Image Steam détectée !';
        detect.style.display='block';
      };
      prev.onerror = () => {
        const fb = steamFallback(appId);
        resolvedImgSrc = fb; prev.src = fb;
        prev.onload = () => { hint.style.display='none'; detect.textContent='✅ Image Steam (fallback)'; detect.style.display='block'; };
        prev.onerror = () => { detect.textContent='⚠ Image non chargée — colle une URL directe (.jpg/.png)'; detect.style.display='block'; hint.style.display='none'; };
      };
      // Auto-remplir le nom si vide
      const nameField = document.getElementById('f-name');
      if (!nameField.value.trim()) {
        const parts = url.split('/').filter(Boolean);
        const slug  = parts[parts.length-1];
        if (slug && isNaN(slug)) {
          let name = slug;
          try { name = decodeURIComponent(slug); } catch(e) {}
          name = name.replace(/_/g,' ').replace(/(?:^|\s)\S/g, c=>c.toUpperCase());
          nameField.value = name;
        }
      }
    } else {
      // URL directe d'image
      resolvedImgSrc = url;
      prev.src = url;
      wrap.style.display = 'block';
      hint.style.display = 'none';
      detect.style.display = 'none';
    }
  }, 350);
}

function resetImgField() {
  document.getElementById('f-img').value = '';
  document.getElementById('imgHint').style.display = 'block';
  document.getElementById('imgDetect').style.display = 'none';
  document.getElementById('imgPreviewWrap').style.display = 'none';
  document.getElementById('imgPreview').src = '';
  resolvedImgSrc = '';
}

// ── NOTES / STARS ──
function noteClass(n) {
  if (!n||n<=0) return '';
  if (n===10) return 'note-10';
  if (n>=8)   return 'note-89';
  if (n>=6)   return 'note-67';
  if (n===5)  return 'note-5';
  if (n>=3)   return 'note-34';
  return 'note-12';
}
function noteClassCard(n) { return noteClass(n).replace('note-','cn-'); }
function noteColor(n) {
  if (!n||n<=0) return '';
  if (n===10) return 'var(--note-10)';
  if (n>=8)   return 'var(--note-89)';
  if (n>=6)   return 'var(--note-67)';
  if (n===5)  return 'var(--note-5)';
  if (n>=3)   return 'var(--note-34)';
  return 'var(--note-12)';
}
function starsHtml(note) {
  if (note===null||note===undefined||note<=0) return '<span style="color:var(--border)">—</span>';
  const cls=noteClass(note);
  let html=`<span class="stars-wrap ${cls}">`;
  for(let i=1;i<=10;i++){
    const pct=Math.round(Math.min(1,Math.max(0,note-(i-1)))*100);
    html+=`<span class="star-pair"><span class="s-empty">★</span><span class="s-full" style="width:${pct}%">★</span></span>`;
  }
  html+=`<span class="star-val">${note}</span></span>`;
  return html;
}
function statusBadge(status) {
  const labels={afaire:'À faire',encours:'En cours',fini:'Terminé',abandonne:'Abandonné',attente:'En attente / Bug'};
  return `<span class="status-badge status-${status}">${labels[status]||status}</span>`;
}
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function load() {
  RemoteStore.setStatusElement(document.getElementById('dbStatus'));
  await RemoteStore.init([STORAGE_KEY]);
  try {
    let remote = RemoteStore.get(STORAGE_KEY, null);
    if (remote && Array.isArray(remote)) {
      games = remote;
    } else {
      // Rien en base : migration depuis un éventuel ancien localStorage, sinon jeu de données par défaut
      const old = localStorage.getItem('backlog_jeux_v3') || localStorage.getItem('backlog_jeux_v4');
      if (old) {
        const parsed = JSON.parse(old);
        games = parsed.map(g => ({ img:'', ...g }));
      } else {
        games = EXCEL_DATA.map(g=>({...g}));
      }
      save();
    }
    // S'assurer que tous les jeux ont le champ img
    games = games.map(g => ({ img:'', ...g }));
  } catch(e) { console.error(e); games = EXCEL_DATA.map(g=>({...g})); }
}
function save() { RemoteStore.set(STORAGE_KEY, games); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── CARD RENDERING ──
function cardImgHtml(g) {
  const src = g.img || '';
  if (src) return `<div class="card-img-wrap"><img src="${escHtml(src)}" alt="${escHtml(g.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-no-img" style="display:none">🎮</div></div>`;
  return `<div class="card-img-wrap"><div class="card-no-img">🎮</div></div>`;
}

function cardHtml(g) {
  const nc = noteClassCard(g.note);
  const noteLabel = (g.note!=null&&g.note>0) ? `<span class="card-note ${nc}">${g.note}</span>` : '';
  const platHtml  = `<span class="card-platform">${platformHtml(g.platform,16)}</span>`;
  const dlcHtml   = g.support ? `<span class="card-dlc">${escHtml(g.support)}</span>` : '';
  return `<div class="game-card" data-id="${g.id}" onclick="openInfo('${g.id}')" title="${escHtml(g.name)}">
    ${cardImgHtml(g)}
    ${noteLabel}${platHtml}${dlcHtml}
    <div class="card-name">${escHtml(g.name)}</div>
  </div>`;
}

// ── STATS ──
function renderStats(list) {
  document.getElementById('statTotal').textContent = games.length;
  document.getElementById('statDone').textContent = games.filter(g=>g.status==='fini').length;
  renderYearFilters();
  renderStatusCounts();
}

function renderStatusCounts() {
  const q=document.getElementById('search').value.toLowerCase().trim();
  const base = games.filter(g=>{
    const mq=!q||g.name.toLowerCase().includes(q);
    const mp=filterPlatform==='tous'||g.platform===filterPlatform;
    const my=filterYear==='tous'||(filterYear==='none'?g.annee==null:g.annee===filterYear);
    return mq&&mp&&my;
  });
  document.getElementById('cnt-tous').textContent = base.length;
  document.getElementById('cnt-fini').textContent = base.filter(g=>g.status==='fini').length;
  document.getElementById('cnt-encours').textContent = base.filter(g=>g.status==='encours').length;
  document.getElementById('cnt-abandonne').textContent = base.filter(g=>g.status==='abandonne').length;
  document.getElementById('cnt-attente').textContent = base.filter(g=>g.status==='attente').length;
  document.getElementById('cnt-afaire').textContent = base.filter(g=>g.status==='afaire').length;
}

function renderYearFilters() {
  // base list: respects status/platform/search filters but ignores the year filter itself
  const q=document.getElementById('search').value.toLowerCase().trim();
  const base = games.filter(g=>{
    const mq=!q||g.name.toLowerCase().includes(q);
    const ms=filterStatus==='tous'||
      (filterStatus==='afaire'&&g.status==='afaire')||(filterStatus==='encours'&&g.status==='encours')||
      (filterStatus==='fini'&&(g.status==='fini'))||(filterStatus==='attente'&&g.status==='attente')||
      (filterStatus==='abandonne'&&g.status==='abandonne');
    const mp=filterPlatform==='tous'||g.platform===filterPlatform;
    return mq&&ms&&mp;
  });
  const years=[...new Set(base.map(g=>g.annee))].filter(y=>y!=null).sort((a,b)=>b-a);
  const noYearCount = base.filter(g=>g.annee==null).length;
  let html=`<button class="year-pill tous-pill${filterYear==='tous'?' active':''}" onclick="setYearFilter('tous')">Toutes</button>`;
  years.forEach(y=>{
    const c=base.filter(g=>g.annee===y).length;
    html+=`<button class="year-pill${filterYear===y?' active':''}" onclick="setYearFilter(${y})">${y} <span class="yp-count">${c}</span></button>`;
  });
  if(noYearCount>0){
    html+=`<button class="year-pill${filterYear==='none'?' active':''}" onclick="setYearFilter('none')">Sans année <span class="yp-count">${noYearCount}</span></button>`;
  }
  document.getElementById('yearFilters').innerHTML=html;
}
function setYearFilter(y){ filterYear=y; renderGrid(); }

// ── FILTER ──
function getFiltered() {
  const q=document.getElementById('search').value.toLowerCase().trim();
  return games.filter(g=>{
    const mq=!q||g.name.toLowerCase().includes(q);
    const ms=filterStatus==='tous'||
      (filterStatus==='afaire'&&g.status==='afaire')||(filterStatus==='encours'&&g.status==='encours')||
      (filterStatus==='fini'&&(g.status==='fini'))||(filterStatus==='attente'&&g.status==='attente')||
      (filterStatus==='abandonne'&&g.status==='abandonne');
    const mp=filterPlatform==='tous'||g.platform===filterPlatform;
    const my=filterYear==='tous'||(filterYear==='none'?g.annee==null:g.annee===filterYear);
    return mq&&ms&&mp&&my;
  });
}

const STATUS_GROUPS=[
  {key:'encours',label:'EN COURS',statuses:['encours']},
  {key:'attente',label:'EN ATTENTE / BUG',statuses:['attente']},
  {key:'fini',label:'TERMINÉS',statuses:['fini']},
  {key:'abandonne',label:'ABANDONNÉS',statuses:['abandonne']},
  {key:'afaire',label:'À FAIRE',statuses:['afaire']},
];

function renderGrid() {
  const filtered=getFiltered(); renderStats(filtered);
  const years=[...new Set(games.map(g=>g.annee))].sort((a,b)=>{if(a===null&&b===null)return 0;if(a===null)return 1;if(b===null)return-1;return b-a;});
  let html='';
  for(const yr of years){
    const yg=filtered.filter(g=>g.annee===yr); if(!yg.length) continue;
    const yrKey=yr===null?'null':yr;
    const isCollapsed=collapsedYears.has(String(yrKey));
    const yearLabel = yr===null?'JEUX À FAIRE':String(yr);
    html+=`<div class="year-section"><div class="year-heading${isCollapsed?' collapsed':''}" onclick="toggleYear('${yrKey}')"><span class="yh-dot">▾</span><span class="yh-year">${yearLabel}</span><span class="yh-count">${yg.length}</span></div><div class="year-body${isCollapsed?' collapsed':''}" id="yr-body-${yrKey}" style="max-height:${isCollapsed?'0':'9999px'}">`;
    for(const grp of STATUS_GROUPS){
      const rows=yg.filter(g=>grp.statuses.includes(g.status)).sort((a,b)=>{const na=a.note??-1,nb=b.note??-1;if(nb!==na)return nb-na;return(a.name||'').localeCompare(b.name||'');});
      if(!rows.length) continue;
      html+=`<div class="status-section"><div class="status-heading sh-${grp.key}">${grp.label}<span class="sh-count">${rows.length}</span></div><div class="card-grid">`;
      rows.forEach(g=>{html+=cardHtml(g);});
      html+=`</div></div>`;
    }
    html+=`</div></div>`;
  }
  if(!html) html=`<div class="empty-state">Aucun jeu trouvé.</div>`;
  document.getElementById('mainContent').innerHTML=html;
}

function openInfo(id) {
  if(document.getElementById('overlay').classList.contains('open')) return;
  const g=games.find(x=>x.id===id); if(!g) return;
  const imgWrap=document.getElementById('infoImgWrap');
  if(g.img){
    imgWrap.innerHTML=`<div class="info-img-wrap"><img src="${escHtml(g.img)}" onerror="this.parentNode.innerHTML='<div class=\\'info-no-img\\'>🎮</div>'"><div class="info-img-overlay"></div><div class="info-title-block"><div class="info-title">${escHtml(g.name)}</div></div></div>`;
  } else {
    imgWrap.innerHTML=`<div style="position:relative"><div class="info-no-img">🎮</div><div class="info-img-overlay"></div><div class="info-title-block"><div class="info-title">${escHtml(g.name)}</div></div></div>`;
  }
  document.getElementById('infoBody').innerHTML=`
    <div class="info-row"><span class="info-label">STATUT</span><span class="info-val">${statusBadge(g.status)}</span></div>
    <div class="info-row"><span class="info-label">NOTE</span><span class="info-val">${starsHtml(g.note)}</span></div>
    <div class="info-row"><span class="info-label">PLATEFORME</span><span class="info-val">${platformHtml(g.platform,16)} ${platformName(g.platform)}</span></div>
    ${g.support?`<div class="info-row"><span class="info-label">SUPPORT</span><span class="info-val">${escHtml(g.support)}</span></div>`:''}
    ${g.annee?`<div class="info-row"><span class="info-label">ANNÉE</span><span class="info-val">${g.annee}</span></div>`:''}
    ${g.noteperso?`<div class="info-row" style="flex-direction:column;gap:.3rem"><span class="info-label">NOTE PERSO</span><div style="background:var(--bg3);border-left:2px solid var(--border);padding:.4rem .6rem;font-size:12px;color:#ccc;font-style:italic;white-space:pre-wrap">${escHtml(g.noteperso)}</div></div>`:''}
    <div class="info-actions">
      <button class="btn-cancel" onclick="closeInfo()">Fermer</button>
      <button class="btn-danger" onclick="closeInfo();delGame('${g.id}')">✕ Supprimer</button>
      <button class="btn-primary" onclick="closeInfo();editGame('${g.id}')">✎ Modifier</button>
    </div>`;
  document.getElementById('infoOverlay').classList.add('open');
}
function closeInfo(){ document.getElementById('infoOverlay').classList.remove('open'); }

// ── EDIT MODAL ──
const slider=document.getElementById('f-note');
const sliderVal=document.getElementById('f-note-val');
const sliderPrev=document.getElementById('f-note-preview');
const sliderFill=document.getElementById('f-note-fill');
function updateSliderUI(){
  const v=parseFloat(slider.value);
  const pct=(v/10)*100;
  if(v===0){
    sliderVal.textContent='—';sliderVal.className='note-slider-val';sliderPrev.innerHTML='';
    sliderFill.style.width='0%';sliderFill.style.background='var(--gold-dim)';
  } else {
    sliderVal.textContent=v;sliderVal.className='note-slider-val '+noteClass(v);sliderPrev.innerHTML=starsHtml(v);
    sliderFill.style.width=pct+'%';sliderFill.style.background=noteColor(v);
  }
}
slider.addEventListener('input',updateSliderUI);

function openModal(game){
  editingId=game?game.id:null;
  document.getElementById('modalTitle').textContent=game?'// ÉDITER':'// AJOUTER UN JEU';
  document.getElementById('f-name').value=game?.name||'';
  document.getElementById('f-annee').value=game?.annee||'';
  document.getElementById('f-platform').value=game?.platform||'steam';
  document.getElementById('f-support').value=game?.support||'';
  document.getElementById('f-status').value=game?.status||'afaire';
  slider.value=(game?.note!=null&&game.note>0)?game.note:0;
  document.getElementById('f-notepersonne').value=game?.noteperso||'';
  // Image field
  resetImgField();
  const existingImg=game?.img||'';
  if(existingImg){
    document.getElementById('f-img').value=existingImg;
    resolvedImgSrc=existingImg;
    const prev=document.getElementById('imgPreview');
    prev.src=existingImg;
    document.getElementById('imgPreviewWrap').style.display='block';
    document.getElementById('imgHint').style.display='none';
  }
  updateSliderUI();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editingId=null; }
function saveGame(){
  const name=document.getElementById('f-name').value.trim(); if(!name){document.getElementById('f-name').focus();return;}
  const dup=games.find(x=>x.id!==editingId && x.name.trim().toLowerCase()===name.toLowerCase());
  if(dup){ alert(`"${name}" existe déjà dans la liste.`); document.getElementById('f-name').focus(); return; }
  const sv=parseFloat(slider.value);
  // Priorité : resolvedImgSrc (détecté depuis URL) ou valeur brute du champ
  const imgVal=resolvedImgSrc||document.getElementById('f-img').value.trim();
  const g={
    id:editingId||uid(), name,
    annee:parseInt(document.getElementById('f-annee').value)||null,
    platform:document.getElementById('f-platform').value,
    support:document.getElementById('f-support').value,
    status:document.getElementById('f-status').value,
    note:sv>0?sv:null,
    img:imgVal,
    noteperso:document.getElementById('f-notepersonne').value.trim(),
  };
  if(editingId){const idx=games.findIndex(x=>x.id===editingId);if(idx!==-1)games[idx]=g;}
  else{games.push(g);}
  save();closeModal();renderGrid();
}
function editGame(id){const g=games.find(x=>x.id===id);if(g)openModal(g);}
function delGame(id){if(!confirm('Supprimer ce jeu ?'))return;games=games.filter(x=>x.id!==id);save();renderGrid();}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── FILTERS ──
document.querySelectorAll('[data-filter]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterStatus=btn.dataset.filter;renderGrid();});});
document.querySelectorAll('[data-platform]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('[data-platform]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterPlatform=btn.dataset.platform;renderGrid();});});
document.getElementById('search').addEventListener('input',renderGrid);
document.getElementById('addBtnTop').addEventListener('click',()=>openModal(null));
document.getElementById('viewGridBtn').addEventListener('click',()=>{document.getElementById('mainContent').classList.remove('compact');document.getElementById('viewGridBtn').classList.add('active');document.getElementById('viewListBtn').classList.remove('active');});
document.getElementById('viewListBtn').addEventListener('click',()=>{document.getElementById('mainContent').classList.add('compact');document.getElementById('viewListBtn').classList.add('active');document.getElementById('viewGridBtn').classList.remove('active');});
function collapseAllYears(){

    collapsedYears.clear();

    const years=[...new Set(games.map(g=>g.annee))];

    years.forEach(y=>{
        collapsedYears.add(String(y===null ? "null" : y));
    });

    renderGrid();
}

function expandAllYears(){

    collapsedYears.clear();

    renderGrid();
}
document.getElementById('cancelBtn').addEventListener('click',closeModal);
document.getElementById('saveBtn').addEventListener('click',saveGame);
// Le formulaire ne se ferme PAS en cliquant sur le fond — utiliser la croix ou le bouton Annuler
document.getElementById('infoClose').addEventListener('click',closeInfo);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeInfo();} // Échap ferme uniquement la fiche info, pas le formulaire
  if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open')){if(document.activeElement?.tagName!=='TEXTAREA')saveGame();}
});

document.getElementById('exportBtn').addEventListener('click',()=>{const b=new Blob([JSON.stringify(games,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='listejeuxréalisés.json';a.click();});
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!Array.isArray(imp))throw new Error();if(!confirm(`Importer ${imp.length} jeux ? Ça remplacera les données actuelles.`))return;games=imp.map(g=>({img:'',...g}));save();renderGrid();}catch{alert('Fichier JSON invalide.');}};
  r.readAsText(file);e.target.value='';
});

const COLLAPSED_KEY = 'backlog_collapsed_years';
const collapsedYears = new Set(JSON.parse(localStorage.getItem(COLLAPSED_KEY)||'[]'));
function toggleYear(yrKey) {
  if(collapsedYears.has(String(yrKey))) {
    collapsedYears.delete(String(yrKey));
  } else {
    collapsedYears.add(String(yrKey));
  }
  localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...collapsedYears]));
  renderGrid();
}

// ── HEADER FLOTTANT AU SCROLL ──
(function(){
  const header=document.querySelector('.app-header');
  function onScroll(){
    if(window.scrollY>10) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  }
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll();
})();

// ── ÉVITER LE ROGNAGE DES CARTES EN BORD D'ÉCRAN (survol/tap) ──
(function(){
  const EDGE = 40; // marge de sécurité en px
  function adjustOrigin(card){
    const r = card.getBoundingClientRect();
    if(r.left < EDGE) card.style.transformOrigin = 'left center';
    else if(window.innerWidth - r.right < EDGE) card.style.transformOrigin = 'right center';
    else card.style.transformOrigin = 'center center';
  }
  document.addEventListener('pointerover', e=>{
    const card = e.target.closest('.game-card');
    if(card) adjustOrigin(card);
  });
  document.addEventListener('touchstart', e=>{
    const card = e.target.closest('.game-card');
    if(card) adjustOrigin(card);
  }, {passive:true});
})();

load().then(renderGrid);
</script>
