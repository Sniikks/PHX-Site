<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHX - Liste de Sniikks</title>
<link rel="shortcut icon" href="https://cdn.discordapp.com/icons/1030553621252821053/2e7356a5d822245ad7953afdb143581a.webp?size=160&quality=lossless">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap');

  :root {
    --bg:#0a0a0c; --bg2:#111114; --bg3:#161619;
    --gold:#e8b84b; --gold2:#c49a30; --gold-dim:#9c7d33;
    --text:#ededf0; --border:#232327;
    --done:#3a6a3a; --abandon:#6a3a3a; --red:#e2685f;
    --note-10:#e2685f; --note-89:#e8a04b; --note-67:#e8cf4b;
    --note-5:#6699e8; --note-34:#a78bfa; --note-12:#5fbf86;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  *:focus-visible { outline:2px solid var(--gold); outline-offset:2px; border-radius:3px; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:var(--bg2); }
  ::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--gold2); }
  body { background:radial-gradient(1200px 600px at 50% -200px, rgba(232,184,75,.08), transparent 60%), var(--bg); color:var(--text); font-family:'Manrope',sans-serif; font-size:14px; line-height:1.5; min-height:100vh; }
body{
    overflow-x:clip;
    max-width:100%;
}

*{
    box-sizing:border-box;
}
  .app-header { position:sticky; top:0; z-index:55; background:var(--bg);  }
  .app-header.scrolled { background:rgba(10,10,12); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:0 8px 22px rgba(0,0,0,.5); }
  .page-header { position:relative; display:flex; align-items:center; justify-content:center; padding:1.1rem 1.4rem .9rem; max-width:1600px; margin:0 auto; }
  .header-io { position:absolute; right:1.4rem; top:50%; transform:translateY(-50%); display:flex; gap:1.2rem; }
  .menu-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);border-radius:10px;color:#e5e5e5;font-family:'Manrope',sans-serif;font-size:12.5px;font-weight:600;letter-spacing:.02em;text-decoration:none;cursor:pointer;transition:all .15s ease;white-space:nowrap;  margin-right: 20px;}
  .menu-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.24);color:#fff;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-icon {   width:28px;height:28px;border-radius:8px;
  background:linear-gradient(155deg,var(--gold) 0%, #c79530 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-weight:700;font-size:13px;color:#0a0a0c;
  flex-shrink:0;
  box-shadow:0 0 0 3px var(--violet-soft); }
  h1 { font-family:'Sora',sans-serif; font-size:clamp(1.2rem,4vw,2rem); color:var(--gold); letter-spacing:.15em; font-weight:400; }
  .inline-stats { display:flex; gap:1rem; align-items:center; flex-shrink:0; }
  .top-stat { text-align:center; line-height:1.15; }
  .top-stat-num { display:block; font-family:'Sora',sans-serif; font-size:1.25rem; font-weight:700; color:var(--gold); }
  .top-stat.is-done .top-stat-num { color:#fff; }
  .top-stat-label { display:block; font-size:9px; letter-spacing:.12em; color:#999; }

  .sticky-header { border-bottom:2px solid var(--border); padding:.6rem 1.4rem .5rem; transition:border-bottom-color .3s ease; }
  .sticky-header.scrolled { border-bottom-color:transparent; }
  .sticky-inner { max-width:1600px; margin:0 auto; }
  .toolbar-row { display:flex; align-items:center; gap:1.1rem; flex-wrap:wrap; justify-content:center; }
  .toolbar-row + .toolbar-row { margin-top:.55rem; }
  .toolbar-row.split { justify-content:center; position:relative; }
  .toolbar-block + .toolbar-row { margin-top:.55rem; }
.row2-right{
    display:flex;
    flex-wrap:nowrap;
    justify-content:flex-end;
    gap:8px;
}
  .stats-years { display:flex; align-items:center; justify-content:center; gap:1.1rem; flex-wrap:wrap; }

  .search-wrap { position:relative; flex-shrink:0; }
  .search-wrap .search-icon { position:absolute; left:.6rem; top:50%; transform:translateY(-50%); font-size:12px; color:#888; pointer-events:none; }
  .search-box { background:var(--bg3); border:1px solid var(--border); color:#fff; font-family:inherit; font-size:12px; padding:.4rem .7rem .4rem 1.7rem; outline:none; transition:all .2s ease; width:190px; border-radius:999px; }
  .search-box:focus { border-color:var(--gold-dim); box-shadow:0 0 0 3px rgba(201,168,76,.15); }
  .search-box::placeholder { color:#888; }

  .status-pills { display:flex; align-items:center; justify-content:center; gap:.4rem; flex-wrap:wrap; }
  .status-pill { background:transparent; border:none; color:#ccc; font-family:inherit; font-size:12.5px; padding:.35rem .8rem; cursor:pointer; letter-spacing:.02em; transition:all .2s ease; white-space:nowrap; border-radius:999px; }
  .status-pill:hover { color:#fff; background:rgba(255,255,255,.06); transform:translateY(-1px); }
  .status-pill .sp-count { font-size:11px; color:#888; margin-left:4px; }
  .status-pill.active { background:var(--gold2); color:#fff; padding:.35rem .85rem; border-radius:999px; box-shadow:0 4px 14px rgba(160,120,48,.35); }
  .status-pill.active:hover { transform:translateY(-1px); background:var(--gold2); }
  .status-pill.active .sp-count { color:rgba(255,255,255,.8); }

  .text-action-btn { background:transparent; border:none; color:#ccc; font-family:inherit; font-size:12.5px; cursor:pointer; transition:color .15s; padding:.3rem .6rem; border-radius:6px; }
  .text-action-btn:hover { color:#fff; background:rgba(255,255,255,.06); }
  .view-toggle { display:flex; gap:.3rem; }
  .view-toggle button { background:transparent; border:1px solid var(--border); color:#999; width:28px; height:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:7px; transition:all .18s ease; font-size:13px; }
  .view-toggle button:hover { border-color:var(--gold-dim); color:#fff; transform:translateY(-1px); }
  .view-toggle button.active { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.1); }
  .add-btn-main { background:linear-gradient(145deg,var(--gold2),var(--gold-dim)); border:1px solid var(--gold); color:#fff; font-family:inherit; font-size:12.5px; font-weight:700; padding:.42rem 1.05rem; cursor:pointer; transition:all .2s ease; letter-spacing:.03em; border-radius:8px; box-shadow:0 3px 10px rgba(0,0,0,.35); }
  .add-btn-main:hover { background:linear-gradient(145deg,var(--gold),var(--gold2)); transform:translateY(-1px); box-shadow:0 6px 16px rgba(160,120,48,.35); }

  .platform-row { display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; justify-content:center; }

  .filter-btn { background:transparent; border:1px solid var(--border); color:#fff; font-family:inherit; font-size:11px; padding:.28rem .65rem; cursor:pointer; transition:all .18s ease; letter-spacing:.04em; white-space:nowrap; border-radius:999px; }
  .filter-btn:hover { border-color:var(--gold-dim); transform:translateY(-1px); }
  .filter-btn.active { background:var(--gold2); border-color:var(--gold); color:#fff; box-shadow:0 3px 10px rgba(160,120,48,.3); }

  .year-filters { display:flex; align-items:center; justify-content:center; gap:.55rem; flex-wrap:wrap; }
  .yf-label { font-size:10px; letter-spacing:.14em; color:#888; margin-right:.15rem; }
  .year-pill { background:transparent; border:none; color:#bbb; font-family:inherit; font-size:11.5px; padding:.22rem .6rem; cursor:pointer; display:inline-flex; align-items:baseline; gap:5px; border-radius:999px; transition:all .18s ease; }
  .year-pill:hover { color:#fff; background:rgba(255,255,255,.06); transform:translateY(-1px); }
  .year-pill .yp-count { color:#777; font-size:10px; }
  .year-pill.active { background:var(--gold2); color:#fff; }
  .year-pill.active .yp-count { color:rgba(255,255,255,.75); }
  .year-pill.tous-pill { color:rgba(255,255,255,.75); border:1px solid var(--gold-dim); }
  .year-pill.tous-pill.active { background:var(--gold2); border-color:var(--gold); }

  .main-content { max-width:1600px; margin:0 auto; padding:.8rem 1rem 3rem; }

  /* ── YEAR / STATUS SECTIONS ── */
  .year-section { margin-bottom:1.6rem; }
  .year-heading { display:flex; align-items:center; gap:.5rem; padding:.35rem .4rem; margin-bottom:.6rem; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; border-radius:6px; transition:background-color .18s ease; }
  .year-heading:hover { background:rgba(255,255,255,.04); }
  .yh-dot { color:var(--gold); font-size:10px; flex-shrink:0; display:inline-block; transition:transform .2s; }
  .year-heading.collapsed .yh-dot { transform:rotate(-90deg); }
  .yh-year { font-family:'Sora',sans-serif; font-size:1.05rem; color:#fff; font-weight:700; letter-spacing:.08em; flex-shrink:0; }
  .yh-count { font-size:10px; color:#999; background:var(--bg3); padding:1px 7px; border-radius:9px; flex-shrink:0; }
  .year-body { overflow:visible; transition:max-height .25s ease, opacity .2s ease; }
  .year-body.collapsed { overflow:hidden; max-height:0 !important; opacity:0; }
  .status-section { margin-bottom:1rem; }
  .status-heading { font-size:10px; letter-spacing:.14em; color:#aaa; padding:.1rem 0 .3rem; display:flex; align-items:center; gap:.45rem; overflow:hidden; }
  .status-heading::before { content:'●'; font-size:7px; }
  .status-heading .sh-count { font-size:10px; color:#999; background:var(--bg3); padding:1px 7px; border-radius:9px; letter-spacing:0; }
  .status-heading::after { content:''; flex:1; border-top:1px solid var(--border); min-width:0; }
  .status-heading.sh-fini { color:#6ac96a; }
  .status-heading.sh-fini::after { border-top-color:#3a6a3a; }
  .status-heading.sh-abandonne { color:#c96a6a; }
  .status-heading.sh-abandonne::after { border-top-color:#6a3a3a; }
  .status-heading.sh-encours { color:#c9a05a; }
  .status-heading.sh-encours::after { border-top-color:#9c7c3a; }
  .status-heading.sh-attente { color:#6aaac9; }
  .status-heading.sh-attente::after { border-top-color:#3a6a9c; }
  .status-heading.sh-afaire { color:#ccc; }
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(126px,1fr)); gap:12px; }
  .main-content.compact .card-grid { grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:8px; }
  .main-content.compact .game-card .card-img-wrap { aspect-ratio:16/10; }
  .main-content.compact .game-card .card-name { font-size:9px; height:24px; }
  .empty-state { color:#aaa; font-size:13px; padding:1.5rem 0; }

  /* ── GAME CARD (style tier list) ── */
  .game-card {
    width:100%;
    cursor:pointer; border:1px solid var(--border); border-radius:7px; overflow:hidden;
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    position:relative; background:var(--bg2);
    animation:cardIn .35s ease backwards;
  }
  .game-card:hover { transform:scale(1.06) translateY(-2px); border-color:var(--gold-dim); box-shadow:0 10px 26px rgba(0,0,0,.55), 0 0 0 1px rgba(201,168,76,.25); z-index:5; }
  .game-card .card-img-wrap { position:relative; width:100%; aspect-ratio:16/10; overflow:hidden; }
  .game-card .card-img-wrap img { transition:transform .3s ease; }
  .game-card:hover .card-img-wrap img { transform:scale(1.09); }
  @keyframes cardIn { from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
  .game-card img { width:100%; height:100%; object-fit:cover; display:block; background:#2a2a27; }
  .game-card .card-no-img {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background:var(--bg3); font-size:36px; color:var(--gold-dim);
  }
  .game-card .card-name {
    font-size:10px; text-align:center; padding:4px 4px 2px;
    line-height:1.2; color:#bbb; overflow:hidden;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    height:30px;
  }
  /* badges sur la carte */
  .card-note {
    position:absolute; top:3px; left:3px;
    font-size:12px; font-family:'Sora',sans-serif; font-weight:700;
    padding:1px 4px; line-height:16px; background:rgba(0,0,0,.82); border-radius:4px;
  }
  .card-platform {
    position:absolute; top:3px; right:3px; font-size:10px; line-height:1;
    background:rgba(0,0,0,.82); border-radius:4px; padding:2px 3px;
  }
  .card-dlc {
    position:absolute; bottom:30px; left:0; right:0;
    font-size:8px; color:#fff; background:rgba(100,70,20,.9);
    text-align:center; letter-spacing:.05em; padding:1px 0;
  }

  .cn-10{color:var(--note-10)} .cn-89{color:var(--note-89)} .cn-67{color:var(--note-67)}
  .cn-5{color:var(--note-5)} .cn-34{color:var(--note-34)} .cn-12{color:var(--note-12)}

  /* ══ OVERLAY ══ */
  .overlay { display:none; position:fixed; inset:0; background:rgba(10,10,9,.72); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center; pointer-events:none; }
  .overlay .modal { pointer-events:auto; }
  .overlay.open { display:flex; pointer-events:auto; }
  @keyframes modalIn { from{ opacity:0; transform:scale(.96) translateY(10px); } to{ opacity:1; transform:scale(1) translateY(0); } }

  /* ── EDIT/ADD MODAL ── */
  .modal { background:var(--bg2); border:1px solid var(--gold-dim); border-radius:14px; padding:1.4rem; width:min(500px,95vw); max-height:90vh; overflow-y:auto; box-shadow:0 20px 50px rgba(0,0,0,.55); animation:modalIn .22s ease; }
  .modal h2 { font-family:'Sora',sans-serif; color:var(--gold); font-size:1rem; font-weight:400; letter-spacing:.1em; margin-bottom:1.1rem; }
  .form-row { margin-bottom:.75rem; }
  .form-row label { display:block; font-size:11px; color:#ccc; letter-spacing:.1em; margin-bottom:.25rem; }
  .form-row input,.form-row select,.form-row textarea { width:100%; background:var(--bg3); border:1px solid var(--border); color:#fff; font-family:inherit; font-size:13px; padding:.35rem .55rem; outline:none; transition:all .2s ease; border-radius:6px; }
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus { border-color:var(--gold-dim); box-shadow:0 0 0 3px rgba(201,168,76,.12); }
  .form-row select option { background:var(--bg2); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
  .note-hint { color:#888; font-weight:400; text-transform:none; letter-spacing:0; }
  .note-bar-row { display:flex; align-items:center; gap:12px; margin-top:6px; }
  .note-bar-wrap { position:relative; flex:1; height:15px; }
  .note-bar-track { position:absolute; inset:0; background:var(--bg3); border-radius:8px; border:1px solid var(--border); }
  .note-bar-fill { position:absolute; left:0; top:0; bottom:0; width:0%; border-radius:7px; background:var(--gold-dim); transition:width .12s ease, background-color .12s ease; }
  .note-range-input { position:absolute; inset:0; width:100%; height:100%; margin:0; opacity:0; cursor:pointer; -webkit-appearance:none; appearance:none; }
  .note-slider-val { font-size:1.3rem; font-weight:700; min-width:34px; text-align:right; color:#fff; font-family:'Sora',sans-serif; }
  .note-stars-preview { font-size:13px; margin-top:8px; min-height:18px; }
  .modal-actions { display:flex; gap:.5rem; justify-content:flex-end; margin-top:1.1rem; }
  .btn-primary { background:linear-gradient(145deg,var(--gold2),var(--gold-dim)); border:1px solid var(--gold); color:#fff; font-family:inherit; font-size:12px; padding:.4rem 1.1rem; cursor:pointer; letter-spacing:.08em; transition:all .18s ease; border-radius:7px; }
  .btn-primary:hover { background:linear-gradient(145deg,var(--gold),var(--gold2)); transform:translateY(-1px); box-shadow:0 5px 14px rgba(160,120,48,.35); }
  .btn-cancel { background:transparent; border:1px solid var(--border); color:#ccc; font-family:inherit; font-size:12px; padding:.4rem 1.1rem; cursor:pointer; transition:all .18s ease; border-radius:7px; }
  .btn-cancel:hover { border-color:#ccc; color:#fff; transform:translateY(-1px); }
  .btn-danger { background:transparent; border:1px solid var(--abandon); color:#c96a6a; font-family:inherit; font-size:12px; padding:.4rem 1.1rem; cursor:pointer; transition:all .18s ease; border-radius:7px; }
  .btn-danger:hover { background:var(--abandon); color:#fff; transform:translateY(-1px); }

  /* image field */
  .url-hint { font-size:10px; color:#888; margin-top:.2rem; }
  .url-detect { font-size:10px; color:var(--gold); margin-top:.2rem; display:none; }
  .img-preview-wrap { margin-top:.5rem; display:none; }
  .img-preview-wrap img { width:120px; height:56px; object-fit:cover; border:1px solid var(--border); display:block; }

  /* ── INFO POPUP ── */
  .info-overlay { display:none; position:fixed; inset:0; background:rgba(10,10,9,.76); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:300; align-items:center; justify-content:center; pointer-events:none; }
  .info-overlay .info-modal { pointer-events:auto; }
  .info-overlay.open { display:flex; pointer-events:auto; }
  .info-modal { background:var(--bg2); border:1px solid var(--gold-dim); border-radius:14px; width:min(460px,95vw); max-height:88vh; overflow-y:auto; position:relative; box-shadow:0 20px 50px rgba(0,0,0,.55); animation:modalIn .22s ease; }
  .info-img-wrap { position:relative; width:100%; height:160px; overflow:hidden; }
  .info-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .info-no-img { width:100%; height:160px; display:flex; align-items:center; justify-content:center; font-size:52px; background:var(--bg3); }
  .info-img-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(0,0,0,.05) 0%, rgba(20,20,18,.95) 100%); }
  .info-title-block { position:absolute; bottom:.8rem; left:1rem; right:3rem; }
  .info-title { font-family:'Sora',sans-serif; font-size:1.05rem; color:#fff; font-weight:700; line-height:1.2; }
  .info-close { position:absolute; top:.6rem; right:.7rem; background:rgba(0,0,0,.6); border:1px solid var(--border); color:#fff; font-family:inherit; font-size:16px; width:26px; height:26px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .18s ease; line-height:1; z-index:5; border-radius:8px; }
  .info-close:hover { border-color:var(--gold); color:var(--gold); transform:translateY(-1px); }
  .info-body { padding:1rem 1.2rem 1.4rem; }
  .info-row { display:flex; align-items:flex-start; gap:.6rem; margin-bottom:.65rem; font-size:12px; }
  .info-label { color:#888; min-width:80px; font-size:11px; letter-spacing:.08em; padding-top:1px; }
  .info-val { color:#fff; flex:1; word-break:break-word; }
  .info-actions { display:flex; gap:.5rem; margin-top:1rem; justify-content:flex-end; }

  /* status badges */
  .status-badge { font-size:11px; padding:2px 8px; border:1px solid; white-space:nowrap; display:inline-block; border-radius:999px; }
  .status-afaire    { border-color:var(--border); color:#fff; }
  .status-encours   { border-color:#9c7c3a; color:#c9a05a; }
  .status-fini      { border-color:var(--done); color:#6ac96a; }
  .status-abandonne { border-color:var(--abandon); color:#c96a6a; }
  .status-attente   { border-color:#3a6a9c; color:#6aaac9; }

  /* stars */
  .stars-wrap { display:inline-flex; align-items:center; gap:1px; }
  .star-pair { position:relative; display:inline-block; width:11px; height:14px; font-size:12px; }
  .star-pair .s-empty { color:var(--border); position:absolute; left:0; top:0; }
  .star-pair .s-full  { color:inherit; position:absolute; left:0; top:0; overflow:hidden; white-space:nowrap; }
  .star-val { font-size:11px; color:#fff; margin-left:5px; }
  .note-10{color:var(--note-10)} .note-89{color:var(--note-89)} .note-67{color:var(--note-67)}
  .note-5{color:var(--note-5)} .note-34{color:var(--note-34)} .note-12{color:var(--note-12)}

  input[type="file"] { display:none; }

  .platform-icon { display:inline-flex; align-items:center; justify-content:center; vertical-align:middle; }
  .platform-icon svg { width:100%; height:100%; }
  .platform-emoji { vertical-align:middle; }

  @media (max-width:640px) {
    .page-header{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}
.brand{
    order:1;
}
    .header-io{
    order:2;
    position:static;
    width:100%;
    display:flex;
    justify-content:flex-end;
    gap:8px;
}

    .sticky-header { padding:.6rem .8rem .5rem; }
    .toolbar-row, .toolbar-row.split { flex-direction:column; align-items:stretch; justify-content:flex-start; gap:.55rem; }
    .toolbar-row.split { position:static; }

    .row2-right { position:static; transform:none; width:100%; justify-content:center; }
    .toolbar-row.split .search-wrap { position:relative; transform:none; width:100%; }
    .search-wrap{
    flex:1;
}

.search-box{

// ── STEAM IMAGE DETECTION (même logique que tier list) ──
function extractSteamAppId(url) {
  const m = url.match(/store\.steampowered\.com(?:\/agecheck)?\/app\/(\d+)/i);
  return m ? m[1] : null;
}
function buildSteamUrl(appId) {
  return `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/header.jpg`;
}
function steamFallback(appId) {
  return `https://cdn.akamai.steamstatic.com/steam/apps/${appId}/header.jpg`;
}

function onImgInput() {
  clearTimeout(urlTimer);
  const url = document.getElementById('f-img').value.trim();
  const hint   = document.getElementById('imgHint');
  const detect = document.getElementById('imgDetect');
  const wrap   = document.getElementById('imgPreviewWrap');
  const prev   = document.getElementById('imgPreview');
  resolvedImgSrc = '';

  if (!url) {
    hint.style.display='block'; detect.style.display='none'; wrap.style.display='none'; return;
  }

  urlTimer = setTimeout(() => {
    const appId = extractSteamAppId(url);
    if (appId) {
      const imgUrl = buildSteamUrl(appId);
      resolvedImgSrc = imgUrl;
      prev.src = imgUrl;
      wrap.style.display = 'block';
      prev.onload = () => {
        hint.style.display='none';
        detect.textContent='✅ Image Steam détectée !';
        detect.style.display='block';
      };
      prev.onerror = () => {
        const fb = steamFallback(appId);
        resolvedImgSrc = fb; prev.src = fb;
        prev.onload = () => { hint.style.display='none'; detect.textContent='✅ Image Steam (fallback)'; detect.style.display='block'; };
        prev.onerror = () => { detect.textContent='⚠ Image non chargée — colle une URL directe (.jpg/.png)'; detect.style.display='block'; hint.style.display='none'; };
      };
      // Auto-remplir le nom si vide
      const nameField = document.getElementById('f-name');
      if (!nameField.value.trim()) {
        const parts = url.split('/').filter(Boolean);
        const slug  = parts[parts.length-1];
        if (slug && isNaN(slug)) {
          let name = slug;
          try { name = decodeURIComponent(slug); } catch(e) {}
          name = name.replace(/_/g,' ').replace(/(?:^|\s)\S/g, c=>c.toUpperCase());
          nameField.value = name;
        }
      }
    } else {
      // URL directe d'image
      resolvedImgSrc = url;
      prev.src = url;
      wrap.style.display = 'block';
      hint.style.display = 'none';
      detect.style.display = 'none';
    }
  }, 350);
}

function resetImgField() {
  document.getElementById('f-img').value = '';
  document.getElementById('imgHint').style.display = 'block';
  document.getElementById('imgDetect').style.display = 'none';
  document.getElementById('imgPreviewWrap').style.display = 'none';

  resolvedImgSrc = '';
}

  if (!n||n<=0) return '';
  if (n===10) return 'note-10';
  if (n>=8)   return 'note-89';
  if (n>=6)   return 'note-67';
  if (n===5)  return 'note-5';
  if (n>=3)   return 'note-34';
  return 'note-12';
}
function noteClassCard(n) { return noteClass(n).replace('note-','cn-'); }
function noteColor(n) {
  if (!n||n<=0) return '';
  if (n===10) return 'var(--note-10)';
  if (n>=8)   return 'var(--note-89)';
  if (n>=6)   return 'var(--note-67)';
  if (n===5)  return 'var(--note-5)';
  if (n>=3)   return 'var(--note-34)';
  return 'var(--note-12)';
}
function starsHtml(note) {
  if (note===null||note===undefined||note<=0) return '<span style="color:var(--border)">—</span>';
  const cls=noteClass(note);
  let html=`<span class="stars-wrap ${cls}">`;
  for(let i=1;i<=10;i++){
    const pct=Math.round(Math.min(1,Math.max(0,note-(i-1)))*100);
    html+=`<span class="star-pair"><span class="s-empty">★</span><span class="s-full" style="width:${pct}%">★</span></span>`;
  }
  html+=`<span class="star-val">${note}</span></span>`;
  return html;
}

async function load() {
  RemoteStore.setStatusElement(document.getElementById('dbStatus'));
  await RemoteStore.init([STORAGE_KEY]);
  try {
    let remote = RemoteStore.get(STORAGE_KEY, null);
    if (remote && Array.isArray(remote)) {
      games = remote;
    } else {
      // Rien en base : migration depuis un éventuel ancien localStorage, sinon jeu de données par défaut
      const old = localStorage.getItem('backlog_jeux_v3') || localStorage.getItem('backlog_jeux_v4');
      if (old) {
        const parsed = JSON.parse(old);
        games = parsed.map(g => ({ img:'', ...g }));
      } else {
        games = EXCEL_DATA.map(g=>({...g}));
      }
      save();
    }
    // S'assurer que tous les jeux ont le champ img
    games = games.map(g => ({ img:'', ...g }));
  } catch(e) { console.error(e); games = EXCEL_DATA.map(g=>({...g})); }
}
function save() { RemoteStore.set(STORAGE_KEY, games); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── CARD RENDERING ──
function cardImgHtml(g) {
  const src = g.img || '';
  if (src) return `<div class="card-img-wrap"><img src="${escHtml(src)}" alt="${escHtml(g.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-no-img" style="display:none">🎮</div></div>`;
  return `<div class="card-img-wrap"><div class="card-no-img">🎮</div></div>`;
}

function cardHtml(g) {
  const nc = noteClassCard(g.note);
  const noteLabel = (g.note!=null&&g.note>0) ? `<span class="card-note ${nc}">${g.note}</span>` : '';
  const platHtml  = `<span class="card-platform">${platformHtml(g.platform,16)}</span>`;
  const dlcHtml   = g.support ? `<span class="card-dlc">${escHtml(g.support)}</span>` : '';
  return `<div class="game-card" data-id="${g.id}" onclick="openInfo('${g.id}')" title="${escHtml(g.name)}">
    ${cardImgHtml(g)}
    ${noteLabel}${platHtml}${dlcHtml}
    <div class="card-name">${escHtml(g.name)}</div>
  </div>`;
}

// ── STATS ──
function renderStats(list) {
  document.getElementById('statTotal').textContent = games.length;
  document.getElementById('statDone').textContent = games.filter(g=>g.status==='fini').length;
  renderYearFilters();
  renderStatusCounts();
}

function renderStatusCounts() {
  const q=document.getElementById('search').value.toLowerCase().trim();
  const base = games.filter(g=>{
    const mq=!q||g.name.toLowerCase().includes(q);
    const mp=filterPlatform==='tous'||g.platform===filterPlatform;
    const my=filterYear==='tous'||g.annee===filterYear;
    return mq&&mp&&my;
  });
  document.getElementById('cnt-tous').textContent = base.length;
  document.getElementById('cnt-fini').textContent = base.filter(g=>g.status==='fini').length;
  document.getElementById('cnt-encours').textContent = base.filter(g=>g.status==='encours').length;
  document.getElementById('cnt-abandonne').textContent = base.filter(g=>g.status==='abandonne').length;
  document.getElementById('cnt-attente').textContent = base.filter(g=>g.status==='attente').length;
  document.getElementById('cnt-afaire').textContent = base.filter(g=>g.status==='afaire').length;
}

function renderYearFilters() {
  // base list: respects status/platform/search filters but ignores the year filter itself
  const q=document.getElementById('search').value.toLowerCase().trim();
  const base = games.filter(g=>{
    const mq=!q||g.name.toLowerCase().includes(q);
    const ms=filterStatus==='tous'||
      (filterStatus==='afaire'&&g.status==='afaire')||(filterStatus==='encours'&&g.status==='encours')||
      (filterStatus==='fini'&&(g.status==='fini'))||(filterStatus==='attente'&&g.status==='attente')||
      (filterStatus==='abandonne'&&g.status==='abandonne');
    const mp=filterPlatform==='tous'||g.platform===filterPlatform;
    return mq&&ms&&mp;
  });
  const years=[...new Set(base.map(g=>g.annee))].filter(y=>y!=null).sort((a,b)=>b-a);
  let html=`<button class="year-pill tous-pill${filterYear==='tous'?' active':''}" onclick="setYearFilter('tous')">Toutes</button>`;
  years.forEach(y=>{
    const c=base.filter(g=>g.annee===y).length;
    html+=`<button class="year-pill${filterYear===y?' active':''}" onclick="setYearFilter(${y})">${y} <span class="yp-count">${c}</span></button>`;
  });
  document.getElementById('yearFilters').innerHTML=html;
}
function setYearFilter(y){ filterYear=y; renderGrid(); }

// ── FILTER ──
function getFiltered() {
  const q=document.getElementById('search').value.toLowerCase().trim();
  return games.filter(g=>{
    const mq=!q||g.name.toLowerCase().includes(q);
    const ms=filterStatus==='tous'||
      (filterStatus==='afaire'&&g.status==='afaire')||(filterStatus==='encours'&&g.status==='encours')||
      (filterStatus==='fini'&&(g.status==='fini'))||(filterStatus==='attente'&&g.status==='attente')||
      (filterStatus==='abandonne'&&g.status==='abandonne');
    const mp=filterPlatform==='tous'||g.platform===filterPlatform;
    const my=filterYear==='tous'||g.annee===filterYear;
    return mq&&ms&&mp&&my;
  });
}

const STATUS_GROUPS=[
  {key:'encours',label:'EN COURS',statuses:['encours']},
  {key:'attente',label:'EN ATTENTE / BUG',statuses:['attente']},
  {key:'fini',label:'TERMINÉS',statuses:['fini']},
  {key:'abandonne',label:'ABANDONNÉS',statuses:['abandonne']},
  {key:'afaire',label:'À FAIRE',statuses:['afaire']},
];

function renderGrid() {
  const filtered=getFiltered(); renderStats(filtered);
  const years=[...new Set(games.map(g=>g.annee))].sort((a,b)=>{if(a===null&&b===null)return 0;if(a===null)return 1;if(b===null)return-1;return b-a;});
  let html='';
  for(const yr of years){
    const yg=filtered.filter(g=>g.annee===yr); if(!yg.length) continue;
    const yrKey=yr===null?'null':yr;
    const isCollapsed=collapsedYears.has(String(yrKey));
    const yearLabel = yr===null?'JEUX À FAIRE':String(yr);
    html+=`<div class="year-section"><div class="year-heading${isCollapsed?' collapsed':''}" onclick="toggleYear('${yrKey}')"><span class="yh-dot">▾</span><span class="yh-year">${yearLabel}</span><span class="yh-count">${yg.length}</span></div><div class="year-body${isCollapsed?' collapsed':''}" id="yr-body-${yrKey}" style="max-height:${isCollapsed?'0':'9999px'}">`;
    for(const grp of STATUS_GROUPS){
      const rows=yg.filter(g=>grp.statuses.includes(g.status)).sort((a,b)=>{const na=a.note??-1,nb=b.note??-1;if(nb!==na)return nb-na;return(a.name||'').localeCompare(b.name||'');});
      if(!rows.length) continue;
      html+=`<div class="status-section"><div class="status-heading sh-${grp.key}">${grp.label}<span class="sh-count">${rows.length}</span></div><div class="card-grid">`;
      rows.forEach(g=>{html+=cardHtml(g);});
      html+=`</div></div>`;
    }
    html+=`</div></div>`;
  }
  if(!html) html=`<div class="empty-state">Aucun jeu trouvé.</div>`;
  document.getElementById('mainContent').innerHTML=html;
}

function openInfo(id) {
  if(document.getElementById('overlay').classList.contains('open')) return;
  const g=games.find(x=>x.id===id); if(!g) return;
  const imgWrap=document.getElementById('infoImgWrap');
  if(g.img){
    imgWrap.innerHTML=`<div class="info-img-wrap"><img src="${escHtml(g.img)}" onerror="this.parentNode.innerHTML='<div class=\\'info-no-img\\'>🎮</div>'"><div class="info-img-overlay"></div><div class="info-title-block"><div class="info-title">${escHtml(g.name)}</div></div></div>`;
  } else {
    imgWrap.innerHTML=`<div style="position:relative"><div class="info-no-img">🎮</div><div class="info-img-overlay"></div><div class="info-title-block"><div class="info-title">${escHtml(g.name)}</div></div></div>`;
  }
  document.getElementById('infoBody').innerHTML=`
    <div class="info-row"><span class="info-label">STATUT</span><span class="info-val">${statusBadge(g.status)}</span></div>
    <div class="info-row"><span class="info-label">NOTE</span><span class="info-val">${starsHtml(g.note)}</span></div>
    <div class="info-row"><span class="info-label">PLATEFORME</span><span class="info-val">${platformHtml(g.platform,16)} ${platformName(g.platform)}</span></div>
    ${g.support?`<div class="info-row"><span class="info-label">SUPPORT</span><span class="info-val">${escHtml(g.support)}</span></div>`:''}
    ${g.annee?`<div class="info-row"><span class="info-label">ANNÉE</span><span class="info-val">${g.annee}</span></div>`:''}
    ${g.noteperso?`<div class="info-row" style="flex-direction:column;gap:.3rem"><span class="info-label">NOTE PERSO</span><div style="background:var(--bg3);border-left:2px solid var(--border);padding:.4rem .6rem;font-size:12px;color:#ccc;font-style:italic;white-space:pre-wrap">${escHtml(g.noteperso)}</div></div>`:''}
    <div class="info-actions">
      <button class="btn-cancel" onclick="closeInfo()">Fermer</button>
      <button class="btn-danger" onclick="closeInfo();delGame('${g.id}')">✕ Supprimer</button>
      <button class="btn-primary" onclick="closeInfo();editGame('${g.id}')">✎ Modifier</button>
    </div>`;
  document.getElementById('infoOverlay').classList.add('open');
}
function closeInfo(){ document.getElementById('infoOverlay').classList.remove('open'); }

// ── EDIT MODAL ──
const slider=document.getElementById('f-note');
const sliderVal=document.getElementById('f-note-val');
const sliderPrev=document.getElementById('f-note-preview');
const sliderFill=document.getElementById('f-note-fill');
function updateSliderUI(){
  const v=parseFloat(slider.value);
  const pct=(v/10)*100;
  if(v===0){
    sliderVal.textContent='—';sliderVal.className='note-slider-val';sliderPrev.innerHTML='';
    sliderFill.style.width='0%';sliderFill.style.background='var(--gold-dim)';
  } else {
    sliderVal.textContent=v;sliderVal.className='note-slider-val '+noteClass(v);sliderPrev.innerHTML=starsHtml(v);
    sliderFill.style.width=pct+'%';sliderFill.style.background=noteColor(v);
  }
}
slider.addEventListener('input',updateSliderUI);

function openModal(game){
  editingId=game?game.id:null;
  document.getElementById('modalTitle').textContent=game?'// ÉDITER':'// AJOUTER UN JEU';
  document.getElementById('f-name').value=game?.name||'';
  document.getElementById('f-annee').value=game?.annee||'';
  document.getElementById('f-platform').value=game?.platform||'steam';
  document.getElementById('f-support').value=game?.support||'';
  document.getElementById('f-status').value=game?.status||'afaire';
  slider.value=(game?.note!=null&&game.note>0)?game.note:0;
  document.getElementById('f-notepersonne').value=game?.noteperso||'';
  // Image field
  resetImgField();
  const existingImg=game?.img||'';
  if(existingImg){
    document.getElementById('f-img').value=existingImg;
    resolvedImgSrc=existingImg;
    const prev=document.getElementById('imgPreview');
    prev.src=existingImg;
    document.getElementById('imgPreviewWrap').style.display='block';
    document.getElementById('imgHint').style.display='none';
  }
  updateSliderUI();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editingId=null; }
function saveGame(){
  const name=document.getElementById('f-name').value.trim(); if(!name){document.getElementById('f-name').focus();return;}
  const dup=games.find(x=>x.id!==editingId && x.name.trim().toLowerCase()===name.toLowerCase());
  if(dup){ alert(`"${name}" existe déjà dans la liste.`); document.getElementById('f-name').focus(); return; }
  const sv=parseFloat(slider.value);
  // Priorité : resolvedImgSrc (détecté depuis URL) ou valeur brute du champ
  const imgVal=resolvedImgSrc||document.getElementById('f-img').value.trim();
  const g={
    id:editingId||uid(), name,
    annee:parseInt(document.getElementById('f-annee').value)||null,
    platform:document.getElementById('f-platform').value,
    support:document.getElementById('f-support').value,
    status:document.getElementById('f-status').value,
    note:sv>0?sv:null,
    img:imgVal,
    noteperso:document.getElementById('f-notepersonne').value.trim(),
  };
  if(editingId){const idx=games.findIndex(x=>x.id===editingId);if(idx!==-1)games[idx]=g;}
  else{games.push(g);}
  save();closeModal();renderGrid();
}
function editGame(id){const g=games.find(x=>x.id===id);if(g)openModal(g);}
function delGame(id){if(!confirm('Supprimer ce jeu ?'))return;games=games.filter(x=>x.id!==id);save();renderGrid();}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── FILTERS ──
document.querySelectorAll('[data-filter]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterStatus=btn.dataset.filter;renderGrid();});});
document.querySelectorAll('[data-platform]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('[data-platform]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filterPlatform=btn.dataset.platform;renderGrid();});});
document.getElementById('search').addEventListener('input',renderGrid);
document.getElementById('addBtnTop').addEventListener('click',()=>openModal(null));
document.getElementById('viewGridBtn').addEventListener('click',()=>{document.getElementById('mainContent').classList.remove('compact');document.getElementById('viewGridBtn').classList.add('active');document.getElementById('viewListBtn').classList.remove('active');});
document.getElementById('viewListBtn').addEventListener('click',()=>{document.getElementById('mainContent').classList.add('compact');document.getElementById('viewListBtn').classList.add('active');document.getElementById('viewGridBtn').classList.remove('active');});
function collapseAllYears(){

    collapsedYears.clear();

    const years=[...new Set(games.map(g=>g.annee))];

    years.forEach(y=>{
        collapsedYears.add(String(y===null ? "null" : y));
    });

    renderGrid();
}

function expandAllYears(){

    collapsedYears.clear();

    renderGrid();
}
document.getElementById('cancelBtn').addEventListener('click',closeModal);
document.getElementById('saveBtn').addEventListener('click',saveGame);
// Le formulaire ne se ferme PAS en cliquant sur le fond — utiliser la croix ou le bouton Annuler
document.getElementById('infoClose').addEventListener('click',closeInfo);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeInfo();} // Échap ferme uniquement la fiche info, pas le formulaire
  if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open')){if(document.activeElement?.tagName!=='TEXTAREA')saveGame();}
});

document.getElementById('exportBtn').addEventListener('click',()=>{const b=new Blob([JSON.stringify(games,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='listejeuxréalisés.json';a.click();});
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!Array.isArray(imp))throw new Error();if(!confirm(`Importer ${imp.length} jeux ? Ça remplacera les données actuelles.`))return;games=imp.map(g=>({img:'',...g}));save();renderGrid();}catch{alert('Fichier JSON invalide.');}};
  r.readAsText(file);e.target.value='';
});

const COLLAPSED_KEY = 'backlog_collapsed_years';
const collapsedYears = new Set(JSON.parse(localStorage.getItem(COLLAPSED_KEY)||'[]'));
function toggleYear(yrKey) {
  if(collapsedYears.has(String(yrKey))) {
    collapsedYears.delete(String(yrKey));
  } else {
    collapsedYears.add(String(yrKey));
  }
  localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...collapsedYears]));
  renderGrid();
}

// ── HEADER FLOTTANT AU SCROLL ──
(function(){
  const header=document.querySelector('.app-header');
  function onScroll(){
    if(window.scrollY>10) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  }
  window.addEventListener('scroll',onScroll,{passive:true});
  onScroll();
})();

// ── ÉVITER LE ROGNAGE DES CARTES EN BORD D'ÉCRAN (survol/tap) ──
(function(){
  const EDGE = 40; // marge de sécurité en px
  function adjustOrigin(card){
    const r = card.getBoundingClientRect();
    if(r.left < EDGE) card.style.transformOrigin = 'left center';
    else if(window.innerWidth - r.right < EDGE) card.style.transformOrigin = 'right center';
    else card.style.transformOrigin = 'center center';
  }
  document.addEventListener('pointerover', e=>{
    const card = e.target.closest('.game-card');
    if(card) adjustOrigin(card);
  });
  document.addEventListener('touchstart', e=>{
    const card = e.target.closest('.game-card');
    if(card) adjustOrigin(card);
  }, {passive:true});
})();

load().then(renderGrid);
</script>
