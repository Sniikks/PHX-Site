<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Accueil</title>
<meta name="description" content="PHX — hub de jeux entre potes : bracket, ZoomJeu quotidien, listes et tier lists de jeux vidéo.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>

  :root {
    /* --- palette CYBERCORE (identique au reste du site) --- */
    --bg:#0a0a0f; --bg2:#111117; --bg3:#15151d;
    --cyan:#00f0ff; --magenta:#ff2a6d; --yellow:#fcee0a; --green:#05ffa1;
    --chrome:#b4b4b4;
    --gold:#00f0ff; --gold2:#0ba8b8; --gold-dim:#0a3a3d; /* alias conservés pour nav.js */
    --text:#e8f6f8; --text2:#7d8b8d;
    --border:#1c2b2d;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { overflow-x:clip; }
  html, body { min-height:100%; }
  body {
    position:relative;
    overflow-x:clip; max-width:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:3rem 1.2rem 2rem;
    padding-left:max(1.2rem, env(safe-area-inset-left));
    padding-right:max(1.2rem, env(safe-area-inset-right));
    padding-bottom:max(2rem, env(safe-area-inset-bottom));
    isolation:isolate;
  }

  /* ---------- ambiance HUD : grille + glow + scanlines + bruit ---------- */
  .bg-grid {
    position:fixed; inset:-2px; z-index:-3; pointer-events:none;
    background-image:
      linear-gradient(rgba(0,240,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,.05) 1px, transparent 1px);
    background-size:56px 56px;
    mask-image:radial-gradient(ellipse 80% 60% at 50% 30%, #000 40%, transparent 90%);
  }
  .bg-blob { position:fixed; z-index:-2; border-radius:50%; filter:blur(100px); opacity:.30; pointer-events:none; }
  .bg-blob.b1 { width:44vmax; height:44vmax; top:-16vmax; left:-12vmax; background:var(--cyan); animation:phxFloat1 24s ease-in-out infinite alternate; }
  .bg-blob.b2 { width:38vmax; height:38vmax; bottom:-16vmax; right:-10vmax; background:var(--magenta); animation:phxFloat2 28s ease-in-out infinite alternate; }
  @keyframes phxFloat1 { from{transform:translate(0,0);} to{transform:translate(3vmax,4vmax);} }
  @keyframes phxFloat2 { from{transform:translate(0,0);} to{transform:translate(-3vmax,-3vmax);} }

  .bg-grain {
    position:fixed; inset:-10%; z-index:-1; pointer-events:none;
    opacity:.045; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .bg-scan {
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(0,240,255,.035) 0px, rgba(0,240,255,.035) 1px, transparent 1px, transparent 3px);
    opacity:.5;
  }
  .bg-sweep {
    position:fixed; left:0; right:0; height:120px; z-index:-1; pointer-events:none;
    background:linear-gradient(to bottom, transparent, rgba(0,240,255,.06), transparent);
    animation:sweep 7s linear infinite;
  }
  @keyframes sweep { 0%{ top:-120px; } 100%{ top:100%; } }

  /* ---------- en-tête ---------- */
  header { text-align:center; margin-bottom:2.8rem; max-width:640px; }

  .eyebrow {
    font-family:'Share Tech Mono',monospace;
    font-size:11px; letter-spacing:.3em;
    color:var(--green); text-transform:uppercase;
    display:inline-flex; align-items:center; gap:.55rem;
    margin-bottom:1.2rem;
    border:1px solid rgba(5,255,161,.35);
    padding:.35rem .8rem;
    background:rgba(5,255,161,.05);
  }
  .eyebrow .dot {
    width:6px; height:6px; border-radius:50%; background:var(--green);
    box-shadow:0 0 8px var(--green); animation:blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }

  .title {
    position:relative;
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:clamp(3rem, 14vw, 6.2rem);
    line-height:1;
    letter-spacing:.05em;
    color:var(--text);
    text-shadow:
      2px 0 0 rgba(0,240,255,.65),
      -2px 0 0 rgba(255,42,109,.65);
    animation:glitch 5s steps(1) infinite;
  }
  @keyframes glitch {
    0%, 91%, 100% { text-shadow:2px 0 0 rgba(0,240,255,.65), -2px 0 0 rgba(255,42,109,.65); transform:translate(0,0); }
    92% { text-shadow:-3px 1px 0 rgba(0,240,255,.8), 3px -1px 0 rgba(255,42,109,.8); transform:translate(-1px,0); clip-path:inset(10% 0 60% 0); }
    93% { text-shadow:3px -1px 0 rgba(0,240,255,.8), -3px 1px 0 rgba(255,42,109,.8); transform:translate(1px,0); clip-path:inset(60% 0 5% 0); }
    94% { text-shadow:2px 0 0 rgba(0,240,255,.65), -2px 0 0 rgba(255,42,109,.65); transform:translate(0,0); clip-path:none; }
  }

  .subtitle {
    font-family:'Share Tech Mono',monospace;
    color:var(--text2); font-size:12px; letter-spacing:.28em; text-transform:uppercase;
    margin-top:1.1rem;
  }
  .prompt {
    font-family:'Share Tech Mono',monospace;
    color:var(--cyan); font-size:13px; letter-spacing:.04em;
    margin-top:1.4rem;
  }
  .prompt::after {
    content:'_'; margin-left:2px; animation:blink 1s step-end infinite;
  }

  /* ---------- grille des modules ---------- */
  .grid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:1.4rem;
    width:100%;
    max-width:920px;
    margin-top:.8rem;
  }

  .tile {
    --accent:var(--cyan);
    position:relative;
    background:
      linear-gradient(160deg, color-mix(in srgb, var(--accent) 10%, transparent), transparent 55%),
      var(--bg2);
    border:1px solid color-mix(in srgb, var(--accent) 45%, var(--border));
    clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 0 100%);
    aspect-ratio:3/4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.85rem;
    text-decoration:none;
    color:var(--text);
    overflow:visible;
    transition:transform .22s ease, border-color .22s ease, box-shadow .3s ease, background .25s ease;
  }
  .tile:nth-child(1) { --accent:var(--magenta); }
  .tile:nth-child(2) { --accent:var(--cyan); }
  .tile:nth-child(3) { --accent:var(--yellow); }
  .tile:nth-child(4) { --accent:var(--green); }
  .tile:nth-child(5) { --accent:var(--magenta); }
  .tile:nth-child(6) { --accent:var(--cyan); }

  /* coins HUD */
  .tile::before, .tile::after {
    content:''; position:absolute; width:14px; height:14px; pointer-events:none;
    border-color:var(--accent); opacity:.9;
  }
  .tile::before { top:-1px; left:-1px; border-top:2px solid; border-left:2px solid; }
  .tile::after { bottom:-1px; right:-1px; border-bottom:2px solid; border-right:2px solid; }

  .tile-tag {
    position:absolute; top:10px; left:12px;
    font-family:'Share Tech Mono',monospace;
    font-size:9.5px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent); z-index:2;
  }
  .tile-tag::before { content:'['; margin-right:2px; }
  .tile-tag::after { content:']'; margin-left:2px; }

  .tile:not(.disabled):hover {
    transform:translateY(-6px);
    background:
      linear-gradient(160deg, color-mix(in srgb, var(--accent) 18%, transparent), transparent 60%),
      var(--bg2);
    border-color:var(--accent);
    box-shadow:0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent), 0 0 34px color-mix(in srgb, var(--accent) 45%, transparent);
  }

  .tile-icon {
    width:56px; height:56px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.65rem;
    background:color-mix(in srgb, var(--accent) 14%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 50%, transparent);
    clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    z-index:1;
  }
  .tile-label {
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    font-size:.76rem;
    letter-spacing:.04em;
    line-height:1.35;
    text-align:center;
    color:var(--text);
    text-transform:uppercase;
    z-index:1;
    padding:0 .7rem;
  }

  .tile.disabled { opacity:.4; cursor:default; }
  .tile.disabled .tile-label { color:var(--text2); }
  .tile-soon {
    position:absolute; bottom:.7rem;
    font-size:9px; letter-spacing:.12em; color:var(--text2);
    z-index:1;
  }

  @media (min-width:641px) and (max-width:1024px) {
    .grid { grid-template-columns:repeat(3, 1fr); max-width:640px; }
    .title { font-size:clamp(2.4rem, 10vw, 3.8rem); }
  }

  @media (max-width:640px) {
    body { padding:2.2rem .9rem 1.4rem; }
    header { margin-bottom:2rem; }
    .grid {
      grid-template-columns:repeat(2, 1fr);
      gap:1.1rem;
      max-width:480px;
    }
    .tile-icon { width:44px; height:44px; font-size:1.3rem; }
    .tile-label { font-size:.68rem; }
    .tile-tag { font-size:8.5px; top:8px; left:9px; }
    .tile-soon { bottom:.5rem; font-size:8px; }
  }

  @media (prefers-reduced-motion:reduce) {
    .title, .bg-blob, .bg-sweep, .eyebrow .dot, .prompt::after { animation:none !important; }
  }

  footer {
    margin-top:2.6rem;
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    color:var(--text2);
    letter-spacing:.08em;
  }
  #dbStatus.db-ok { color:var(--green); }
  #dbStatus.db-error { color:var(--magenta); }
</style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-grain"></div>
  <div class="bg-scan"></div>
  <div class="bg-sweep"></div>

  <header>
    <div class="eyebrow"><span class="dot"></span> Système en ligne</div>
    <div class="title">PHX</div>
    <div class="subtitle">Pignoufs Hyper Xaotiques</div>
    <div class="prompt">&gt; sélectionne un module</div>
  </header>

  <div class="grid">
    <a class="tile" href="bracket-jeux.html">
      <div class="tile-tag">Tournoi</div>
      <div class="tile-icon">🏆</div>
      <div class="tile-label">Bracket</div>
    </a>

    <a class="tile" href="zoomjeu.html">
      <div class="tile-tag">Quotidien</div>
      <div class="tile-icon">🔍</div>
      <div class="tile-label">ZoomJeu</div>
    </a>

    <a class="tile" href="proposition.html">
      <div class="tile-tag">Suggestions</div>
      <div class="tile-icon">🎮</div>
      <div class="tile-label">Proposition<br>de Jeux</div>
    </a>

    <a class="tile" href="Sniikks_liste_de_jeux.html">
      <div class="tile-tag">Collection</div>
      <div class="tile-icon">✋</div>
      <div class="tile-label">Jeux<br>de Sniikks</div>
    </a>

    <a class="tile" href="369_liste_de_jeux.html">
      <div class="tile-tag">Collection</div>
      <div class="tile-icon">✋🏿</div>
      <div class="tile-label">Jeux<br>de 369</div>
    </a>

    <a class="tile" href="tierlistjeux.html">
      <div class="tile-tag">Classement</div>
      <div class="tile-icon">📊</div>
      <div class="tile-label">Tier list<br>jeux</div>
    </a>
  </div>

  <footer>PHX © 2026 <span id="dbStatus" style="margin-left:.6rem;"></span></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    // Simple vérification de connexion Supabase sur la page de menu
    RemoteStore.setStatusElement(document.getElementById('dbStatus'));
    RemoteStore.init([]).then(() => {
      // init([]) fait quand même l'appel réseau grâce au select ci-dessous
    });
    // Ping direct pour un statut fiable même sans clé à précharger
    supabaseClient.from('app_data').select('id').limit(1).then(({ error }) => {
      const el = document.getElementById('dbStatus');
      if (error) { el.textContent = '● Base de données non configurée'; el.classList.add('db-error'); }
      else { el.textContent = '● Connecté à Supabase'; el.classList.add('db-ok'); }
    });
  </script>
</body>
</html>
