<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHX</title>
<link rel="shortcut icon" href="https://cdn.discordapp.com/icons/1030553621252821053/2e7356a5d822245ad7953afdb143581a.webp?size=160&quality=lossless">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap');

  :root {
    --bg:#0a0a0c; --bg2:#111114; --bg3:#161619;
    --gold:#e8b84b; --gold2:#c49a30; --gold-dim:#9c7d33;
    --text:#ededf0; --text2:#8c8c94;
    --border:#232327;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -260px, rgba(232,184,75,.10), transparent 62%),
      var(--bg);
    color:var(--text);
    font-family:'Manrope',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:2rem 1.2rem;
  }
  .title {
    font-family:'Sora',sans-serif;
    font-size:clamp(1.4rem,4vw,2.2rem);
    font-weight:700;
    letter-spacing:.14em;
    color:var(--gold);
    margin-bottom:.5rem;
    text-transform:uppercase;
  }
  .subtitle { color:var(--text2); font-size:13px; margin-bottom:2.6rem; letter-spacing:.05em; }

  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:1.2rem;
    width:100%;
    max-width:900px;
  }

  .tile {
    position:relative;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:16px;
    aspect-ratio:3/4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.9rem;
    text-decoration:none;
    color:var(--text);
    overflow:hidden;
    transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease;
  }
  .tile::before {
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(320px 220px at 50% 30%, rgba(201,168,76,.14), transparent 70%);
    opacity:0; transition:opacity .25s ease;
  }
  .tile:not(.disabled):hover {
    transform:translateY(-6px);
    border-color:var(--gold-dim);
    box-shadow:0 14px 34px rgba(0,0,0,.45);
  }
  .tile:not(.disabled):hover::before { opacity:1; }

  .tile-icon {
    font-size:2.6rem;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));
    z-index:1;
  }
  .tile-icon svg { width:52px; height:52px; }
  .tile-label {
    font-family:'Sora',sans-serif;
    font-weight:600;
    font-size:.82rem;
    letter-spacing:.06em;
    text-align:center;
    color:var(--gold);
    z-index:1;
    padding:0 .6rem;
  }

  .tile.disabled {
    opacity:.4;
    cursor:default;
  }
  .tile.disabled .tile-label { color:var(--text2); }
  .tile-soon {
    position:absolute; bottom:.7rem;
    font-size:9px; letter-spacing:.12em; color:var(--text2);
    z-index:1;
  }

  footer {
    margin-top:1rem;
    font-size:11px;
    color:var(--gold-dim);
    letter-spacing:.1em;
  }
  #dbStatus.db-ok { color:#5fbf86; }
  #dbStatus.db-error { color:#e2685f; }
</style>
</head>
<body>

  <div class="title">Pignoufs Hyper Xaotiques</div>
  <div class="subtitle">Choisis un onglet</div>

  <div class="grid">
    <a class="tile" href="bracket-jeux.html">
      <div class="tile-icon">🏆</div>
      <div class="tile-label">Bracket<br>Jeux</div>
    </a>

    <a class="tile" href="proposition.html">
      <div class="tile-icon">🎮</div>
      <div class="tile-label">Proposition<br>Jeux</div>
    </a>

    <a class="tile" href="Sniikks_liste_de_jeux.html">
      <div class="tile-icon">✋</div>
      <div class="tile-label">Jeux finis<br>de Sniikks</div>
      </a>

    <a class="tile" href="369_liste_de_jeux.html">
      <div class="tile-icon">✋🏿</div>
      <div class="tile-label">Jeux finis<br>de 369</div>
      </a>
  </div>

  <footer>PHX © 2026</span></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    // Simple vérification de connexion Supabase sur la page de menu
    RemoteStore.setStatusElement(document.getElementById('dbStatus'));
    RemoteStore.init([]).then(() => {
      // init([]) fait quand même l'appel réseau grâce au select ci-dessous
    });
    // Ping direct pour un statut fiable même sans clé à précharger
    supabaseClient.from('app_data').select('id').limit(1).then(({ error }) => {
      const el = document.getElementById('dbStatus');
      if (error) { el.textContent = '● Base de données non configurée'; el.classList.add('db-error'); }
      else { el.textContent = '● Connecté à Supabase'; el.classList.add('db-ok'); }
    });
  </script>
</body>
</html>
