<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Accueil</title>
<meta name="description" content="PHX — hub de jeux entre potes : bracket, ZoomJeu quotidien, listes et tier lists de jeux vidéo.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root {
    --bg:#0d0e14; --bg2:#12141d; --bg3:#181a25;
    --gold:#00f0ff; --gold2:#00c4cc; --gold-dim:#0097a7;
    --text:#f0f1f5; --text2:#939ab0;
    --border:#2a2d3a;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { overflow-x:clip; }
  html, body { min-height:100%; }
  body {
    overflow-x:clip; max-width:100%;
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(0,240,255,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Exo 2',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:2rem 1.2rem;
    padding-left:max(1.2rem, env(safe-area-inset-left));
    padding-right:max(1.2rem, env(safe-area-inset-right));
    padding-bottom:max(2rem, env(safe-area-inset-bottom));
  }
  .title {
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(1.4rem,4vw,2.2rem);
    font-weight:700;
    letter-spacing:.14em;
    color:var(--gold);
    margin-bottom:.5rem;
    text-transform:uppercase;
  }
  .subtitle { color:var(--text2); font-size:13px; margin-bottom:2.6rem; letter-spacing:.05em; }

  .grid {
    display:grid;
    gap:1.2rem;
    justify-content:center;
  }
  .grid-nonjeux {
    grid-template-columns:repeat(3, 190px);
  }
  .grid-jeux {
    grid-template-columns:repeat(4, 190px);
    margin-top:1.2rem;
  }

  .tile {
    position:relative;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:2px;
    aspect-ratio:3/4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.9rem;
    text-decoration:none;
    color:var(--text);
    overflow:hidden;
    transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease;
  }
  .tile::before {
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(320px 220px at 50% 30%, rgba(0,240,255,.14), transparent 70%);
    opacity:0; transition:opacity .25s ease;
  }
  .tile:not(.disabled):hover {
    transform:translateY(-6px);
    border-color:var(--gold-dim);
    box-shadow:0 14px 34px rgba(0,0,0,.45);
  }
  .tile:not(.disabled):hover::before { opacity:1; }

  .tile-icon {
    font-size:2.6rem;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));
    z-index:1;
  }
  .tile-icon svg { width:52px; height:52px; }
  .tile-label {
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    font-size:.82rem;
    letter-spacing:.06em;
    text-align:center;
    color:var(--gold);
    z-index:1;
    padding:0 .6rem;
  }

  .tile.disabled {
    opacity:.4;
    cursor:default;
  }
  .tile.disabled .tile-label { color:var(--text2); }
  .tile-soon {
    position:absolute; bottom:.7rem;
    font-size:9px; letter-spacing:.12em; color:var(--text2);
    z-index:1;
  }

  @media (min-width:641px) and (max-width:1024px) {
    .grid-nonjeux { grid-template-columns:repeat(3, 1fr); max-width:640px; width:100%; }
    .grid-jeux { grid-template-columns:repeat(3, 1fr); max-width:640px; width:100%; }
  }

  @media (max-width:640px) {
    body { padding:1.4rem .9rem; }
    .subtitle { margin-bottom:1.6rem; }
    .grid-nonjeux, .grid-jeux {
      grid-template-columns:repeat(2, 1fr);
      gap:.7rem;
      max-width:480px;
      width:100%;
    }
    .tile { aspect-ratio:1/1; border-radius:2px; gap:.55rem; }
    .tile-icon { font-size:1.9rem; }
    .tile-icon svg { width:38px; height:38px; }
    .tile-label { font-size:.72rem; }
    .tile-soon { bottom:.5rem; font-size:8px; }
  }

  footer {
    margin-top:1rem;
    font-size:11px;
    color:var(--gold-dim);
    letter-spacing:.1em;
  }
  #dbStatus.db-ok { color:#5fbf86; }
  #dbStatus.db-error { color:#e2685f; }
</style>
<link rel="stylesheet" href="cyber-theme.css">
</head>
<body>

  <div class="title">Pignoufs Hyper Xaotiques</div>
  <div class="subtitle">Choisis un onglet</div>

  <div class="grid grid-nonjeux">
    <a class="tile" href="proposition.html">
      <div class="tile-icon">🎮</div>
      <div class="tile-label">Proposition<br>de Jeux</div>
    </a>

    <a class="tile" href="Sniikks_liste_de_jeux.html">
      <div class="tile-icon">✋</div>
      <div class="tile-label">Jeux <br>de Sniikks</div>
      </a>

    <a class="tile" href="369_liste_de_jeux.html">
      <div class="tile-icon">✋🏿</div>
      <div class="tile-label">Jeux <br>de 369</div>
      </a>

  </div>

  <div class="grid grid-jeux">

    <a class="tile" href="bracket-jeux.html">
      <div class="tile-icon">🏆</div>
      <div class="tile-label">Bracket</div>
    </a>

    <a class="tile" href="zoomjeu.html">
      <div class="tile-icon">🔍</div>
      <div class="tile-label">ZoomJeu</div>
    </a>

    <a class="tile" href="mot-cache.html">
      <div class="tile-icon">🔤</div>
      <div class="tile-label">Mot<br>Caché</div>
    </a>

    <a class="tile" href="pixels.html">
      <div class="tile-icon">🧩</div>
      <div class="tile-label">Pixels</div>
    </a>
  </div>

  <footer>PHX © 2026 <span id="dbStatus" style="margin-left:.6rem;"></span></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    // Simple vérification de connexion Supabase sur la page de menu
    RemoteStore.setStatusElement(document.getElementById('dbStatus'));
    RemoteStore.init([]).then(() => {
      // init([]) fait quand même l'appel réseau grâce au select ci-dessous
    });
    // Ping direct pour un statut fiable même sans clé à précharger
    supabaseClient.from('app_data').select('id').limit(1).then(({ error }) => {
      const el = document.getElementById('dbStatus');
      if (error) { el.textContent = '● Base de données non configurée'; el.classList.add('db-error'); }
      else { el.textContent = '● Connecté à Supabase'; el.classList.add('db-ok'); }
    });
  </script>
</body>
</html>
