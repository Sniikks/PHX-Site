<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Accueil</title>
<meta name="description" content="PHX — hub de jeux entre potes : bracket, ZoomJeu quotidien, listes et tier lists de jeux vidéo.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>

  :root {
    /* --- couleurs (mêmes noms de variables que le reste du site, nouvelles valeurs) --- */
    --bg:#09090d; --bg2:#131319; --bg3:#191921;
    --gold:#ff3e7f;      /* accent principal repris par nav.js */
    --gold2:#ff3e7f; --gold-dim:#7a2140;
    --text:#f1f0ee; --text2:#8f8f9c;
    --border:rgba(255,255,255,.09);

    /* --- palette chaos, propre à l'accueil --- */
    --magenta:#ff3e7f;
    --cyan:#2fe8c9;
    --amber:#ffc23d;
    --violet:#9b7bff;
    --lime:#b6e84b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { overflow-x:clip; }
  html, body { min-height:100%; }
  body {
    position:relative;
    overflow-x:clip; max-width:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:3rem 1.2rem 2rem;
    padding-left:max(1.2rem, env(safe-area-inset-left));
    padding-right:max(1.2rem, env(safe-area-inset-right));
    padding-bottom:max(2rem, env(safe-area-inset-bottom));
    isolation:isolate;
  }

  /* ---------- ambiance de fond : blobs + grain + scanlines ---------- */
  .bg-blob {
    position:fixed; z-index:-2; border-radius:50%; filter:blur(90px);
    opacity:.35; pointer-events:none;
  }
  .bg-blob.b1 { width:46vw; height:46vw; top:-14vw; left:-10vw; background:var(--magenta); animation:float1 22s ease-in-out infinite alternate; }
  .bg-blob.b2 { width:40vw; height:40vw; bottom:-16vw; right:-8vw; background:var(--cyan); animation:float2 26s ease-in-out infinite alternate; }
  @keyframes float1 { from{ transform:translate(0,0);} to{ transform:translate(4vw,5vw);} }
  @keyframes float2 { from{ transform:translate(0,0);} to{ transform:translate(-3vw,-4vw);} }

  .bg-grain {
    position:fixed; inset:-10%; z-index:-1; pointer-events:none;
    opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .bg-scan {
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.035) 0px, rgba(255,255,255,.035) 1px, transparent 1px, transparent 3px);
    opacity:.5;
  }

  /* ---------- en-tête ---------- */
  header { text-align:center; margin-bottom:2.8rem; max-width:640px; }

  .eyebrow {
    font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:.32em;
    color:var(--cyan); text-transform:uppercase;
    display:inline-flex; align-items:center; gap:.5rem;
    margin-bottom:1.1rem;
  }
  .eyebrow .dot {
    width:6px; height:6px; border-radius:50%; background:var(--cyan);
    box-shadow:0 0 8px var(--cyan); animation:blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }

  .title {
    position:relative;
    font-family:'Unbounded',sans-serif;
    font-weight:900;
    font-size:clamp(3.2rem, 15vw, 6.5rem);
    line-height:.95;
    letter-spacing:-.01em;
    color:var(--text);
    text-shadow:
      2px 0 0 rgba(255,62,127,.55),
      -2px 0 0 rgba(47,232,201,.55);
    animation:glitch 5s steps(1) infinite;
  }
  @keyframes glitch {
    0%, 91%, 100% { text-shadow:2px 0 0 rgba(255,62,127,.55), -2px 0 0 rgba(47,232,201,.55); transform:translate(0,0); }
    92% { text-shadow:-3px 1px 0 rgba(255,62,127,.7), 3px -1px 0 rgba(47,232,201,.7); transform:translate(-1px,0); }
    93% { text-shadow:3px -1px 0 rgba(255,62,127,.7), -3px 1px 0 rgba(47,232,201,.7); transform:translate(1px,0); }
    94% { text-shadow:2px 0 0 rgba(255,62,127,.55), -2px 0 0 rgba(47,232,201,.55); transform:translate(0,0); }
  }

  .subtitle {
    font-family:'JetBrains Mono',monospace;
    color:var(--text2); font-size:12px; letter-spacing:.24em; text-transform:uppercase;
    margin-top:1rem;
  }
  .prompt {
    font-family:'JetBrains Mono',monospace;
    color:var(--amber); font-size:13px; letter-spacing:.02em;
    margin-top:1.3rem;
  }
  .prompt::after {
    content:'_'; margin-left:2px; animation:blink 1s step-end infinite;
  }

  /* ---------- grille de cartouches ---------- */
  .grid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:2.1rem 1.5rem;
    width:100%;
    max-width:920px;
    margin-top:.8rem;
  }

  .tile {
    --r:0deg; --accent:var(--magenta);
    position:relative;
    background:
      linear-gradient(160deg, color-mix(in srgb, var(--accent) 14%, transparent), transparent 55%),
      var(--bg2);
    border:1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
    border-radius:20px;
    aspect-ratio:3/4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.85rem;
    text-decoration:none;
    color:var(--text);
    overflow:visible;
    transform:rotate(var(--r));
    transition:transform .28s cubic-bezier(.2,.9,.25,1.2), border-color .25s ease, box-shadow .3s ease;
  }
  .tile:nth-child(1) { --r:-2deg; --accent:var(--magenta); }
  .tile:nth-child(2) { --r:1.6deg; --accent:var(--cyan); }
  .tile:nth-child(3) { --r:-1.2deg; --accent:var(--amber); }
  .tile:nth-child(4) { --r:1.8deg; --accent:var(--violet); }
  .tile:nth-child(5) { --r:-1.6deg; --accent:var(--lime); }
  .tile:nth-child(6) { --r:1.2deg; --accent:var(--cyan); }

  .tile::after {
    content:attr(data-tag);
    position:absolute; top:-13px; left:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px; font-weight:700; letter-spacing:.1em;
    color:var(--bg); background:var(--accent);
    padding:.3rem .55rem; border-radius:6px 6px 2px 2px;
    box-shadow:0 4px 10px rgba(0,0,0,.35);
    z-index:2;
  }

  .tile:not(.disabled):hover {
    transform:rotate(0deg) translateY(-8px) scale(1.02);
    border-color:var(--accent);
    box-shadow:0 18px 40px rgba(0,0,0,.5), 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent), 0 0 32px color-mix(in srgb, var(--accent) 30%, transparent);
  }

  .tile-icon {
    width:58px; height:58px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.7rem;
    background:color-mix(in srgb, var(--accent) 16%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    z-index:1;
  }
  .tile-label {
    font-family:'Unbounded',sans-serif;
    font-weight:700;
    font-size:.86rem;
    letter-spacing:.01em;
    line-height:1.25;
    text-align:center;
    color:var(--text);
    z-index:1;
    padding:0 .7rem;
  }

  .tile.disabled { opacity:.4; cursor:default; }
  .tile.disabled .tile-label { color:var(--text2); }
  .tile-soon {
    position:absolute; bottom:.7rem;
    font-size:9px; letter-spacing:.12em; color:var(--text2);
    z-index:1;
  }

  @media (min-width:641px) and (max-width:1024px) {
    .grid { grid-template-columns:repeat(3, 1fr); max-width:640px; }
    .title { font-size:clamp(2.6rem, 10vw, 4rem); }
  }

  @media (max-width:640px) {
    body { padding:2.2rem .9rem 1.4rem; }
    header { margin-bottom:2rem; }
    .grid {
      grid-template-columns:repeat(2, 1fr);
      gap:1.6rem 1rem;
      max-width:480px;
    }
    .tile { border-radius:16px; }
    .tile::after { font-size:8.5px; padding:.25rem .45rem; top:-11px; left:10px; }
    .tile-icon { width:44px; height:44px; font-size:1.35rem; }
    .tile-label { font-size:.74rem; }
    .tile-soon { bottom:.5rem; font-size:8px; }
  }

  @media (prefers-reduced-motion:reduce) {
    .title, .bg-blob, .eyebrow .dot, .prompt::after { animation:none !important; }
  }

  footer {
    margin-top:2.6rem;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text2);
    letter-spacing:.08em;
  }
  #dbStatus.db-ok { color:var(--lime); }
  #dbStatus.db-error { color:var(--magenta); }
</style>
</head>
<body>

  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-grain"></div>
  <div class="bg-scan"></div>

  <header>
    <div class="eyebrow"><span class="dot"></span> Système en ligne</div>
    <div class="title">PHX</div>
    <div class="subtitle">Pignoufs Hyper Xaotiques</div>
    <div class="prompt">&gt; choisis un mode</div>
  </header>

  <div class="grid">
    <a class="tile" href="bracket-jeux.html" data-tag="Tournoi">
      <div class="tile-icon">🏆</div>
      <div class="tile-label">Bracket</div>
    </a>

    <a class="tile" href="zoomjeu.html" data-tag="Quotidien">
      <div class="tile-icon">🔍</div>
      <div class="tile-label">ZoomJeu</div>
    </a>

    <a class="tile" href="proposition.html" data-tag="Suggestions">
      <div class="tile-icon">🎮</div>
      <div class="tile-label">Proposition<br>de Jeux</div>
    </a>

    <a class="tile" href="Sniikks_liste_de_jeux.html" data-tag="Collection">
      <div class="tile-icon">✋</div>
      <div class="tile-label">Jeux<br>de Sniikks</div>
    </a>

    <a class="tile" href="369_liste_de_jeux.html" data-tag="Collection">
      <div class="tile-icon">✋🏿</div>
      <div class="tile-label">Jeux<br>de 369</div>
    </a>

    <a class="tile" href="tierlistjeux.html" data-tag="Classement">
      <div class="tile-icon">📊</div>
      <div class="tile-label">Tier list<br>jeux</div>
    </a>
  </div>

  <footer>PHX © 2026 <span id="dbStatus" style="margin-left:.6rem;"></span></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    // Simple vérification de connexion Supabase sur la page de menu
    RemoteStore.setStatusElement(document.getElementById('dbStatus'));
    RemoteStore.init([]).then(() => {
      // init([]) fait quand même l'appel réseau grâce au select ci-dessous
    });
    // Ping direct pour un statut fiable même sans clé à précharger
    supabaseClient.from('app_data').select('id').limit(1).then(({ error }) => {
      const el = document.getElementById('dbStatus');
      if (error) { el.textContent = '● Base de données non configurée'; el.classList.add('db-error'); }
      else { el.textContent = '● Connecté à Supabase'; el.classList.add('db-ok'); }
    });
  </script>
</body>
</html>
