<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Accueil</title>
<meta name="description" content="PHX — hub de jeux entre potes : bracket, ZoomJeu quotidien, listes et tier lists de jeux vidéo.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>

  :root {
    --bg:#0d0e14; --bg2:#12141d; --bg3:#181a25;
    --gold:#00f0ff; --gold2:#00c4cc; --gold-dim:#0097a7;
    --text:#f0f1f5; --text2:#939ab0;
    --border:#2a2d3a;
  }
  html, body { min-height:100%; }
  body {
    overflow-x:clip; max-width:100%;
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(0,240,255,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Exo 2',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:2rem 1.2rem;
    padding-left:max(1.2rem, env(safe-area-inset-left));
    padding-right:max(1.2rem, env(safe-area-inset-right));
    padding-bottom:max(2rem, env(safe-area-inset-bottom));
  }
  .tiles-wrap { width:100%; container-type:inline-size; display:flex; flex-direction:column; align-items:center; }
  .title {
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(1.4rem,4vw,2.2rem);
    font-weight:700;
    letter-spacing:.14em;
    color:var(--gold);
    margin-bottom:.5rem;
    text-transform:uppercase;
  }
  .subtitle { color:var(--text2); font-size:13px; margin-bottom:2.6rem; letter-spacing:.05em; }

  .grid {
    display:grid;
    gap:1.2rem;
    justify-content:center;
  }
  .grid-nonjeux {
    grid-template-columns:repeat(3, 190px);
  }
  .grid-jeux {
    grid-template-columns:repeat(5, 190px);
    margin-top:1.2rem;
  }

  .tile {
    position:relative;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:2px;
    aspect-ratio:3/4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.9rem;
    text-decoration:none;
    color:var(--text);
    overflow:hidden;
    transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease;
  }
  .tile::before {
    content:'';
    position:absolute; inset:0;
    background:radial-gradient(320px 220px at 50% 30%, rgba(0,240,255,.14), transparent 70%);
    opacity:0; transition:opacity .25s ease;
  }
  .tile:not(.disabled):hover {
    transform:translateY(-6px);
    border-color:var(--gold-dim);
    box-shadow:0 14px 34px rgba(0,0,0,.45);
  }
  .tile:not(.disabled):hover::before { opacity:1; }

  .tile-icon {
    font-size:2.6rem;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));
    z-index:1;
  }
  .tile-icon svg { width:52px; height:52px; }
  .tile-label {
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
    font-size:.82rem;
    letter-spacing:.06em;
    text-align:center;
    color:var(--gold);
    z-index:1;
    padding:0 .6rem;
  }

  .tile.disabled {
    opacity:.4;
    cursor:default;
  }
  .tile.disabled .tile-label { color:var(--text2); }
  .tile-soon {
    position:absolute; bottom:.7rem;
    font-size:9px; letter-spacing:.12em; color:var(--text2);
    z-index:1;
  }

  /* Bandeau dynamique (votes en attente, essais du jour, compte à rebours...) */
  .tile-banner {
    position:absolute; left:0; right:0; bottom:0;
    padding:.32rem .4rem;
    font-size:.62rem; line-height:1.3;
    letter-spacing:.02em;
    text-align:center;
    background:rgba(0,240,255,.1);
    border-top:1px solid var(--border);
    z-index:1;
    display:none; /* affiché en JS seulement quand il y a quelque chose à dire */
  }
  .tile-banner.visible { display:block; }
  .tile-banner-status { color:var(--text); }
  .tile-banner-timer { color:#fff; display:none; }
  .tile-banner-timer.visible { display:block; }
  .tile-banner.pending .tile-banner-status { color:var(--gold); }
  .tile-banner.solved .tile-banner-status { color:#5fbf86; }
  .tile-banner.lost .tile-banner-status { color:#e2685f; }
  .tile-banner.pending { background:rgba(0,240,255,.16); }
  .tile-banner.solved { background:rgba(95,191,134,.14); }
  .tile-banner.lost { background:rgba(226,104,95,.14); }
  @media (max-width:640px) { .tile-banner { font-size:.58rem; padding:.24rem .3rem; } }

  @media (min-width:641px) and (max-width:1024px) {
    .grid-nonjeux { max-width:640px; width:100%; }
    .grid-jeux { max-width:640px; width:100%; }
  }

  @media (max-width:640px) {
    body { padding:1.4rem .9rem; }
    .subtitle { margin-bottom:1.6rem; }
    .grid-nonjeux, .grid-jeux {
      max-width:480px;
      width:100%;
    }
    .tile { aspect-ratio:1/1; border-radius:2px; gap:.55rem; }
    .tile-icon { font-size:1.9rem; }
    .tile-icon svg { width:38px; height:38px; }
    .tile-label { font-size:.72rem; }
    .tile-soon { bottom:.5rem; font-size:8px; }
  }

  /* .grid-nonjeux / .grid-jeux s'adaptent à la largeur de leur conteneur
     (le <body>), pas à celle de l'écran. */
  @container (max-width:1024px) {
    .grid-nonjeux { grid-template-columns:repeat(3, 1fr); }
    .grid-jeux { grid-template-columns:repeat(3, 1fr); }
  }
  @container (max-width:640px) {
    .grid-nonjeux, .grid-jeux {
      grid-template-columns:repeat(2, 1fr);
      gap:.7rem;
    }
  }

  footer {
    margin-top:1rem;
    font-size:11px;
    color:var(--gold-dim);
    letter-spacing:.1em;
  }
  #dbStatus.db-ok { color:#5fbf86; }
  #dbStatus.db-error { color:#e2685f; }
</style>
<link rel="stylesheet" href="cyber-theme.css">

  <footer>PHX © 2026 <span id="dbStatus" style="margin-left:.6rem;"></span></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    // Deux bouts de code écrivaient dans #dbStatus en même temps (RemoteStore.init
    // ET le ping direct ci-dessous) → une course où le premier à finir écrase le
    // texte de l'autre, d'où le "● Connecté" générique qui s'affichait parfois au
    // lieu de "● Connecté à Supabase". On ne garde qu'une seule source : le ping
    // direct, qui donne le message le plus précis.
    RemoteStore.init([]);
    // Ping direct pour un statut fiable même sans clé à précharger
    supabaseClient.from('sniikks_games').select('id').limit(1).then(({ error }) => {
      const el = document.getElementById('dbStatus');
      if (error) { el.textContent = '● Base de données non configurée'; el.classList.add('db-error'); }
      else { el.textContent = '● Connecté à Supabase'; el.classList.add('db-ok'); }
    });
  </script>

  <script>
  // ==========================================================
  // Bandeaux dynamiques des tuiles jeux — proposition en attente,
  // essais du jour, et compte à rebours avant le prochain défi
  // (celui-ci s'actualise chaque seconde, sans recharger la page).
  // Best-effort partout : une erreur réseau/table absente ne doit
  // jamais empêcher la page index de s'afficher normalement.
  // ==========================================================

  function parisDateString(offset = 0) {
    const now = new Date(Date.now() + offset * 86400000);
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Paris', year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(now);
    const get = t => parts.find(p => p.type === t).value;
    return `${get('year')}-${get('month')}-${get('day')}`;
  }
  // Secondes restantes avant minuit à Paris (fuseau lu directement, donc
  // sans souci de passage heure d'été/hiver).
  function secondsUntilParisMidnight() {
    const parts = new Intl.DateTimeFormat('en-GB', { timeZone: 'Europe/Paris', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).formatToParts(new Date());
    const get = t => parseInt(parts.find(p => p.type === t).value, 10);
    const elapsed = get('hour') * 3600 + get('minute') * 60 + get('second');
    return 86400 - elapsed;
  }
  function formatCountdown(totalSeconds) {
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    return `${String(h).padStart(2, '0')}h${String(m).padStart(2, '0')}m${String(s).padStart(2, '0')}s`;
  }

  function showBanner(tileKey, statusText, variant, timerText) {
    const el = document.querySelector(`[data-tile="${tileKey}"] [data-banner]`);
    if (!el) return;
    const statusEl = el.querySelector('[data-banner-status]');
    const timerEl = el.querySelector('[data-banner-timer]');
    if (statusEl) statusEl.textContent = statusText || '';
    if (timerEl) {
      timerEl.textContent = timerText || '';
      timerEl.classList.toggle('visible', !!timerText);
    }
    el.classList.add('visible');
    el.classList.remove('pending', 'solved', 'lost');
    if (variant) el.classList.add(variant);
  }

  // Un compte à rebours "prochain défi dans …" par tuile, réutilisé pour
  // ZoomJeu / Jeu Caché / Mot Français : même mécanique (reset à minuit
  // heure de Paris), seule la table change. `status` (optionnel) est la
  // 1ʳᵉ ligne ("Trouvé..."/"Perdu..."), toujours en couleur ; le compte à
  // rebours reste en 2e ligne, en blanc, dans tous les cas — y compris une
  // fois le défi du jour déjà joué, pour savoir quand revenir.
  function startNextChallengeCountdown(tileKey, status, variant) {
    const tick = () => showBanner(tileKey, status, variant, formatCountdown(secondsUntilParisMidnight()));
    tick();
    setInterval(tick, 1000);
  }

  // ── Proposition de Jeux : nombre de jeux encore en attente de vote ──
  // Une fois qu'un jeu a 2 votes "Oui", il est automatiquement transféré
  // hors de la table "proposition" (voir proposition.html) : tout ce qui
  // reste dedans est donc, par construction, encore en attente.
  async function loadPropositionBanner() {
    try {
      const { count, error } = await supabaseClient
        .from('proposition').select('id', { count: 'exact', head: true });
      if (error) throw error;
      if (count > 0) showBanner('proposition', `🗳️ ${count} jeu${count > 1 ? 'x' : ''} en attente de vote`, 'pending');
    } catch (e) { /* pas grave, on laisse la tuile sans bandeau */ }
  }

  // ── ZoomJeu / Jeu Caché / Mot Français : résultat du jour (trouvé en X
  // essais / perdu) + compte à rebours avant le prochain, dans tous les
  // cas — y compris une fois le défi du jour déjà résolu. Les trois pages
  // partagent une mécanique proche (session.guesses + solved/failed/gaveUp
  // + une réponse révélée une fois terminé), avec de petites différences de
  // forme d'une page à l'autre — on reste donc volontairement souple sur
  // les noms de champs plutôt que d'en imposer un seul. ──
  async function loadDailyChallengeBanner(tileKey, table, idPrefix) {
    try {
      const today = parisDateString();
      const { data: row, error } = await supabaseClient
        .from(table).select('data').eq('id', idPrefix + today).maybeSingle();
      if (error) throw error;
      const d = row && row.data;
      const session = d && d.session;
      if (session) {
        const finished = !!(session.solved || session.failed || session.gaveUp || d.revealed || session.reveal);
        if (finished) {
          if (session.solved) {
            const n = Array.isArray(session.guesses) ? session.guesses.length : null;
            startNextChallengeCountdown(tileKey, n ? `✅ Trouvé aujourd'hui en ${n} essai${n > 1 ? 's' : ''}` : `✅ Trouvé aujourd'hui`, 'solved');
          } else {
            startNextChallengeCountdown(tileKey, `❌ Perdu aujourd'hui`, 'lost');
          }
          return;
        }
      }
      // Pas encore résolu (ou pas encore joué) : juste le compte à rebours.
      startNextChallengeCountdown(tileKey);
    } catch (e) {
      startNextChallengeCountdown(tileKey); // par défaut, le countdown reste utile même si la lecture a échoué
    }
  }

  // ── Pixels : pas de reset quotidien (partie partagée continue) — on
  // affiche plutôt les vies restantes et la série en cours, si une partie
  // a déjà commencé. ──
  async function loadPixelsBanner() {
    try {
      const { data: row, error } = await supabaseClient
        .from('pixels_public').select('data').eq('id', 'pixels_game').maybeSingle();
      if (error) throw error;
      const g = row && row.data;
      if (g && typeof g.lives === 'number') {
        const hearts = '❤️'.repeat(Math.max(0, g.lives));
        showBanner('pixels', hearts || '💀', null, `Série de ${g.streak || 0}`);
      }
    } catch (e) { /* pas grave, on laisse la tuile sans bandeau */ }
  }

  loadPropositionBanner();
  loadDailyChallengeBanner('zoomjeu', 'zoomjeu_public', 'zoomjeu_');
  loadDailyChallengeBanner('motcache', 'motcache_public', 'motcache_');
  loadDailyChallengeBanner('motfrancais', 'motfrancais_public', 'motfrancais_');
  loadPixelsBanner();
  </script>
  <script src="page-transitions.js" defer></script>
<script src="bg-animate.js" defer></script>
</body>
