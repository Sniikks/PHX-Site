<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Plus ou Moins</title>
<meta name="description" content="Le jeu a-t-il une statistique plus haute ou plus basse que le précédent ? Enchaîne la série.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0e14; --bg2:#12141d; --bg3:#181a25;
    --gold:#00f0ff; --gold2:#00c4cc; --gold-dim:#0097a7;
    --text:#f0f1f5; --text2:#939ab0;
    --border:#2a2d3a;
    --good:#5fbf86; --bad:#e2685f;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { min-height:100%; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(0,240,255,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:1.6rem 1.2rem 3rem;
    padding-left:max(1.2rem, env(safe-area-inset-left));
    padding-right:max(1.2rem, env(safe-area-inset-right));
  }
  .menu-btn {
    align-self:flex-start;
    display:inline-flex; align-items:center; gap:6px;
    padding:9px 16px;
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.14); border-radius:3px;
    color:#e5e5e5;
    font-family:'Exo 2',sans-serif; font-size:12.5px; font-weight:600; letter-spacing:.02em;
    text-decoration:none; white-space:nowrap;
    margin-bottom:1rem;
    cursor:pointer; transition:all .15s ease;
  }
  .menu-btn:hover { background:rgba(255,255,255,.09); border-color:rgba(255,255,255,.24); color:#fff; }

  .title { font-family:'Rajdhani',sans-serif; font-size:clamp(1.3rem,4vw,1.9rem); font-weight:700; letter-spacing:.1em; color:var(--gold); text-transform:uppercase; }
  .subtitle { color:var(--text2); font-size:12.5px; margin-top:.35rem; margin-bottom:1rem; letter-spacing:.03em; text-align:center; }

  .streak-badge {
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.1rem;
    color:var(--gold); margin-bottom:1.2rem; letter-spacing:.05em;
  }

  #loading { color:var(--text2); font-size:13px; margin-top:2rem; }
  #game { display:none; flex-direction:column; align-items:center; width:100%; max-width:520px; gap:1rem; }

  .duel { display:flex; align-items:stretch; gap:.7rem; width:100%; }
  .card {
    flex:1; background:var(--bg2); border:1px solid var(--border); border-radius:14px;
    overflow:hidden; display:flex; flex-direction:column; text-align:center;
    transition:border-color .2s ease, transform .2s ease;
  }
  .card img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--bg3); }
  .card-body { padding:.85rem .7rem; display:flex; flex-direction:column; gap:.4rem; flex:1; }
  .card-name { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.95rem; color:var(--text); }
  .card-value { font-size:1.15rem; font-weight:700; color:var(--gold); font-family:'Rajdhani',sans-serif; min-height:1.4em; }
  .card-value.hidden-value { color:var(--text2); font-size:1.4rem; letter-spacing:.2em; }
  .card.correct { border-color:var(--good); box-shadow:0 0 18px rgba(95,191,134,.25); }
  .card.wrong { border-color:var(--bad); box-shadow:0 0 18px rgba(226,104,95,.25); }

  .vs { display:flex; align-items:center; justify-content:center; font-family:'Rajdhani',sans-serif; font-weight:700; color:var(--text2); font-size:.9rem; padding:0 .1rem; }

  .category-label { font-size:12px; color:var(--text2); letter-spacing:.05em; text-align:center; }

  .choice-buttons { display:flex; gap:.7rem; width:100%; }
  .choice-btn {
    flex:1; padding:.9rem; border-radius:10px; border:1px solid var(--border); background:var(--bg3);
    color:var(--text); font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1rem; letter-spacing:.04em;
    cursor:pointer; transition:all .15s ease;
  }
  .choice-btn:hover:not(:disabled) { border-color:var(--gold-dim); color:var(--gold); }
  .choice-btn:disabled { opacity:.5; cursor:default; }

  .msg-banner {
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    padding:.55rem 1.1rem; font-size:13px; font-weight:600; color:var(--text);
    z-index:800; opacity:0; pointer-events:none; transition:opacity .2s ease, top .2s ease;
    box-shadow:0 10px 26px rgba(0,0,0,.4);
  }
  .msg-banner.show { opacity:1; top:22px; }

  .result-modal { position:fixed; inset:0; background:rgba(0,0,0,.72); display:none; align-items:center; justify-content:center; z-index:900; padding:1.2rem; }
  .result-modal.open { display:flex; }
  .result-box { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:1.8rem; max-width:360px; width:100%; text-align:center; }
  .result-title { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.35rem; letter-spacing:.06em; margin-bottom:.9rem; color:var(--bad); }
  .result-stats { display:flex; justify-content:center; gap:1.6rem; margin-bottom:1.1rem; }
  .stat-num { font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700; color:var(--text); }
  .stat-label { font-size:10px; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; }
  .board { margin-top:.6rem; font-size:11.5px; color:var(--text2); text-align:left; max-height:140px; overflow-y:auto; }
  .board div { display:flex; justify-content:space-between; padding:2px 0; }
  .result-actions { display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap; margin-top:1rem; }
  .btn-io { padding:.6rem 1.1rem; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:12.5px; font-weight:600; cursor:pointer; }
  .btn-io:hover { border-color:var(--gold-dim); color:var(--gold); }
  .btn-io.primary { background:var(--gold-dim); color:#04262a; border-color:var(--gold-dim); }

  @media (max-width:420px) { .card-name { font-size:.82rem; } .card-value { font-size:1rem; } }
</style>
<link rel="stylesheet" href="cyber-theme.css">
</head>
<body>

<a class="menu-btn" href="index.html">☰ Menu</a>
<div class="title">⭐ Plus ou Moins</div>
<div class="subtitle" id="subtitle">Le 2ᵉ jeu a-t-il une valeur plus haute ou plus basse ?</div>
<div class="streak-badge" id="streakBadge">Série : 0</div>

<div id="loading">Recherche de deux jeux comparables…</div>

<div id="game">
  <div class="category-label" id="categoryLabel"></div>
  <div class="duel">
    <div class="card" id="baseCard">
      <img id="baseImg" src="" alt="">
      <div class="card-body">
        <div class="card-name" id="baseName"></div>
        <div class="card-value" id="baseValue"></div>
      </div>
    </div>
    <div class="vs">VS</div>
    <div class="card" id="challengerCard">
      <img id="challengerImg" src="" alt="">
      <div class="card-body">
        <div class="card-name" id="challengerName"></div>
        <div class="card-value hidden-value" id="challengerValue">?</div>
      </div>
    </div>
  </div>

  <div class="choice-buttons">
    <button class="choice-btn" id="lowerBtn">▼ Plus bas</button>
    <button class="choice-btn" id="higherBtn">▲ Plus haut</button>
  </div>
</div>

<div class="msg-banner" id="banner"></div>

<div class="result-modal" id="resultModal">
  <div class="result-box">
    <div class="result-title">💀 Série terminée</div>
    <div class="result-stats">
      <div><div class="stat-num" id="statScore">0</div><div class="stat-label">Série</div></div>
      <div><div class="stat-num" id="statBest">0</div><div class="stat-label">Record</div></div>
    </div>
    <div class="board" id="boardList"></div>
    <div class="result-actions">
      <button class="btn-io primary" id="retryBtn">Rejouer</button>
      <button class="btn-io" id="closeResultBtn">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="nav.js"></script>
<script>
(function () {
  let streak = 0;
  let current = null; // { roundId, category, categoryLabel, base:{name,src,displayValue}, challenger:{name,src} }
  let locked = false;

  function showBanner(text, ms = 1500) {
    const b = document.getElementById('banner');
    b.textContent = text; b.classList.add('show');
    clearTimeout(showBanner._t);
    showBanner._t = setTimeout(() => b.classList.remove('show'), ms);
  }

  function renderRound(round) {
    current = round;
    locked = false;
    document.getElementById('categoryLabel').textContent = round.categoryLabel;
    document.getElementById('baseImg').src = round.base.src || '';
    document.getElementById('baseName').textContent = round.base.name;
    document.getElementById('baseValue').textContent = round.base.displayValue;
    document.getElementById('baseValue').classList.remove('hidden-value');

    document.getElementById('challengerImg').src = round.challenger.src || '';
    document.getElementById('challengerName').textContent = round.challenger.name;
    const cv = document.getElementById('challengerValue');
    cv.textContent = '?'; cv.classList.add('hidden-value');

    document.getElementById('baseCard').className = 'card';
    document.getElementById('challengerCard').className = 'card';
    document.getElementById('lowerBtn').disabled = false;
    document.getElementById('higherBtn').disabled = false;
  }

  async function startGame() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('game').style.display = 'none';
    try {
      const res = await fetch('/api/plusoumoins');
      if (!res.ok) throw new Error((await res.json()).error || 'Erreur serveur');
      const round = await res.json();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('game').style.display = 'flex';
      renderRound(round);
    } catch (e) {
      document.getElementById('loading').textContent = "Impossible de charger le duel (" + e.message + "). Réessaie dans un instant.";
    }
  }

  async function submitGuess(guess) {
    if (locked || !current) return;
    locked = true;
    document.getElementById('lowerBtn').disabled = true;
    document.getElementById('higherBtn').disabled = true;

    try {
      const res = await fetch('/api/plusoumoins', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roundId: current.roundId, guess })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur serveur');

      document.getElementById('challengerValue').textContent = data.reveal.challenger.displayValue;
      document.getElementById('challengerValue').classList.remove('hidden-value');

      if (data.correct) {
        streak++;
        document.getElementById('streakBadge').textContent = 'Série : ' + streak;
        document.getElementById('challengerCard').classList.add('correct');
        showBanner('✅ Bien joué !');
        if (data.gameEnded) {
          setTimeout(() => endGame(), 1200);
        } else {
          setTimeout(() => renderRound(data.next), 1200);
        }
      } else {
        document.getElementById('challengerCard').classList.add('wrong');
        showBanner('❌ Perdu…');
        setTimeout(() => endGame(), 1300);
      }
    } catch (e) {
      showBanner('Erreur réseau, réessaie.');
      locked = false;
      document.getElementById('lowerBtn').disabled = false;
      document.getElementById('higherBtn').disabled = false;
    }
  }

  async function endGame() {
    const statsKey = 'pom_stats';
    let s = {};
    try { s = JSON.parse(localStorage.getItem(statsKey)) || {}; } catch (e) {}
    s.best = Math.max(s.best || 0, streak);
    localStorage.setItem(statsKey, JSON.stringify(s));

    document.getElementById('statScore').textContent = streak;
    document.getElementById('statBest').textContent = s.best;
    document.getElementById('resultModal').classList.add('open');

    try {
      const pseudo = localStorage.getItem('phx_pseudo');
      if (pseudo) {
        await RemoteStore.init(['plusoumoins_leaderboard']);
        const board = RemoteStore.get('plusoumoins_leaderboard', []) || [];
        const existing = board.find(e => e.pseudo === pseudo);
        if (!existing || streak > existing.streak) {
          const updated = board.filter(e => e.pseudo !== pseudo);
          updated.push({ pseudo, streak });
          updated.sort((a, b) => b.streak - a.streak);
          RemoteStore.set('plusoumoins_leaderboard', updated.slice(0, 20));
          renderBoard(updated.slice(0, 10));
        } else {
          renderBoard(board.slice(0, 10));
        }
      } else {
        await RemoteStore.init(['plusoumoins_leaderboard']);
        renderBoard((RemoteStore.get('plusoumoins_leaderboard', []) || []).slice(0, 10));
      }
    } catch (e) {}
  }

  function renderBoard(list) {
    const el = document.getElementById('boardList');
    if (!list.length) { el.innerHTML = ''; return; }
    el.innerHTML = '<b style="color:var(--text)">Classement</b>' + list.map(e =>
      `<div><span>${e.pseudo}</span><span>${e.streak}</span></div>`
    ).join('');
  }

  document.getElementById('lowerBtn').addEventListener('click', () => submitGuess('lower'));
  document.getElementById('higherBtn').addEventListener('click', () => submitGuess('higher'));
  document.getElementById('retryBtn').addEventListener('click', () => {
    streak = 0;
    document.getElementById('streakBadge').textContent = 'Série : 0';
    document.getElementById('resultModal').classList.remove('open');
    startGame();
  });
  document.getElementById('closeResultBtn').addEventListener('click', () => document.getElementById('resultModal').classList.remove('open'));

  RemoteStore.init([]);
  startGame();
})();
</script>
</body>
</html>
