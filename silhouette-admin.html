<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silhouette - Admin du pool</title>
<meta name="robots" content="noindex, nofollow">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap');
  :root {
    --bg:#0a0a0c; --bg2:#111114; --bg3:#161619;
    --gold:#e8b84b; --gold-dim:#9c7d33;
    --text:#ededf0; --text2:#8c8c94; --border:#232327;
    --good:#5fbf86; --bad:#e2685f;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:1.6rem 1.2rem 3rem;
  }
  a.back {
    align-self:flex-start; text-decoration:none; font-family:'Sora',sans-serif; font-weight:600;
    font-size:.72rem; color:var(--text2); background:var(--bg2); border:1px solid var(--border);
    border-radius:9px; padding:.5rem .9rem; margin-bottom:1rem;
  }
  a.back:hover { color:var(--gold); border-color:var(--gold-dim); }
  .title { font-family:'Sora',sans-serif; font-size:1.6rem; font-weight:700; letter-spacing:.08em; color:var(--gold); text-transform:uppercase; }
  .subtitle { color:var(--text2); font-size:12.5px; margin:.35rem 0 1.4rem; text-align:center; max-width:520px; }
  .card { width:100%; max-width:640px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:1.4rem; margin-bottom:1.4rem; }
  label { display:block; font-family:'Sora',sans-serif; font-size:.75rem; color:var(--text2); margin:.7rem 0 .3rem; letter-spacing:.03em; }
  input[type=text], input[type=url], input[type=password], select {
    width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text);
    border-radius:9px; padding:.65rem .8rem; font-family:'Manrope',sans-serif; font-size:.88rem; outline:none;
  }
  input:focus, select:focus { border-color:var(--gold-dim); }
  button {
    font-family:'Sora',sans-serif; font-weight:600; font-size:.82rem; letter-spacing:.03em;
    border-radius:9px; border:1px solid var(--gold-dim); background:transparent; color:var(--gold);
    padding:.7rem 1.1rem; cursor:pointer; margin-top:1rem;
  }
  button:hover { background:var(--gold); color:#151510; }
  button.danger { border-color:var(--bad); color:var(--bad); }
  button.danger:hover { background:var(--bad); color:#fff; }
  .msg { font-size:.8rem; margin-top:.8rem; }
  .msg.ok { color:var(--good); }
  .msg.err { color:var(--bad); }
  .preview { margin-top:.9rem; display:flex; align-items:center; gap:.8rem; }
  .preview img { width:90px; height:90px; object-fit:contain; background:#000; border-radius:8px; border:1px solid var(--border); }
  .pool-list { display:flex; flex-direction:column; gap:.5rem; max-height:420px; overflow-y:auto; }
  .pool-item { display:flex; align-items:center; gap:.7rem; background:var(--bg3); border:1px solid var(--border); border-radius:9px; padding:.5rem .7rem; }
  .pool-item img { width:38px; height:38px; object-fit:contain; background:#000; border-radius:6px; flex-shrink:0; }
  .pool-item .info { flex:1; min-width:0; }
  .pool-item .name { font-size:.85rem; font-weight:600; }
  .pool-item .meta { font-size:.7rem; color:var(--text2); }
  .pool-item button { margin:0; padding:.35rem .6rem; font-size:.7rem; }
  .gate { text-align:center; }
</style>
</head>
<body>

  <a class="back" href="index.html">☰ Menu</a>
  <div class="title">Silhouette — Admin</div>
  <div class="subtitle">Gère le pool de personnages/armes cultes utilisé pour générer le puzzle du jour. Chaque entrée a besoin d'une image avec un fond simple/transparent pour un bon effet de silhouette.</div>

  <div class="card gate" id="gateCard">
    <label for="keyInput">Clé admin (ADMIN_KEY)</label>
    <input type="password" id="keyInput" placeholder="Colle ta clé admin ici">
    <button id="unlockBtn">Déverrouiller</button>
    <div class="msg" id="gateMsg"></div>
  </div>

  <div id="appSection" style="display:none; width:100%; max-width:640px;">
    <div class="card">
      <label for="nameInput">Nom (personnage ou arme)</label>
      <input type="text" id="nameInput" placeholder="Ex : Kratos, Master Sword...">

      <label for="categorySelect">Catégorie</label>
      <select id="categorySelect">
        <option value="personnage">🧍 Personnage</option>
        <option value="arme">⚔️ Arme</option>
      </select>

      <label for="gameInput">Jeu d'origine (optionnel)</label>
      <input type="text" id="gameInput" placeholder="Ex : God of War">

      <label for="imageInput">URL de l'image (fond simple/transparent de préférence)</label>
      <input type="url" id="imageInput" placeholder="https://...">

      <div class="preview" id="previewBox" style="display:none;">
        <img id="previewImg" src="">
        <span style="font-size:.75rem; color:var(--text2);">Aperçu</span>
      </div>

      <button id="addBtn">Ajouter au pool</button>
      <div class="msg" id="addMsg"></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.8rem;">
        <div style="font-family:'Sora',sans-serif; font-weight:700; color:var(--gold); font-size:.9rem;">Pool actuel (<span id="poolCount">0</span>)</div>
        <button id="refreshBtn" style="margin:0;">↻ Rafraîchir</button>
      </div>
      <div class="pool-list" id="poolList"></div>
    </div>

    <div class="card">
      <div style="font-family:'Sora',sans-serif; font-weight:700; color:var(--gold); font-size:.9rem; margin-bottom:.6rem;">Générer le puzzle manuellement</div>
      <button id="generateBtn">Générer/forcer le puzzle du jour</button>
      <div class="msg" id="genMsg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    let adminKey = sessionStorage.getItem('silhouette_admin_key') || '';

    function uid() {
      return 'e_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
    }

    async function loadPool() {
      const { data, error } = await supabaseClient.from('app_data').select('data').eq('id', 'silhouette_pool').maybeSingle();
      if (error) throw error;
      return (data?.data?.entries) || [];
    }
    async function savePool(entries) {
      await supabaseClient.from('app_data').upsert({ id: 'silhouette_pool', data: { entries }, updated_at: new Date().toISOString() });
    }

    async function renderPool() {
      const list = document.getElementById('poolList');
      list.innerHTML = '<div style="color:var(--text2); font-size:.8rem;">Chargement…</div>';
      try {
        const entries = await loadPool();
        document.getElementById('poolCount').textContent = entries.length;
        if (entries.length === 0) {
          list.innerHTML = '<div style="color:var(--text2); font-size:.8rem;">Le pool est vide pour l\'instant.</div>';
          return;
        }
        list.innerHTML = '';
        entries.slice().reverse().forEach(e => {
          const row = document.createElement('div');
          row.className = 'pool-item';
          row.innerHTML = `
            <img src="${e.image}" onerror="this.style.opacity=0.2">
            <div class="info">
              <div class="name">${e.name}</div>
              <div class="meta">${e.category === 'arme' ? '⚔️ Arme' : '🧍 Personnage'}${e.game ? ' · ' + e.game : ''}</div>
            </div>
            <button class="danger" data-id="${e.id}">Suppr.</button>
          `;
          row.querySelector('button').addEventListener('click', async () => {
            const updated = entries.filter(x => x.id !== e.id);
            await savePool(updated);
            renderPool();
          });
          list.appendChild(row);
        });
      } catch (e) {
        list.innerHTML = '<div style="color:var(--bad); font-size:.8rem;">Erreur de chargement : ' + (e.message || e) + '</div>';
      }
    }

    document.getElementById('imageInput').addEventListener('input', e => {
      const url = e.target.value.trim();
      const box = document.getElementById('previewBox');
      const img = document.getElementById('previewImg');
      if (url) { img.src = url; box.style.display = 'flex'; } else { box.style.display = 'none'; }
    });

    document.getElementById('addBtn').addEventListener('click', async () => {
      const name = document.getElementById('nameInput').value.trim();
      const category = document.getElementById('categorySelect').value;
      const game = document.getElementById('gameInput').value.trim();
      const image = document.getElementById('imageInput').value.trim();
      const msg = document.getElementById('addMsg');
      msg.textContent = '';
      if (!name || !image) { msg.textContent = 'Le nom et l\'image sont obligatoires.'; msg.className = 'msg err'; return; }
      try {
        const entries = await loadPool();
        entries.push({ id: uid(), name, category, game: game || null, image });
        await savePool(entries);
        msg.textContent = '"' + name + '" ajouté au pool ✓';
        msg.className = 'msg ok';
        document.getElementById('nameInput').value = '';
        document.getElementById('gameInput').value = '';
        document.getElementById('imageInput').value = '';
        document.getElementById('previewBox').style.display = 'none';
        renderPool();
      } catch (e) {
        msg.textContent = 'Erreur : ' + (e.message || e);
        msg.className = 'msg err';
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', renderPool);

    document.getElementById('generateBtn').addEventListener('click', async () => {
      const msg = document.getElementById('genMsg');
      msg.textContent = 'Génération en cours…';
      msg.className = 'msg';
      try {
        const res = await fetch('/api/generate-silhouette-daily?force=true&key=' + encodeURIComponent(adminKey));
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur inconnue');
        msg.textContent = 'Puzzle généré : ' + (data.puzzle?.answer || '?');
        msg.className = 'msg ok';
      } catch (e) {
        msg.textContent = 'Erreur : ' + (e.message || e);
        msg.className = 'msg err';
      }
    });

    function unlock() {
      adminKey = document.getElementById('keyInput').value.trim();
      if (!adminKey) return;
      sessionStorage.setItem('silhouette_admin_key', adminKey);
      document.getElementById('gateCard').style.display = 'none';
      document.getElementById('appSection').style.display = 'block';
      renderPool();
    }
    document.getElementById('unlockBtn').addEventListener('click', unlock);
    document.getElementById('keyInput').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

    if (adminKey) {
      document.getElementById('gateCard').style.display = 'none';
      document.getElementById('appSection').style.display = 'block';
      renderPool();
    }
  </script>
</body>
</html>
