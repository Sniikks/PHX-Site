<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHX - Liste de 369</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>

:root{
  --bg:#0d0e14;
  --surface-1:#12141d;
  --surface-2:#181a25;
  --surface-3:#1f2230;
  --border:#2a2d3a;
  --border-soft:#1a1c27;
  --text:#f0f1f5;
  --text-dim:#939ab0;
  --text-faint:#5c647a;

  --gold:#b967ff;
  --gold-dim:#8a4fd6;
  --gold-soft:rgba(185,103,255,.10);
  --gold-ring:rgba(185,103,255,.35);

  --violet:#a78bfa;
  --violet-soft:rgba(167,139,250,.12);

  --green:#5fbf86;
  --blue:#6699e8;
  --red:#e2685f;

  --radius-sm:8px;
  --radius:12px;
  --radius-lg:20px;
  --radius-pill:999px;
}

html{scrollbar-color:var(--border) transparent;}
body{
  background:radial-gradient(1200px 600px at 50% -200px, rgba(185,103,255,.08), transparent 60%), var(--bg);
  color:var(--text);
  font-family:'Exo 2',sans-serif;
  font-size:14px;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

::selection{background:var(--gold-soft);color:var(--gold);}

/* ══════════════ HEADER ══════════════ */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(10,10,12,.88);
  backdrop-filter:blur(16px) saturate(140%);
  border-bottom:1px solid var(--border);
  transition:transform .25s ease;
  max-height:100vh; max-height:100dvh; overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.topbar.header-hidden{transform:translateY(-100%);}
.topbar-inner{max-width:1320px;margin:0 auto;padding:0 32px;}

.brand-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:28px;height:28px;border-radius:var(--radius);
  background:linear-gradient(155deg,var(--gold) 0%, #c79530 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:#0d0e14;
  flex-shrink:0;
  box-shadow:0 0 0 3px var(--violet-soft);
}
.brand-text{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;letter-spacing:.01em;}
.brand-text span{color:var(--text-dim);font-weight:500;}

.global-stats{display:flex;align-items:center;gap:22px;}
.gstat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.gstat-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;line-height:1;}
.gstat-val.accent{color:var(--gold);}
.gstat-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;}

.toolbar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 0 6px;flex-wrap:wrap;
}

.search-wrap{position:relative;flex-shrink:0;}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--text-faint);font-size:14px;pointer-events:none;
}
.search-input{
  background:var(--surface-1);border:1px solid var(--border);
  color:var(--text);padding:8px 32px 8px 32px;
  font-family:'Exo 2',sans-serif;font-size:13px;
  outline:none;border-radius:var(--radius);width:220px;
  transition:border-color .15s,background .15s,box-shadow .15s;
}
.search-input:focus{border-color:var(--gold-dim);background:var(--surface-2);box-shadow:0 0 0 3px var(--violet-soft);}
.search-input::placeholder{color:var(--text-faint);}
.search-clear{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:transparent;border:none;color:var(--text-faint);
  font-size:11px;cursor:pointer;padding:5px 6px;line-height:1;
  display:none;border-radius:var(--radius-sm);transition:color .15s,background .15s;
}
.search-clear:hover{color:var(--text);background:var(--surface-3);}
.search-clear.show{display:block;}

.filter-pills{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.pill{
  background:transparent;border:1px solid var(--border);
  color:var(--text-dim);padding:7px 13px;
  font-family:'Exo 2',sans-serif;font-size:12.5px;font-weight:600;
  cursor:pointer;border-radius:var(--radius);white-space:nowrap;
  transition:all .15s;
  scroll-snap-align:center;
}
.pill:hover{color:var(--text);background:var(--surface-2);}
.pill.active{
  color:#0d0e14;background:var(--gold);
}



.icon-group{
  display:flex;align-items:center;gap:4px;
  background:var(--surface-1);border:1px solid var(--border);
  border-radius:var(--radius);padding:3px;flex-shrink:0;
}
.icon-btn{
  background:transparent;border:none;
  color:var(--text-dim);width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:var(--radius-sm);font-size:14px;
  transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{color:var(--gold);background:var(--surface-3);}
.icon-btn.active{color:var(--gold);background:var(--surface-3);}
.icon-btn-label{
  width:auto;padding:0 12px;
  font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;
  white-space:nowrap;
}

.btn-primary{
  background:var(--gold);border:none;color:#0d0e14;
  padding:8px 16px;font-family:'Exo 2',sans-serif;font-size:12.5px;font-weight:700;
  cursor:pointer;border-radius:var(--radius);white-space:nowrap;
  transition:all .15s;display:flex;align-items:center;gap:6px;
}
.btn-primary:hover{background:#c98aff;transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}

.filters-toggle-btn{display:none;}

.years-row-outer{
  display:flex;align-items:center;justify-content:center;gap:16px;
  padding:6px 0 14px; flex-wrap:wrap;
}
.years-row{
  display:flex;align-items:center;justify-content:flex-start;gap:4px;flex-wrap:nowrap;
  flex:0 1 auto;min-width:0; overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:thin; scrollbar-color:var(--gold-dim) transparent;
  scroll-snap-type:x mandatory;
}
.years-row::-webkit-scrollbar{height:4px;}
.years-row::-webkit-scrollbar-track{background:transparent;}
.years-row::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:var(--radius-pill);}
.years-label{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;margin-right:6px;flex-shrink:0;}
.year-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:var(--radius);
  color:var(--text-dim);cursor:pointer;
  font-size:12px;font-weight:600;
  scroll-snap-align:center;
  border:1px solid transparent;
  transition:all .15s;
  flex-shrink:0;
}
.year-chip:hover{color:var(--text);background:var(--surface-2);}
.year-chip.active{color:var(--gold);background:var(--gold-soft);border-color:var(--gold-ring);}
.year-chip .n{color:var(--text-faint);font-weight:500;}
.year-chip.active .n{color:var(--gold-dim);}

/* ══════════════ MAIN ══════════════ */
.main{max-width:1320px;margin:0 auto;padding:28px 32px 80px;container-type:inline-size;}

.year-section{margin-bottom:36px;}
.year-head{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;user-select:none;
  padding-bottom:12px;margin-bottom:20px;
  border-bottom:1px solid var(--border-soft);
}
.year-head:hover .year-title{color:var(--gold);}
.year-chevron{
  font-size:10px;color:var(--text-faint);
  transition:transform .2s;flex-shrink:0;
}
.year-head.collapsed .year-chevron{transform:rotate(-90deg);}
.year-head.collapsed{margin-bottom:0;border-bottom-color:transparent;}
.year-title{
  font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:600;
  color:var(--text);transition:color .15s;
}
.year-count{
  font-size:11px;color:var(--text-faint);font-weight:600;
  background:var(--surface-2);padding:2px 8px;border-radius:var(--radius-sm);
}
.year-body{overflow:hidden;}
.year-body.collapsed{display:none;}

.status-section{margin-bottom:22px;}
.status-section:last-child{margin-bottom:0;}
.status-head{
  display:flex;align-items:center;gap:8px;
  margin-bottom:11px;
}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.status-label{
  font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
}
.status-count{font-size:10.5px;color:var(--text-faint);font-weight:600;}
.status-head::after{content:'';flex:1;height:1px;background:var(--border-soft);margin-left:4px;}

.st-encours .status-dot{background:var(--blue);}
.st-encours .status-label{color:var(--blue);}
.st-fini .status-dot{background:var(--green);}
.st-fini .status-label{color:var(--green);}
.st-abandonne .status-dot{background:var(--red);}
.st-abandonne .status-label{color:var(--red);}
.st-sniikks .status-dot{background:var(--violet);}
.st-sniikks .status-label{color:var(--violet);}
.st-afaire .status-dot{background:#e8b84b;}
.st-afaire .status-label{color:#e8b84b;}

.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(126px,1fr));
  gap:12px;
}

.empty-state{padding:80px 20px;text-align:center;color:var(--text-faint);font-size:13px;}

/* ══════════════ GAME CARD ══════════════ */
.game-card{
  cursor:pointer;
  background:var(--surface-1);
  border:1px solid var(--border-soft);
  border-radius:8px;
  overflow:hidden;
  transition:transform .15s,border-color .15s,box-shadow .15s;
  position:relative;
}
.game-card:hover{
  transform:translateY(-3px);
  border-color:var(--gold-dim);
  box-shadow:0 12px 28px -8px rgba(0,0,0,.6),0 0 0 1px var(--violet-soft);
}
.card-thumb{position:relative;width:100%;aspect-ratio:16/9.4;background:var(--surface-2);overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.card-thumb-empty{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--text-faint);
}
.card-thumb-empty svg{width:26px;height:26px;opacity:.5;}

.card-note{
  position:absolute;top:6px;left:6px;
  font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
  padding:2px 6px;line-height:1.4;
  background:rgba(10,10,12,.82);backdrop-filter:blur(4px);
  border-radius:var(--radius-sm);
}
.card-plat{
  position:absolute;top:6px;right:6px;
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  background:rgba(10,10,12,.82);backdrop-filter:blur(4px);
  border-radius:var(--radius-sm);padding:3px;
}
.card-dlc-badge{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(232,184,75,.55);
  backdrop-filter:blur(4px);
  color:#0d0e14;font-size:9px;font-weight:800;
  text-align:center;padding:3px 0;letter-spacing:.08em;
  font-family:'Rajdhani',sans-serif;
}
.card-name{
  font-size:11px;font-weight:600;text-align:center;padding:4px 5px;
  line-height:1.2;color:var(--text-dim);
  overflow:hidden;
  height:38px;word-break:normal;overflow-wrap:break-word;
}

.cn-10{color:var(--violet)} .cn-89{color:var(--green)} .cn-67{color:#a9d977}
.cn-5{color:#e8c84b} .cn-34{color:#e8924b} .cn-12{color:var(--red)}

/* ══════════════ COMPACT VIEW (cartes réduites, même forme) ══════════════ */
body.compact-view .card-grid{
  grid-template-columns:repeat(auto-fill,minmax(92px,1fr));
  gap:8px;
}
body.compact-view .card-note{
  font-size:9.5px;padding:1px 5px;top:4px;left:4px;
}
body.compact-view .card-plat{
  width:15px;height:15px;top:4px;right:4px;
}
body.compact-view .card-dlc-badge{
  font-size:8px;padding:2px 0;
}
body.compact-view .card-name{
  font-size:10px;padding:3px 4px;height:39px;line-height:1.2;
}

/* ══════════════ INFO MODAL ══════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(6,6,8,.78);backdrop-filter:blur(6px);
  z-index:200;align-items:center;justify-content:center;
  padding:20px;
}
.overlay.open{display:flex;}

.info-modal{
  background:var(--surface-1);border:1px solid var(--border);
  width:min(440px,100%);max-height:88vh;overflow-y:auto;
  position:relative;border-radius:var(--radius-lg);
}
.info-hero{position:relative;width:100%;aspect-ratio:16/8;background:var(--surface-2);overflow:hidden;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
.info-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.info-hero-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-faint);}
.info-hero-empty svg{width:44px;height:44px;opacity:.4;}
.info-hero-fade{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 35%,rgba(10,10,12,.95) 100%);}
.info-hero-title{position:absolute;bottom:14px;left:20px;right:56px;}
.info-hero-title h2{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:600;color:#fff;line-height:1.25;}
.info-close{
  position:absolute;top:12px;right:12px;
  background:rgba(10,10,12,.7);border:1px solid rgba(255,255,255,.1);
  color:#fff;font-size:14px;width:30px;height:30px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-sm);transition:background .15s;z-index:5;
}
.info-close:hover{background:rgba(10,10,12,.95);}

.info-body{padding:18px 20px 22px;}
.info-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:13px;}
.info-row:last-of-type{margin-bottom:0;}
.info-label{color:var(--text-faint);min-width:78px;font-size:10px;letter-spacing:.06em;padding-top:3px;text-transform:uppercase;font-weight:600;flex-shrink:0;}
.info-val{color:var(--text);flex:1;word-break:break-word;font-size:13px;}

.status-badge{font-size:10.5px;padding:4px 10px;border-radius:var(--radius-pill);white-space:nowrap;display:inline-block;font-weight:700;letter-spacing:.02em;}
.badge-afaire{color:#e8b84b;background:rgba(232,184,75,.10);}
.badge-encours{color:var(--blue);background:rgba(102,153,232,.12);}
.badge-fini{color:var(--green);background:rgba(95,191,134,.12);}
.badge-abandonne{color:var(--red);background:rgba(226,104,95,.12);}
.badge-sniikks{color:var(--violet);background:var(--violet-soft);}

.stars-wrap{display:inline-flex;align-items:center;gap:1px;}
.star-w{position:relative;width:13px;height:14px;font-size:13px;line-height:1;flex-shrink:0;display:inline-block;}
.s-bg{color:var(--border);position:absolute;left:0;top:0;user-select:none;}
.s-fill{position:absolute;left:0;top:0;overflow:hidden;white-space:nowrap;user-select:none;}
.s-fill.half{width:50%;}
.s-fill.full{width:100%;}
.note-val{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;margin-left:8px;}

.note-perso-box{
  background:var(--surface-2);border-left:2px solid var(--gold-dim);
  padding:10px 13px;font-size:12.5px;color:var(--text-dim);
  font-style:italic;white-space:pre-wrap;border-radius:var(--radius);
}

.info-actions{display:flex;gap:8px;margin-top:20px;}

/* ══════════════ BUTTONS (shared) ══════════════ */
.btn{
  flex:1;padding:10px;font-family:'Exo 2',sans-serif;font-size:12.5px;font-weight:700;
  cursor:pointer;border-radius:var(--radius);transition:all .15s;
  border:1px solid var(--border);background:transparent;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn:hover{color:var(--text);border-color:var(--text-faint);background:var(--surface-2);}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#0d0e14;}
.btn-gold:hover{background:#c98aff;border-color:#c98aff;color:#0d0e14;}
.btn-danger-ghost{border-color:rgba(226,104,95,.3);color:rgba(226,104,95,.85);}
.btn-danger-ghost:hover{color:var(--red);border-color:var(--red);background:rgba(226,104,95,.08);}

/* ══════════════ FORM MODAL ══════════════ */
.form-modal{
  background:var(--surface-1);border:1px solid var(--border);
  padding:26px 28px;width:480px;max-width:100%;border-radius:var(--radius-lg);
  box-shadow:0 30px 70px -20px rgba(0,0,0,.7);max-height:90vh;overflow-y:auto;
}
.form-modal h2{
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--text);
  margin-bottom:22px;display:flex;align-items:center;gap:8px;
}
.form-modal h2::before{content:'';width:4px;height:14px;background:var(--gold);border-radius:var(--radius-sm);}
.form-modal label{display:block;font-size:10.5px;color:var(--text-faint);font-weight:700;letter-spacing:.05em;margin-bottom:7px;text-transform:uppercase;}
.form-modal input,.form-modal select,.form-modal textarea{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);padding:10px 12px;font-family:'Exo 2',sans-serif;font-size:13.5px;
  outline:none;margin-bottom:16px;appearance:none;border-radius:var(--radius);
  transition:border-color .15s,background .15s;
}
.form-modal input:focus,.form-modal select:focus,.form-modal textarea:focus{border-color:var(--gold-dim);background:var(--surface-3);box-shadow:0 0 0 3px var(--violet-soft);}
.form-row{display:flex;gap:12px;}
.form-col{flex:1;display:flex;flex-direction:column;}
.form-col-sm{flex:0 0 110px;}

.url-hint{font-size:11px;color:var(--text-faint);margin-top:-9px;margin-bottom:14px;}
.url-detect{font-size:11px;color:var(--gold);margin-top:-9px;margin-bottom:14px;display:none;font-weight:600;}
.img-preview-wrap{margin-bottom:16px;display:none;}
.img-preview-wrap img{width:130px;height:60px;object-fit:cover;border:1px solid var(--border);display:block;border-radius:var(--radius);}

.slider-wrap{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.slider{
  -webkit-appearance:none;appearance:none;flex:1;height:6px;outline:none;cursor:pointer;
  background:var(--surface-3);border-radius:var(--radius-pill);
}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:6px;height:6px;border-radius:50%;background:transparent;cursor:pointer;}
.slider::-moz-range-thumb{width:6px;height:6px;border-radius:50%;background:transparent;cursor:pointer;border:none;}
.slider-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;min-width:42px;text-align:right;line-height:1;}

.form-actions{display:flex;gap:10px;margin-top:6px;}

/* ══════════════ CUSTOM SELECT ══════════════ */
.cselect{position:relative;width:100%;margin-bottom:16px;}
.cselect-trigger{
  width:100%;background:var(--surface-2);border:1px solid var(--border);
  color:var(--text);padding:10px 12px;font-family:'Exo 2',sans-serif;font-size:13.5px;
  border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  box-sizing:border-box;transition:border-color .15s;user-select:none;
}
.cselect-trigger:hover,.cselect.open .cselect-trigger{border-color:var(--gold-dim);}
.cselect-arrow{font-size:9px;opacity:.5;transition:transform .2s;}
.cselect.open .cselect-arrow{transform:rotate(180deg);}
.cselect-dropdown{
  display:none;position:absolute;top:calc(100% + 5px);left:0;right:0;
  background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;z-index:400;box-shadow:0 12px 30px rgba(0,0,0,.6);
}
.cselect.open .cselect-dropdown{display:block;}
.cselect-option{padding:10px 12px;font-size:13px;cursor:pointer;color:var(--text);transition:background .1s;}
.cselect-option:hover{background:var(--surface-3);}
.cselect-option.selected{color:var(--gold);background:var(--gold-soft);}

/* ══════════════ CONFIRM DELETE ══════════════ */
.confirm-box{
  background:var(--surface-1);border:1px solid var(--border);
  padding:24px 26px;width:340px;max-width:100%;border-radius:var(--radius-lg);
  box-shadow:0 30px 70px -20px rgba(0,0,0,.7);
}
.confirm-box h2{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--red);margin-bottom:14px;}
.confirm-box p{font-size:13.5px;color:var(--text);margin-bottom:5px;}
.confirm-box p strong{color:#fff;}
.confirm-box small{font-size:11px;color:var(--text-faint);}
.confirm-actions{display:flex;gap:10px;margin-top:18px;}

/* ══════════════ TOAST ══════════════ */
#toastContainer{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  padding:11px 18px;border-radius:var(--radius);font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;
  box-shadow:0 16px 36px -8px rgba(0,0,0,.6);
  opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s;
  display:flex;align-items:center;gap:8px;
}
.toast::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.toast.show{opacity:1;transform:translateY(0);}

/* ══════════════ RESPONSIVE ══════════════ */
@media (min-width:769px) and (max-width:1560px) and (min-height:600px){ .brand-row{padding-left:96px;} }
@media(max-width:760px){
  .topbar-inner{padding:0 18px;}
  .main{padding:20px 18px 70px;}
  .brand-row{padding:14px 0;}
  .toolbar{justify-content:flex-start;}
  .filter-pills{overflow-x:auto;flex-wrap:nowrap;max-width:100%;padding-bottom:2px;scroll-snap-type:x mandatory;}
}
/* ── Filtre "Années" repliable ──
   Sous 760px de large ou 430px de haut, la rangée des années est cachée
   par défaut et regroupée derrière un bouton "Filtres" pour libérer de
   la hauteur (utile aux forts niveaux de zoom). */
@media (max-width:760px), (max-height:430px) {
  .filters-toggle-btn{
    display:inline-flex; align-items:center; gap:5px; flex-shrink:0;
    padding:6px 10px; font-family:'Exo 2',sans-serif; font-size:11.5px; font-weight:600;
    border:1px solid var(--border); border-radius:var(--radius);
    background:var(--surface-1); color:var(--text-dim); cursor:pointer; white-space:nowrap;
    transition:all .15s;
  }
  .filters-toggle-btn:hover{color:var(--text);background:var(--surface-2);}
  .filters-toggle-btn.active{color:#0d0e14;background:var(--gold);border-color:var(--gold);}

  .years-row-outer{display:none;width:100%;}
  .topbar.filters-open .years-row-outer{display:flex;}
}
/* .card-grid s'adapte à la largeur de son conteneur (.main), pas à celle
   de l'écran — utile si la grille se retrouve un jour dans un panneau
   plus étroit que la page entière. */
@container (max-width:760px){
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(102px,1fr));gap:9px;}
}
@media(max-width:480px){
  .overlay{align-items:flex-end;padding:0;}
  .form-modal,.confirm-box{width:100%;max-width:100%;border-radius:var(--radius-lg);}
  .form-row{flex-direction:column;gap:0;}
  .info-modal{width:100%;max-width:100%;border-radius:var(--radius-lg);}
  .search-wrap,.search-input{width:100%;}
  .icon-group{flex-wrap:wrap;justify-content:center;}
  .btn-primary{width:100%;justify-content:center;}
}

  /* ── Mobile : évite le zoom automatique de Safari iOS au focus d'un champ ──
     iOS zoome la page dès qu'un input/select/textarea fait moins de 16px.
     On force 16px sur écran tactile étroit ; le reste du design est inchangé. */
  @media (max-width:760px){
    input, select, textarea { font-size:16px !important; }
  }

  'Fini':'Terminé','Abandonné':'Abandonné'
};

const STATUS_GROUPS = [
  {key:'A faire',  label:'À faire',  cssClass:'st-afaire'},
  {key:'En cours', label:'En cours', cssClass:'st-encours'},
  {key:'Fini',     label:'Terminés', cssClass:'st-fini'},
  {key:'Abandonné',label:'Abandonnés',cssClass:'st-abandonne'},
];

let games=[], currentFilter='Tous', searchQ='', editingId=null, yearFilter=null, infoId=null;
let resolvedImgSrc='', urlTimer=null;
let collapsedSections=new Set(JSON.parse(localStorage.getItem('backlog_collapsed_v1')||'[]'));
function toggleSection(key){
  if(collapsedSections.has(key)) collapsedSections.delete(key);
  else collapsedSections.add(key);
  localStorage.setItem('backlog_collapsed_v1', JSON.stringify([...collapsedSections]));
}

const STORAGE_KEY = 'backlog_cards_v1';
const STORAGE_TABLE = '369_games'; // table dédiée (ex-clé "backlog_cards_v1" dans app_data)

async function loadGames(){
  RemoteStore.setStatusElement(document.getElementById('dbStatus'));
  await RemoteStore.init([STORAGE_KEY], STORAGE_TABLE);
  const remote = RemoteStore.get(STORAGE_KEY, null);
  if(remote && Array.isArray(remote)){ games=remote; }
  else {
    // Rien en base : migration depuis un éventuel ancien localStorage, sinon jeu de données par défaut
    const old = localStorage.getItem(STORAGE_KEY);
    if(old){ try{ games = JSON.parse(old); }catch(e){ games = INITIAL_GAMES.map(g=>({...g})); } }
    else { games = INITIAL_GAMES.map(g=>({...g})); }
    saveGames();
  }
}
function saveGames(){ RemoteStore.set(STORAGE_KEY, games, STORAGE_TABLE); }
function genId(){ return Math.random().toString(36).substr(2,8); }

function extractSteamAppId(url){
  if(!url) return null;
  const m=url.match(/store\.steampowered\.com(?:\/agecheck)?\/app\/(\d+)/i);
  return m?m[1]:null;
}
function isDirectImageUrl(url){
  if(!url) return false;
  return !extractSteamAppId(url);
}
function buildSteamUrl(appId){
  return `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/header.jpg`;
}
function steamFallback(appId){
  return `https://cdn.akamai.steamstatic.com/steam/apps/${appId}/header.jpg`;
}
function getImgSrc(g){
  if(!g.steamId) return '';
  const appId=extractSteamAppId(g.steamId);
  if(appId) return buildSteamUrl(appId);
  return g.steamId;
}
function getFallbackSrc(g){
  const appId=extractSteamAppId(g.steamId);
  return appId?steamFallback(appId):'';
}
function extractSteamAppIdFromImage(url){
  if(!url) return null;
  const m=url.match(/steam\/apps\/(\d+)/i);
  return m?m[1]:null;
}
function getStorePageUrl(g){
  if(!g.steamId) return '';
  const appId=extractSteamAppId(g.steamId)||extractSteamAppIdFromImage(g.steamId);
  return appId?`https://store.steampowered.com/app/${appId}/`:g.steamId;
}
function safeUrl(url){ return (url||'').replace(/"/g,'%22'); }
function handleCardImgError(img){
  const fb=img.getAttribute('data-fallback');
  if(fb&&img.src!==fb){
    img.onerror=function(){ img.parentElement.innerHTML='<div class="card-thumb-empty">'+GAME_PLACEHOLDER_SVG+'</div>'; };
    img.src=fb;
  } else {
    img.parentElement.innerHTML='<div class="card-thumb-empty">'+GAME_PLACEHOLDER_SVG+'</div>';
  }
}
function handleInfoImgError(img){
  const fb=img.getAttribute('data-fallback');
  if(fb&&img.src!==fb){
    img.onerror=function(){ img.parentNode.innerHTML='<div class="info-hero-empty">'+GAME_PLACEHOLDER_SVG+'</div>'; };
    img.src=fb;
  } else {
    img.parentNode.innerHTML='<div class="info-hero-empty">'+GAME_PLACEHOLDER_SVG+'</div>';
  }
}

function onImgInput(){
  clearTimeout(urlTimer);
  const url=document.getElementById('inputSteamId').value.trim();
  const hint=document.getElementById('imgHint');
  const detect=document.getElementById('imgDetect');
  const wrap=document.getElementById('imgPreviewWrap');
  const prev=document.getElementById('imgPreview');
  resolvedImgSrc='';
  if(!url){hint.style.display='block';detect.style.display='none';wrap.style.display='none';return;}
  urlTimer=setTimeout(()=>{
    const appId=extractSteamAppId(url);
    if(appId){
      const imgUrl=buildSteamUrl(appId);
      resolvedImgSrc=imgUrl;
      prev.src=imgUrl;
      wrap.style.display='block';
      prev.onload=()=>{hint.style.display='none';detect.textContent='Image Steam détectée';detect.style.display='block';};
      prev.onerror=()=>{
        const fb=steamFallback(appId);
        resolvedImgSrc=fb;prev.src=fb;
        prev.onload=()=>{hint.style.display='none';detect.textContent='Image Steam (fallback)';detect.style.display='block';};
        prev.onerror=()=>{detect.textContent='Image non chargée — colle une URL directe (.jpg/.png)';detect.style.display='block';hint.style.display='none';};
      };
      const nameField=document.getElementById('inputTitle');
      if(!nameField.value.trim()){
        fetch(`/api/steam?appid=${appId}`)
          .then(r=>r.json())
          .then(data=>{
            if(data&&data.name&&!nameField.value.trim()){
              nameField.value=data.name;
            }
          })
          .catch(()=>{
            // Repli si l'API est indisponible : titre approximatif déduit de l'URL
            // (ponctuation type . , ; : ! - ( ) = déjà absente du slug, donc titre imparfait)
            const parts=url.split('/').filter(Boolean);
            const slug=parts[parts.length-1];
            if(slug&&isNaN(slug)&&!nameField.value.trim()){
              let name=slug;
              try{name=decodeURIComponent(slug);}catch(e){}
              name=name.replace(/_/g,' ').replace(/(?:^|\s)\S/g,c=>c.toUpperCase());
              nameField.value=name;
            }
          });
      }
    } else {
      resolvedImgSrc=url;
      prev.src=url;
      wrap.style.display='block';
      hint.style.display='none';
      detect.style.display='none';
    }
  },350);
}
function resetImgField(){
  document.getElementById('inputSteamId').value='';
  document.getElementById('imgHint').style.display='block';
  document.getElementById('imgDetect').style.display='none';
  document.getElementById('imgPreviewWrap').style.display='none';
  document.getElementById('imgPreview').src='';
  resolvedImgSrc='';
}

function noteClass(n){
  if(n>=10) return 'note-10';
  if(n>=8)  return 'note-89';
  if(n>=6)  return 'note-67';
  if(n>=5)  return 'note-5';
  if(n>=3)  return 'note-34';
  return 'note-12';
}
function noteColor(n){
  if(n>=10) return '#a78bfa';
  if(n>=8)  return '#5fbf86';
  if(n>=6)  return '#a9d977';
  if(n>=5)  return '#e8c84b';
  if(n>=3)  return '#e8924b';
  return '#e2685f';
}
function noteCardClass(n){
  if(!n||n<=0) return '';
  return noteClass(n).replace('note-','cn-');
}
function renderStarsHtml(note){
  if(!note||note<=0) return '<span style="color:var(--text-faint)">Pas de note</span>';
  const color=noteColor(note);
  let html=`<span class="stars-wrap">`;
  for(let i=1;i<=10;i++){
    const fill=note>=i?'full':(note>=i-.5?'half':'');
    html+=`<span class="star-w"><span class="s-bg">★</span>${fill?`<span class="s-fill ${fill}" style="color:${color}">★</span>`:''}</span>`;
  }
  html+=`<span class="note-val" style="color:${color}">${note}</span></span>`;
  return html;
}

function cardHtml(g){
  const src=getImgSrc(g);
  const fb=getFallbackSrc(g);
  const nc=noteCardClass(g.note);
  const noteLabel=(g.note!=null&&g.note>0)?`<span class="card-note ${nc}">${g.note}</span>`:'';
  const supportBadge=g.support?`<span class="card-dlc-badge">${g.support}</span>`:'';
  const platLabel=g.platform==='Pirate'
    ?`<span class="card-plat" style="color:#c9c5b8">${PIRATE_SVG}</span>`
    :`<span class="card-plat" style="color:#c9c5b8">${STEAM_SVG}</span>`;
  const imgHtml=src
    ?`<img src="${safeUrl(src)}" alt="${esc(g.title)}" loading="lazy" data-fallback="${fb?safeUrl(fb):''}" onerror="handleCardImgError(this)">`
    :`<div class="card-thumb-empty">${GAME_PLACEHOLDER_SVG}</div>`;
  return `<div class="game-card" data-id="${g.id}" onclick="openInfo('${g.id}')" title="${esc(g.title)}">
    <div class="card-thumb">
      ${imgHtml}
      ${noteLabel}${platLabel}
      ${supportBadge}
    </div>
    <div class="card-name">${esc(g.title)}</div>
  </div>`;
}

function getFiltered(){
  let list=[...games];
  if(searchQ){ const q=searchQ.toLowerCase(); list=list.filter(g=>g.title.toLowerCase().includes(q)); }
  if(currentFilter==='A faire') list=list.filter(g=>g.status==='A faire');
  else if(currentFilter==='En cours') list=list.filter(g=>g.status==='En cours');
  else if(currentFilter==='Fini') list=list.filter(g=>g.status==='Fini');
  else if(currentFilter==='Abandonne') list=list.filter(g=>g.status==='Abandonné');
  if(yearFilter) list=list.filter(g=>String(g.dateFin)===yearFilter);
  return list;
}

function renderGlobalStats(){
  const total=games.length;
  const withNote=games.filter(g=>g.note!=null&&g.note>0);
  const avg=withNote.length?(withNote.reduce((s,g)=>s+g.note,0)/withNote.length).toFixed(1):'—';
  const fini=games.filter(g=>g.status==='Fini').length;
  document.getElementById('globalStats').innerHTML=`
    <div class="gstat"><span class="gstat-val accent">${avg}</span><span class="gstat-label">Note moy.</span></div>
  `;
}

function renderStats(){
  const base=yearFilter?games.filter(g=>String(g.dateFin)===yearFilter):games;
  const total=base.length;
  const counts={'Tous':total,'A faire':base.filter(g=>g.status==='A faire').length,'En cours':base.filter(g=>g.status==='En cours').length,'Fini':base.filter(g=>g.status==='Fini').length,'Abandonne':base.filter(g=>g.status==='Abandonné').length};
  const labels={'Tous':'Tous','A faire':'À faire','En cours':'En cours','Fini':'Terminés','Abandonne':'Abandonnés'};
  document.querySelectorAll('.pill[data-filter]').forEach(btn=>{
    const key=btn.dataset.filter;
    const n=counts[key];
    if(n!==undefined) btn.textContent=`${labels[key]} ${n}`;
  });

  const yearCount={};
  games.forEach(g=>{if(g.dateFin)yearCount[g.dateFin]=(yearCount[g.dateFin]||0)+1;});
  const sortedYears=Object.keys(yearCount).sort((a,b)=>b-a);
  if(sortedYears.length){
    const yearsHtml=sortedYears.map(y=>`<span class="year-chip${yearFilter===y?' active':''}" data-year="${y}">${y} <span class="n">${yearCount[y]}</span></span>`).join('');
    const allBtn=`<span class="year-chip${!yearFilter?' active':''}" data-year="">Toutes</span>`;
    document.getElementById('statsYears').innerHTML=`<span class="years-label">Années</span>${allBtn}${yearsHtml}`;
    document.querySelectorAll('.year-chip[data-year]').forEach(chip=>{
      chip.addEventListener('click',()=>{
        yearFilter=chip.dataset.year||null;
        document.querySelectorAll('.year-chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        renderGrid();renderStats();
      });
    });
  }
  renderGlobalStats();
}

function fitCardTitles(container){
  container.querySelectorAll('.card-name').forEach(el=>{
    const card=el.closest('.game-card');
    const g=card?games.find(x=>x.id===card.dataset.id):null;
    const full=g?g.title:el.textContent;
    el.textContent=full;
    if(el.scrollHeight<=el.clientHeight+1) return;
    const words=full.split(/\s+/);
    let shown=words.length-1;
    while(shown>=1){
      el.textContent=words.slice(0,shown).join(' ')+' ...';
      if(el.scrollHeight<=el.clientHeight+1) return;
      shown--;
    }
    el.textContent=(words[0]||full)+' ...';
  });
}

function renderGrid(){
  const filtered=getFiltered();
  const container=document.getElementById('mainContent');
  if(!filtered.length){container.innerHTML='<div class="empty-state">Aucun jeu trouvé.</div>';return;}

  const years=[...new Set(
    filtered.map(g=>g.dateFin||null)
  )].sort((a,b)=>{
    if(a===null&&b===null)return 0;if(a===null)return 1;if(b===null)return -1;return b-a;
  });

  let html='';
  for(const yr of years){
    const yGames=filtered.filter(g=>(g.dateFin||null)===yr);
    if(!yGames.length) continue;
    const yearKey=yr===null?'afaire':String(yr);
    const yearCollapsed=collapsedSections.has('y:'+yearKey);
    html+=`<div class="year-section"><div class="year-head${yearCollapsed?' collapsed':''}" data-toggle-year="${yearKey}"><span class="year-chevron">▾</span><span class="year-title">${yr===null?'À faire':yr}</span><span class="year-count">${yGames.length}</span></div><div class="year-body${yearCollapsed?' collapsed':''}">`;
    for(const grp of STATUS_GROUPS){
      const rows=yGames.filter(g=>g.status===grp.key).sort((a,b)=>{
        const na=a.note??-1,nb=b.note??-1;
        if(nb!==na)return nb-na;
        return(a.title||'').localeCompare(b.title||'');
      });
      if(!rows.length) continue;
      html+=`<div class="status-section ${grp.cssClass}"><div class="status-head"><span class="status-dot"></span><span class="status-label">${grp.label}</span><span class="status-count">${rows.length}</span></div><div class="card-grid">`;
      rows.forEach(g=>{html+=cardHtml(g);});
      html+=`</div></div>`;
    }
    html+=`</div></div>`;
  }
  container.innerHTML=html||'<div class="empty-state">Aucun jeu trouvé.</div>';
  fitCardTitles(container);

  container.querySelectorAll('[data-toggle-year]').forEach(el=>{
    el.addEventListener('click',()=>{
      const key='y:'+el.dataset.toggleYear;
      const body=el.nextElementSibling;
      toggleSection(key);
      el.classList.toggle('collapsed');
      body.classList.toggle('collapsed');
    });
  });
}

function openInfo(id){
  const g=games.find(x=>x.id===id);if(!g)return;
  infoId=id;
  const src=getImgSrc(g);
  const fb=getFallbackSrc(g);
  const imgWrap=document.getElementById('infoImgWrap');
  const noImgHtml=`<div class="info-hero-empty">${GAME_PLACEHOLDER_SVG}</div>`;
  if(src){
    imgWrap.innerHTML=`<div class="info-hero"><img src="${safeUrl(src)}" data-fallback="${fb?safeUrl(fb):''}" onerror="handleInfoImgError(this)"><div class="info-hero-fade"></div><div class="info-hero-title"><h2>${esc(g.title)}</h2></div></div>`;
  } else {
    imgWrap.innerHTML=`<div class="info-hero">${noImgHtml}<div class="info-hero-fade"></div><div class="info-hero-title"><h2>${esc(g.title)}</h2></div></div>`;
  }
  const bc=BADGE[g.status]||'badge-afaire';
  const lbl=LABEL[g.status]||g.status;
  const platHtml=g.platform==='Pirate'
    ?`<span style="display:inline-flex;align-items:center;gap:6px;color:#c9c5b8"><span style="display:inline-flex;width:15px;height:15px">${PIRATE_SVG}</span> Pirate</span>`
    :`<span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-flex;width:15px;height:15px;color:#c9c5b8">${STEAM_SVG}</span> Steam</span>`;
  const supportHtml=g.support?`<span style="background:rgba(185,103,255,.2);color:var(--gold);font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.05em">${g.support}</span>`:'—';
  document.getElementById('infoBody').innerHTML=`
    <div class="info-row"><span class="info-label">Statut</span><span class="info-val"><span class="status-badge ${bc}">${lbl}</span></span></div>
    <div class="info-row"><span class="info-label">Note</span><span class="info-val">${renderStarsHtml(g.note)}</span></div>
    <div class="info-row"><span class="info-label">Plateforme</span><span class="info-val">${platHtml}</span></div>
    <div class="info-row"><span class="info-label">Support</span><span class="info-val">${supportHtml}</span></div>
    ${g.dateFin?`<div class="info-row"><span class="info-label">Année</span><span class="info-val">${g.dateFin}</span></div>`:''}
    ${g.steamId?`<div class="info-row"><span class="info-label">Steam</span><span class="info-val"><a href="${safeUrl(getStorePageUrl(g))}" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;font-size:12px;font-weight:600">Voir sur Steam ↗</a></span></div>`:''}
    ${g.notePerso?`<div class="info-row" style="flex-direction:column;gap:6px"><span class="info-label">Note perso</span><div class="note-perso-box">${esc(g.notePerso)}</div></div>`:''}
    <div class="info-actions">
      <button class="btn" onclick="closeInfo()">Fermer</button>
      <button class="btn btn-danger-ghost" onclick="closeInfo();openConfirmDelete('${g.id}')">Supprimer</button>
      <button class="btn btn-gold" onclick="closeInfo();openEdit('${g.id}')">Modifier</button>
    </div>`;
  document.getElementById('infoOverlay').classList.add('open');
}
function closeInfo(){document.getElementById('infoOverlay').classList.remove('open');infoId=null;}

function noteColor2(n){return n>0?noteColor(n):'#5c647a';}
function updateSlider(v){
  const slider=document.getElementById('inputNote');
  const label=document.getElementById('modalNoteVal');
  const color=noteColor2(v);
  const pct=(v/10)*100;
  slider.style.background=v>0?`linear-gradient(to right,${color} ${pct}%,#1f2230 ${pct}%)`:'#1f2230';
  slider.style.setProperty('--sthumb',color);
  label.textContent=v>0?v:'—';label.style.color=v>0?color:'#5c647a';
  const preview=document.getElementById('modalStarsPreview');
  if(!preview)return;
  if(v<=0){preview.innerHTML='';return;}
  let html=`<div style="display:flex;gap:1px;align-items:center;">`;
  for(let i=1;i<=10;i++){
    const fill=v>=i?'full':(v>=i-.5?'half':'');
    html+=`<span style="position:relative;width:14px;height:15px;font-size:14px;line-height:1;display:inline-block;"><span style="color:#1f2230;position:absolute">★</span>${fill==='full'?`<span style="color:${color};position:absolute;overflow:hidden;width:100%">★</span>`:''}${fill==='half'?`<span style="color:${color};position:absolute;overflow:hidden;width:50%">★</span>`:''}</span>`;
  }
  html+=`<span style="font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;margin-left:8px;color:${color}">${v}</span></div>`;
  preview.innerHTML=html;
}

function openAdd(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Ajouter un jeu';
  document.getElementById('inputTitle').value='';
  document.getElementById('inputNote').value=0;
  document.getElementById('inputDate').value='';
  resetImgField();
  setCSelect('cselectStatus','inputStatus','cselectStatusLabel','A faire');
  setCSelect('cselectPlatform','inputPlatform','cselectPlatformLabel','Steam');
  setCSelect('cselectSupport','inputSupport','cselectSupportLabel','');
  updateSlider(0);
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('inputTitle').focus(),50);
}
function openEdit(id){
  const g=games.find(g=>g.id===id);if(!g)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Modifier un jeu';
  document.getElementById('inputTitle').value=g.title;
  const nv=g.note||0;
  document.getElementById('inputNote').value=nv;
  document.getElementById('inputDate').value=g.dateFin||'';
  resetImgField();
  const existingImg=g.steamId||'';
  if(existingImg){
    document.getElementById('inputSteamId').value=existingImg;
    resolvedImgSrc=existingImg;
    const prev=document.getElementById('imgPreview');
    const src=getImgSrc(g);
    prev.src=src||existingImg;
    document.getElementById('imgPreviewWrap').style.display='block';
    document.getElementById('imgHint').style.display='none';
    document.getElementById('imgDetect').textContent='Image Steam détectée';
    document.getElementById('imgDetect').style.display= src?'block':'none';
  }
  setCSelect('cselectStatus','inputStatus','cselectStatusLabel',g.status||'A faire');
  setCSelect('cselectPlatform','inputPlatform','cselectPlatformLabel',g.platform||'Steam');
  setCSelect('cselectSupport','inputSupport','cselectSupportLabel',g.support||'');
  updateSlider(nv);
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editingId=null;}
function confirmModal(){
  const title=document.getElementById('inputTitle').value.trim().toUpperCase();
  const status=document.getElementById('inputStatus').value;
  const noteRaw=parseFloat(document.getElementById('inputNote').value);
  const note=noteRaw>0?noteRaw:null;
  const dateFin=document.getElementById('inputDate').value.trim()||null;
  const rawSteamInput=document.getElementById('inputSteamId').value.trim();
  const steamId=(resolvedImgSrc||rawSteamInput)||null;
  const platform=document.getElementById('inputPlatform').value||'Steam';
  const support=document.getElementById('inputSupport').value||null;
  if(!title){alert('Le nom est requis.');return;}
  const dup=games.find(x=>x.id!==editingId && (
    x.title.trim().toUpperCase()===title ||
    (steamId && x.steamId && x.steamId.trim()===steamId.trim())
  ));
  if(dup){
    document.getElementById('dupMessage').innerHTML=`Doublon détecté : <strong>${escHtml(dup.title)}</strong> est déjà dans la liste (même nom ou même lien/image).`;
    document.getElementById('dupOverlay').classList.add('open');
    return;
  }
  const isEdit=!!editingId;const name=title;
  if(editingId){const g=games.find(g=>g.id===editingId);if(g){g.title=title;g.status=status;g.note=note;g.dateFin=dateFin;g.steamId=steamId;g.platform=platform;g.support=support||null;}}
  else{games.push({id:genId(),title,status,note,dateFin,steamId,notePerso:null,platform,support:support||null,addedAt:Date.now()});}
  saveGames();closeModal();renderGrid();renderStats();
  showToast(isEdit?'Modification de '+name:'Ajout de '+name);
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('btnAdd').addEventListener('click',openAdd);
document.getElementById('btnCancel').addEventListener('click',closeModal);
document.getElementById('btnConfirm').addEventListener('click',confirmModal);
document.getElementById('btnDupOk').addEventListener('click',()=>document.getElementById('dupOverlay').classList.remove('open'));
document.getElementById('infoClose').addEventListener('click',closeInfo);
document.getElementById('inputNote').addEventListener('input',e=>updateSlider(parseFloat(e.target.value)));
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQ=e.target.value.trim();
  document.getElementById('searchClear').classList.toggle('show',!!e.target.value);
  renderGrid();renderStats();
});
document.getElementById('searchClear').addEventListener('mousedown',e=>{
  e.preventDefault();
  const input=document.getElementById('searchInput');
  input.value='';searchQ='';
  document.getElementById('searchClear').classList.remove('show');
  renderGrid();renderStats();
  input.focus();
});

document.querySelectorAll('.pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    renderGrid();renderStats();
  });
});

document.getElementById('btnExportJSON').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(games,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backlog_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  showToast('Exportation du JSON');
});
document.getElementById('btnImportJSON').addEventListener('click',()=>document.getElementById('fileImport').click());
document.getElementById('fileImport').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{const imported=JSON.parse(ev.target.result);if(!Array.isArray(imported))throw new Error();
    if(confirm(`Importer ${imported.length} jeux ?`)){games=imported;saveGames();renderGrid();renderStats();showToast('Importation du JSON');}}
    catch{alert('Fichier JSON invalide.');}
  };reader.readAsText(file);e.target.value='';
});

function getAllSectionKeys(){
  const keys=[];
  document.querySelectorAll('[data-toggle-year]').forEach(el=>keys.push('y:'+el.dataset.toggleYear));
  return keys;
}
document.getElementById('btnCollapseAll').addEventListener('click',()=>{
  getAllSectionKeys().forEach(k=>collapsedSections.add(k));
  localStorage.setItem('backlog_collapsed_v1', JSON.stringify([...collapsedSections]));
  renderGrid();
});
document.getElementById('btnExpandAll').addEventListener('click',()=>{
  getAllSectionKeys().forEach(k=>collapsedSections.delete(k));
  localStorage.setItem('backlog_collapsed_v1', JSON.stringify([...collapsedSections]));
  renderGrid();
});

function applyCompactState(on){
  document.body.classList.toggle('compact-view',on);
  const btn=document.getElementById('btnCompactToggle');
  btn.classList.toggle('active',on);
  btn.title=on?'Vue normale':'Vue compacte';
}
let compactView=localStorage.getItem('backlog_compact_v1')==='1';
applyCompactState(compactView);
document.getElementById('btnCompactToggle').addEventListener('click',()=>{
  compactView=!compactView;
  localStorage.setItem('backlog_compact_v1',compactView?'1':'0');
  applyCompactState(compactView);
  fitCardTitles(document.getElementById('mainContent'));
});

let resizeFitTimer=null;
window.addEventListener('resize',()=>{
  clearTimeout(resizeFitTimer);
  resizeFitTimer=setTimeout(()=>fitCardTitles(document.getElementById('mainContent')),150);
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeInfo();}
  if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('open'))confirmModal();
});

function initCSelect(cselectId,hiddenId,labelId){
  const wrap=document.getElementById(cselectId);
  const hidden=document.getElementById(hiddenId);
  const label=document.getElementById(labelId);
  const trigger=wrap.querySelector('.cselect-trigger');
  const options=wrap.querySelectorAll('.cselect-option');
  trigger.addEventListener('click',e=>{e.stopPropagation();document.querySelectorAll('.cselect.open').forEach(el=>{if(el!==wrap)el.classList.remove('open');});wrap.classList.toggle('open');});
  options.forEach(opt=>{opt.addEventListener('click',e=>{e.stopPropagation();hidden.value=opt.dataset.value;label.textContent=opt.textContent;options.forEach(o=>o.classList.remove('selected'));opt.classList.add('selected');wrap.classList.remove('open');});});
}
document.addEventListener('click',()=>document.querySelectorAll('.cselect.open').forEach(el=>el.classList.remove('open')));
initCSelect('cselectStatus','inputStatus','cselectStatusLabel');
initCSelect('cselectPlatform','inputPlatform','cselectPlatformLabel');
initCSelect('cselectSupport','inputSupport','cselectSupportLabel');
function setCSelect(cselectId,hiddenId,labelId,value){
  const wrap=document.getElementById(cselectId);const hidden=document.getElementById(hiddenId);const label=document.getElementById(labelId);
  const options=wrap.querySelectorAll('.cselect-option');
  hidden.value=value;
  options.forEach(opt=>{opt.classList.toggle('selected',opt.dataset.value===value);if(opt.dataset.value===value)label.textContent=opt.textContent;});
}

let pendingDeleteId=null;
function openConfirmDelete(id){const g=games.find(x=>x.id===id);if(!g)return;pendingDeleteId=id;document.getElementById('confirmDeleteName').textContent=g.title;document.getElementById('confirmDeleteOverlay').classList.add('open');}
document.getElementById('btnCancelDelete').addEventListener('click',()=>{pendingDeleteId=null;document.getElementById('confirmDeleteOverlay').classList.remove('open');});
document.getElementById('btnConfirmDelete').addEventListener('click',()=>{
  if(!pendingDeleteId)return;
  const g=games.find(x=>x.id===pendingDeleteId);const name=g?g.title:'';
  games=games.filter(x=>x.id!==pendingDeleteId);saveGames();renderGrid();renderStats();
  document.getElementById('confirmDeleteOverlay').classList.remove('open');
  pendingDeleteId=null;showToast('Suppression de '+name);
});

function showToast(msg){
  const container=document.getElementById('toastContainer');
  const toast=document.createElement('div');toast.className='toast';toast.textContent=msg;
  container.appendChild(toast);
  requestAnimationFrame(()=>requestAnimationFrame(()=>toast.classList.add('show')));
  setTimeout(()=>{toast.classList.remove('show');setTimeout(()=>toast.remove(),300);},2500);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── HEADER FLOTTANT AU SCROLL + FILTRE "ANNÉES" REPLIABLE ──
(function(){
  const header=document.querySelector('.topbar');
  const btn=document.getElementById('filtersToggleBtn');
  if(!header) return;
  const compactMQ = window.matchMedia('(max-width:760px), (max-height:430px)');
  let lastY = window.scrollY;

  function onScroll(){
    const y = window.scrollY;
    if(compactMQ.matches && y>lastY && y>80){
      header.classList.add('header-hidden');
    } else {
      header.classList.remove('header-hidden');
    }
    lastY = y;
  }
  window.addEventListener('scroll',onScroll,{passive:true});

  if(btn){
    btn.addEventListener('click',()=>{
      const open=header.classList.toggle('filters-open');
      btn.classList.toggle('active',open);
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      // Ouvrir/fermer le panneau change la hauteur du header, ce qui peut
      // provoquer un léger réajustement automatique du scroll par le
      // navigateur. On resynchronise notre référence une fois la mise en
      // page stabilisée, pour ne pas le confondre avec un scroll volontaire.
      requestAnimationFrame(()=>requestAnimationFrame(()=>{ lastY = window.scrollY; }));
    });
  }
})();

loadGames().then(()=>{
  renderStats();
  renderGrid();

  // ── Synchro temps réel ──
  // Si l'autre modifie la liste depuis son appareil, on met à jour l'affichage
  // instantanément au lieu d'attendre un rechargement de page (évite aussi
  // d'écraser ses changements en sauvegardant par-dessus un vieux cache).
  RemoteStore.subscribe(STORAGE_KEY, data => {
    if(!Array.isArray(data)) return;
    // Ne pas interrompre une édition en cours (modale ou menu déroulant ouvert)
    if(document.querySelector('.overlay.open, .cselect.open')) return;
    games = data;
    renderStats();
    renderGrid();
  }, STORAGE_TABLE);
});
