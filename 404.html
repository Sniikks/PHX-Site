<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Page introuvable</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  :root {
    --bg:#0d0e14; --bg2:#12141d;
    --gold:#00f0ff; --gold2:#00c4cc; --gold-dim:#0097a7;
    --text:#f0f1f5; --text2:#939ab0;
    --border:#2a2d3a;
  }
  body {
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(0,240,255,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:2rem 1.2rem; text-align:center;
  }
  .code {
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(4rem,15vw,7rem);
    font-weight:700;
    color:var(--gold);
    letter-spacing:.08em;
    line-height:1;
  }
  .msg { font-size:1rem; color:var(--text); margin-top:1rem; }
  .sub { font-size:.85rem; color:var(--text2); margin-top:.4rem; max-width:420px; }
  a.home {
    display:inline-block; margin-top:2rem;
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.85rem; letter-spacing:.04em;
    color:var(--gold); text-decoration:none;
    border:1px solid var(--gold-dim); border-radius:3px;
    padding:.75rem 1.6rem;
    transition:background .2s ease, color .2s ease;
  }
  a.home:hover { background:var(--gold); color:#151510; }
</style>
<link rel="stylesheet" href="cyber-theme.css">
</head>
<body>
  <div class="code">404</div>
  <div class="msg">Cette page n'existe pas (ou plus).</div>
  <div class="sub">Le lien est peut-être erroné, ou la page a été déplacée.</div>
  <a class="home" href="/index.html">← Retour à l'accueil</a>
</body>
</html>
