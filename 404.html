<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - Page introuvable</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0c; --bg2:#111114;
    --gold:#ff3e7f; --gold2:#d13068; --gold-dim:#7a2140;
    --text:#ededf0; --text2:#8c8c94;
    --border:#232327;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(232,184,75,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:2rem 1.2rem; text-align:center;
  }
  .code {
    font-family:'Unbounded',sans-serif;
    font-size:clamp(4rem,15vw,7rem);
    font-weight:700;
    color:var(--gold);
    letter-spacing:.08em;
    line-height:1;
  }
  .msg { font-size:1rem; color:var(--text); margin-top:1rem; }
  .sub { font-size:.85rem; color:var(--text2); margin-top:.4rem; max-width:420px; }
  a.home {
    display:inline-block; margin-top:2rem;
    font-family:'Unbounded',sans-serif; font-weight:700; font-size:.85rem; letter-spacing:.04em;
    color:var(--gold); text-decoration:none;
    border:1px solid var(--gold-dim); border-radius:10px;
    padding:.75rem 1.6rem;
    transition:background .2s ease, color .2s ease;
  }
  a.home:hover { background:var(--gold); color:#151510; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }

  /* --- ambiance PHX (identite visuelle homogene avec l'accueil) --- */
  html { overflow-x:clip; }
  .bg-blob { position:fixed; z-index:-2; border-radius:50%; filter:blur(90px); opacity:.28; pointer-events:none; }
  .bg-blob.b1 { width:42vmax; height:42vmax; top:-14vmax; left:-10vmax; background:#ff3e7f; animation:phxFloat1 24s ease-in-out infinite alternate; }
  .bg-blob.b2 { width:36vmax; height:36vmax; bottom:-15vmax; right:-9vmax; background:#2fe8c9; animation:phxFloat2 28s ease-in-out infinite alternate; }
  @keyframes phxFloat1 { from{transform:translate(0,0);} to{transform:translate(3vmax,4vmax);} }
  @keyframes phxFloat2 { from{transform:translate(0,0);} to{transform:translate(-3vmax,-3vmax);} }
  .bg-grain { position:fixed; inset:-10%; z-index:-1; pointer-events:none; opacity:.045; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  .bg-scan { position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent 3px); opacity:.4; }
  @media (max-width:640px){ .bg-blob{ filter:blur(60px); opacity:.22; } .bg-blob.b1{width:70vmax;height:70vmax;} .bg-blob.b2{width:60vmax;height:60vmax;} }
  @media (prefers-reduced-motion:reduce){ .bg-blob{ animation:none !important; } }
</style>
</head>
<body>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-grain"></div>
  <div class="bg-scan"></div>

  <div class="code">404</div>
  <div class="msg">Cette page n'existe pas (ou plus).</div>
  <div class="sub">Le lien est peut-être erroné, ou la page a été déplacée.</div>
  <a class="home" href="/index.html">← Retour à l'accueil</a>
</body>
</html>
