<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHX - 🧩 Pixels</title>
<meta name="description" content="Devine le jeu vidéo derrière l'image en grille mosaïque avant de perdre tes 3 vies.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  :root {
    --bg:#0d0e14; --bg2:#12141d; --bg3:#181a25;
    --gold:#00f0ff; --gold2:#00c4cc; --gold-dim:#0097a7;
    --text:#f0f1f5; --text2:#939ab0;
    --border:#2a2d3a;
    --good:#5fbf86; --bad:#e2685f; --warn:#e0b84a;
  }
  html, body { min-height:100%; }
  body {
    background:
      radial-gradient(1200px 600px at 50% -200px, rgba(0,240,255,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:1.6rem 1.2rem 3rem;
    padding-left:max(1.2rem, env(safe-area-inset-left));
    padding-right:max(1.2rem, env(safe-area-inset-right));
  }

  /* .menu-btn : styles partagés dans theme.css, ici juste le positionnement propre à cette page */
  .menu-btn { align-self:flex-start; margin-bottom:1rem; }

  .title { font-family:'Rajdhani',sans-serif; font-size:clamp(1.3rem,4vw,1.9rem); font-weight:700; line-height:1.15; letter-spacing:.1em; color:var(--gold); text-transform:uppercase; }
  .subtitle { color:var(--text2); font-size:12.5px; margin-top:.35rem; margin-bottom:1.2rem; letter-spacing:.03em; text-align:center; }

  #loading { color:var(--text2); font-size:13px; margin-top:2rem; text-align:center; max-width:320px; }
  #game { display:none; width:100%; max-width:740px; }

  .game-layout { display:flex; gap:1.2rem; align-items:flex-start; width:100%; }
  .game-left { flex:1 1 auto; min-width:0; }
  .game-right { flex:0 0 250px; display:flex; flex-direction:column; gap:.6rem; }
  @media (max-width:760px) {
    .game-layout { flex-direction:column; }
    .game-right { flex:1 1 auto; width:100%; }
  }

  .status-box {
    display:none; background:var(--bg2); border:1px solid var(--border); border-radius:10px;
    padding:.8rem .9rem; text-align:center;
  }
  .status-box .status-name { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.05rem; color:var(--gold); margin-bottom:.25rem; }
  .status-box .status-verdict { font-size:.82rem; color:var(--text2); }
  .status-box.win .status-verdict { color:var(--good); }
  .status-box.lose .status-verdict { color:var(--bad); }

  .attempts-tabs { display:flex; gap:.35rem; margin-top:.7rem; }
  .attempt-tab {
    flex:1; padding:.5rem 0; text-align:center; border-radius:6px;
    background:var(--bg3); border:1px solid var(--border); color:var(--text2);
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.78rem;
  }
  .attempt-tab.current { border-color:var(--gold-dim); color:var(--gold); box-shadow:inset 0 -2px 0 var(--gold); }
  .attempt-tab.correct { background:rgba(95,191,134,.15); border-color:rgba(95,191,134,.4); color:var(--good); }
  .attempt-tab.wrong { background:rgba(226,104,95,.15); border-color:rgba(226,104,95,.35); color:var(--bad); }

  .canvas-wrap {
    position:relative; width:100%;
    background:var(--bg2); border:1px solid var(--border); border-radius:12px;
    overflow:hidden;
  }
  canvas { width:100%; height:100%; display:block; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }

  .lives { display:flex; gap:6px; font-size:1.2rem; }
  .lives span.lost { opacity:.25; filter:grayscale(1); }

  .level-box { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:.65rem .8rem; }
  .level-top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:.4rem; }
  .level-num { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.95rem; color:var(--gold); letter-spacing:.03em; }
  .level-hint { font-size:11px; color:var(--text2); }
  .level-track { width:100%; height:7px; background:var(--bg3); border:1px solid var(--border); border-radius:99px; overflow:hidden; }
  .level-bar { height:100%; background:var(--gold-dim); border-radius:99px; transition:width .3s ease; }
  .level-box.maxed .level-bar { background:var(--good); }

  .guess-row { display:flex; flex-direction:column; gap:.5rem; width:100%; }
  .input-wrap { position:relative; }
  #guessInput {
    width:100%; padding:.75rem .85rem; background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'Exo 2',sans-serif; font-size:14px; outline:none;
  }
  #guessInput:focus { border-color:var(--gold-dim); }
  .guess-buttons { display:flex; gap:.5rem; }
  #skipBtn, #submitBtn {
    flex:1; padding:.7rem 0; border-radius:8px; border:1px solid var(--border); background:var(--bg3);
    color:var(--text); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  #submitBtn { background:var(--gold-dim); color:#04262a; border-color:var(--gold-dim); }
  #skipBtn:hover, #submitBtn:hover { filter:brightness(1.1); }

  #continueBtn {
    display:none; width:100%; padding:.8rem;
    border-radius:8px; border:1px solid var(--gold-dim); background:var(--gold-dim);
    color:#04262a; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:.95rem; letter-spacing:.04em;
    cursor:pointer;
  }
  #continueBtn:hover { filter:brightness(1.1); }

  .suggestions {
    position:absolute; top:100%; left:0; right:0; margin-top:4px;
    background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    max-height:220px; overflow-y:auto; z-index:50; display:none;
  }
  .suggestions.open { display:block; }
  .suggestions div { padding:.55rem .8rem; font-size:13px; cursor:pointer; color:var(--text); border-bottom:1px solid var(--border); }
  .suggestions div:last-child { border-bottom:none; }
  .suggestions div:hover, .suggestions div.active { background:var(--bg3); color:var(--gold); }

  .history { display:flex; flex-direction:column; gap:5px; width:100%; }
  .history .h-item {
    display:flex; align-items:center; gap:.4rem; padding:.5rem .7rem;
    background:var(--bg3); border:1px solid var(--border); border-radius:6px; font-size:12.5px; color:var(--text2);
  }
  .history .h-item.wrong { color:var(--bad); border-color:rgba(226,104,95,.3); }
  .history .h-item.placeholder { color:var(--text2); font-style:italic; opacity:.6; }

  .msg-banner {
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    background:var(--bg3); border:1px solid var(--border); border-radius:8px;
    padding:.55rem 1.1rem; font-size:13px; font-weight:600; color:var(--text);
    z-index:800; opacity:0; pointer-events:none; transition:opacity .2s ease, top .2s ease;
    box-shadow:0 10px 26px rgba(0,0,0,.4);
  }
  .msg-banner.show { opacity:1; top:22px; }

  .result-modal { position:fixed; inset:0; background:rgba(0,0,0,.72); display:none; align-items:center; justify-content:center; z-index:900; padding:1.2rem; }
  .result-modal.open { display:flex; }
  .result-box { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:1.8rem; max-width:360px; width:100%; text-align:center; }
  .result-title { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.35rem; letter-spacing:.06em; margin-bottom:.9rem; }
  .result-title.over { color:var(--bad); }
  .result-stats { display:flex; justify-content:center; gap:1.6rem; margin-bottom:1.1rem; }
  .stat-num { font-family:'Rajdhani',sans-serif; font-size:1.5rem; font-weight:700; color:var(--text); }
  .stat-label { font-size:10px; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; }
  .result-actions { display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap; margin-top:.4rem; }
  .btn-io { padding:.6rem 1.1rem; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:12.5px; font-weight:600; cursor:pointer; }
  .btn-io:hover { border-color:var(--gold-dim); color:var(--gold); }
  .btn-io.primary { background:var(--gold-dim); color:#04262a; border-color:var(--gold-dim); }
</style>

<body>

<a class="menu-btn" href="index.html">☰ Menu</a>
<div class="title">🧩 Pixels</div>
<div class="subtitle">Devine le jeu avant qu'il soit trop tard — 5 essais par image, 3 vies</div>

<div id="loading">Chargement de la partie…</div>

<div id="game">
  <div class="game-layout">
    <div class="game-left">
      <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
      <div class="attempts-tabs" id="dots"></div>
    </div>

    <div class="game-right">
      <div class="status-box" id="statusBox">
        <div class="status-name" id="statusName"></div>
        <div class="status-verdict" id="statusVerdict"></div>
      </div>

      <div class="level-box" id="levelBox">
        <div class="level-top">
          <span class="level-num">Niveau <span id="levelNum">0</span></span>
          <span class="level-hint" id="levelHint"></span>
        </div>
        <div class="level-track"><div class="level-bar" id="levelBar"></div></div>
      </div>

      <div class="lives" id="lives"></div>

      <div class="guess-row">
        <div class="input-wrap">
          <input id="guessInput" type="text" placeholder="Nom du jeu…" autocomplete="off">
          <div class="suggestions" id="suggestions"></div>
        </div>
        <div class="guess-buttons">
          <button id="submitBtn">Valider</button>
          <button id="skipBtn">Passer</button>
        </div>
      </div>

      <button id="continueBtn">Jeu suivant →</button>

      <div class="history" id="history"></div>
    </div>
  </div>
</div>

<div class="msg-banner" id="banner"></div>

<div class="result-modal" id="resultModal">
  <div class="result-box">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-stats">
      <div><div class="stat-num" id="statScore">0</div><div class="stat-label">Série</div></div>
      <div><div class="stat-num" id="statBest">0</div><div class="stat-label">Record</div></div>
    </div>
    <div class="result-actions">
      <button class="btn-io primary" id="retryBtn">Rejouer</button>
      <button class="btn-io" id="closeResultBtn">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="nav.js"></script>
<script src="page-transitions.js" defer></script>
<script src="bg-animate.js" defer></script>
<script>
(function () {
  const MAX_LIVES = 3;
  const MAX_ATTEMPTS = 5;
  const GRID_COLS = 10;
  const LIFE_INTERVAL = 20; // doit rester identique à LIFE_INTERVAL côté /api/pixels-action.js
  // Fraction cumulée de cases révélées après 0,1,2,3,4,5 essais ratés.
  const REVEAL_SCHEDULE = [0.06, 0.18, 0.34, 0.52, 0.72, 1];

  let state = null;        // dernier état public reçu (pixels_game)
  let img = null;
  let cols = GRID_COLS, rows = 6;
  let cellColors = [];
  let revealed = [];
  let revealOrder = [];    // ordre de révélation des cases, déterministe par manche (partagé entre tous les joueurs)
  let submitting = false;
  let realtimeChannel = null;

  // PRNG seedé (mulberry32) : à seed identique, produit toujours la même
  // séquence. Utilisé pour que l'ordre de révélation des cases soit
  // identique pour tout le monde (basé sur le roundId partagé), au lieu
  // de Math.random() qui donnait un flou différent selon les joueurs.
  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function seedFromString(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = Math.imul(31, h) + str.charCodeAt(i) | 0; }
    return h;
  }
  function computeRevealOrder(total, roundId) {
    const order = Array.from({ length: total }, (_, i) => i);
    const rand = mulberry32(seedFromString(roundId));
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    return order;
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  canvas.addEventListener('dragstart', e => e.preventDefault());

  function showBanner(text, ms = 1600) {
    const b = document.getElementById('banner');
    b.textContent = text; b.classList.add('show');
    clearTimeout(showBanner._t);
    showBanner._t = setTimeout(() => b.classList.remove('show'), ms);
  }

  async function safeJson(res) {
    const text = await res.text();
    try { return JSON.parse(text); }
    catch (e) { throw new Error('Réponse serveur invalide (' + res.status + ')'); }
  }

  function renderLives() {
    const el = document.getElementById('lives');
    el.innerHTML = '';
    for (let i = 0; i < MAX_LIVES; i++) {
      const span = document.createElement('span');
      span.textContent = '❤️';
      if (i >= state.lives) span.classList.add('lost');
      el.appendChild(span);
    }
  }

  function renderLevel() {
    const box = document.getElementById('levelBox');
    const streak = state.streak || 0;
    const progress = streak % LIFE_INTERVAL;
    document.getElementById('levelNum').textContent = streak;

    if (state.lives >= MAX_LIVES) {
      box.classList.add('maxed');
      document.getElementById('levelHint').textContent = 'Vies au maximum ❤️';
      document.getElementById('levelBar').style.width = (progress === 0 ? 100 : (progress / LIFE_INTERVAL * 100)) + '%';
    } else {
      box.classList.remove('maxed');
      const remaining = LIFE_INTERVAL - progress;
      document.getElementById('levelHint').textContent = remaining + ' avant +1 vie ❤️';
      document.getElementById('levelBar').style.width = (progress / LIFE_INTERVAL * 100) + '%';
    }
  }

  function renderDots() {
    const el = document.getElementById('dots');
    el.innerHTML = '';
    const won = state.reveal && state.reveal.win;
    for (let i = 0; i < MAX_ATTEMPTS; i++) {
      const tab = document.createElement('div');
      tab.className = 'attempt-tab';
      tab.textContent = i + 1;
      if (won && i === state.attempt) tab.classList.add('correct');
      else if (i < state.attempt) tab.classList.add('wrong');
      else if (i === state.attempt) tab.classList.add('current');
      el.appendChild(tab);
    }
  }

  function renderHistoryList() {
    const el = document.getElementById('history');
    el.innerHTML = '';
    const guesses = state.guesses || [];
    for (let i = 0; i < MAX_ATTEMPTS; i++) {
      const entry = guesses[i];
      const div = document.createElement('div');
      if (entry) {
        div.className = 'h-item' + (entry.wrong ? ' wrong' : '');
        div.textContent = entry.text;
      } else {
        div.className = 'h-item placeholder';
        div.textContent = '» Passé';
      }
      el.appendChild(div);
    }
  }

  function showStatus() {
    const r = state.reveal;
    if (!r) { document.getElementById('statusBox').style.display = 'none'; return; }
    document.getElementById('statusName').textContent = r.name;
    document.getElementById('statusVerdict').textContent = r.verdict;
    document.getElementById('statusBox').className = 'status-box ' + (r.win ? 'win' : 'lose');
    document.getElementById('statusBox').style.display = 'block';
  }

  function setGuessControlsEnabled(enabled) {
    document.getElementById('guessInput').disabled = !enabled;
    document.getElementById('submitBtn').disabled = !enabled;
    document.getElementById('skipBtn').disabled = !enabled;
  }

  function loadImageEl(src) {
    return new Promise((resolve, reject) => {
      const im = new Image();
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = src;
    });
  }

  // Calcule la couleur moyenne de chaque case de la grille à partir d'un
  // rendu basse résolution de l'image (rapide, précis pour une moyenne).
  function computeCellColors() {
    const sampleW = 180;
    const sampleH = Math.max(1, Math.round(sampleW * img.height / img.width));
    const off = document.createElement('canvas');
    off.width = sampleW; off.height = sampleH;
    const octx = off.getContext('2d');
    octx.drawImage(img, 0, 0, sampleW, sampleH);
    const data = octx.getImageData(0, 0, sampleW, sampleH).data;

    const colors = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x0 = Math.floor(c / cols * sampleW), x1 = Math.floor((c + 1) / cols * sampleW);
        const y0 = Math.floor(r / rows * sampleH), y1 = Math.floor((r + 1) / rows * sampleH);
        let sr = 0, sg = 0, sb = 0, n = 0;
        for (let y = y0; y < y1; y++) {
          for (let x = x0; x < x1; x++) {
            const idx = (y * sampleW + x) * 4;
            sr += data[idx]; sg += data[idx + 1]; sb += data[idx + 2]; n++;
          }
        }
        n = Math.max(1, n);
        colors.push(`rgb(${Math.round(sr/n)},${Math.round(sg/n)},${Math.round(sb/n)})`);
      }
    }
    return colors;
  }

  function resizeCanvasToDisplay() {
    const wrap = document.querySelector('.canvas-wrap');
    wrap.style.aspectRatio = `${img.width} / ${img.height}`;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(wrap.clientWidth * dpr);
    canvas.height = Math.round(wrap.clientHeight * dpr);
  }

  function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    const cellW = w / cols, cellH = h / rows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const i = r * cols + c;
        const dx = c * cellW, dy = r * cellH;
        if (revealed[i]) {
          const sx = c / cols * img.width, sy = r / rows * img.height;
          const sw = img.width / cols, sh = img.height / rows;
          ctx.drawImage(img, sx, sy, sw, sh, dx, dy, cellW + 1, cellH + 1);
        } else {
          ctx.fillStyle = cellColors[i];
          ctx.fillRect(dx, dy, cellW + 1, cellH + 1);
        }
      }
    }
  }

  function revealToFraction(fraction) {
    const total = cols * rows;
    const targetCount = Math.round(total * fraction);
    // On recalcule entièrement à partir de l'ordre partagé (revealOrder) au
    // lieu de piocher aléatoirement : ainsi tous les joueurs révèlent
    // exactement les mêmes cases dans le même ordre pour la même manche.
    revealed = new Array(total).fill(false);
    for (let k = 0; k < targetCount && k < revealOrder.length; k++) {
      revealed[revealOrder[k]] = true;
    }
    draw();
  }

  function revealFractionForState() {
    if (state.reveal) return 1; // manche conclue : image entière visible
    return REVEAL_SCHEDULE[Math.min(state.attempt, REVEAL_SCHEDULE.length - 1)];
  }

  async function loadImageForRound(roundId) {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('loading').textContent = 'Chargement de l\'image…';
    document.getElementById('game').style.display = 'none';

    const res = await fetch('/api/pixels-image', { cache: 'no-store' });
    const data = await safeJson(res);
    if (!res.ok) throw new Error(data.error || 'Erreur serveur');
    img = await loadImageEl(data.image);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('game').style.display = 'block';

    rows = Math.max(5, Math.min(14, Math.round(GRID_COLS * img.height / img.width)));
    cols = GRID_COLS;
    resizeCanvasToDisplay();
    cellColors = computeCellColors();
    revealed = new Array(cols * rows).fill(false);
    revealOrder = computeRevealOrder(cols * rows, roundId);
  }

  // Applique un nouvel état public (venant du chargement initial, d'une
  // réponse d'action, OU du temps réel) — source de vérité unique, aucune
  // écriture locale : c'est ce qui garantit que tout le monde voit la
  // même chose, et qu'un simple rechargement de page ne génère rien.
  async function applyState(newState) {
    if (!newState || !newState.roundId) return;
    const roundChanged = !state || state.roundId !== newState.roundId;
    state = newState;

    if (roundChanged) {
      try { await loadImageForRound(state.roundId); }
      catch (e) { document.getElementById('loading').textContent = "Impossible de charger l'image (" + e.message + ")."; return; }
    }

    revealToFraction(revealFractionForState());
    renderLevel();
    renderLives();
    renderDots();
    renderHistoryList();
    showStatus();

    const roundOver = !!state.reveal;
    setGuessControlsEnabled(!roundOver && !state.gameOver);
    document.getElementById('continueBtn').style.display = (roundOver && !state.gameOver) ? 'block' : 'none';

    if (state.gameOver) {
      showGameOverModal();
    } else {
      document.getElementById('resultModal').classList.remove('open');
    }
  }

  function showGameOverModal() {
    const statsKey = 'pixels_stats';
    let s = {};
    try { s = JSON.parse(localStorage.getItem(statsKey)) || {}; } catch (e) {}
    s.best = Math.max(s.best || 0, state.streak);
    localStorage.setItem(statsKey, JSON.stringify(s));

    document.getElementById('resultTitle').textContent = '💀 Partie terminée';
    document.getElementById('resultTitle').className = 'result-title over';
    document.getElementById('statScore').textContent = state.streak;
    document.getElementById('statBest').textContent = s.best;
    document.getElementById('resultModal').classList.add('open');
  }

  async function sendAction(action, extra) {
    if (submitting) return;
    submitting = true;
    setGuessControlsEnabled(false);
    document.getElementById('continueBtn').disabled = true;
    try {
      const res = await fetch('/api/pixels-action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...extra })
      });
      const data = await safeJson(res);
      if (!res.ok) {
        // Désynchro (ex : l'autre a déjà joué avant nous) : on se resynchronise
        // simplement sur l'état renvoyé plutôt que d'afficher une vraie erreur.
        if (data.state) { await applyState(data.state); }
        showBanner(data.error || 'Erreur serveur', 1800);
        return;
      }
      await applyState(data);
    } catch (e) {
      showBanner('Erreur réseau : ' + e.message, 1800);
    } finally {
      submitting = false;
      document.getElementById('continueBtn').disabled = false;
      if (state && !state.reveal && !state.gameOver) setGuessControlsEnabled(true);
    }
  }

  function handleGuess(guessText) {
    if (!state || state.reveal || state.gameOver || !guessText.trim()) return;
    sendAction('guess', { text: guessText.trim() });
    document.getElementById('guessInput').value = '';
    hideSuggestions();
  }
  function handleSkip() {
    if (!state || state.reveal || state.gameOver) return;
    sendAction('skip');
  }
  function handleContinue() {
    if (!state || !state.reveal || state.gameOver) return;
    sendAction('continue');
  }
  function handleRetry() {
    document.getElementById('resultModal').classList.remove('open');
    sendAction('retry');
  }

  // ── Autocomplétion (réutilise l'API existante du site) ──
  // Même système que ZoomJeu : debounce court (90ms), cache local par saisie
  // (retour instantané si on efface/retape), et annulation de la requête en
  // vol dès qu'une frappe plus récente arrive — sans ça, une réponse lente
  // sur une frappe antérieure pouvait arriver après et écraser la liste
  // à jour, donnant une impression de blocage/retard aléatoire.
  let activeSuggestions = [];
  let activeIndex = -1;
  let suggestTimer = null;
  let suggestAbortController = null;
  let suggestRequestId = 0;
  const suggestCache = new Map();
  const SUGGEST_CACHE_MAX = 80;

  function showSuggestions(query) {
    const q = query.trim();
    clearTimeout(suggestTimer);
    if (q.length < 2) {
      hideSuggestions();
      suggestRequestId++;
      if (suggestAbortController) { suggestAbortController.abort(); suggestAbortController = null; }
      return;
    }
    // Réponse instantanée si déjà en cache (pas de debounce à attendre).
    const cached = suggestCache.get(q.toLowerCase());
    if (cached) {
      suggestRequestId++;
      if (suggestAbortController) { suggestAbortController.abort(); suggestAbortController = null; }
      renderSuggestionsList(cached);
      return;
    }
    suggestTimer = setTimeout(() => fetchSuggestions(q), 90);
  }
  async function fetchSuggestions(q) {
    if (suggestAbortController) suggestAbortController.abort();
    const controller = new AbortController();
    suggestAbortController = controller;
    const reqId = ++suggestRequestId;
    try {
      const res = await fetch('/api/search-games?q=' + encodeURIComponent(q), { signal: controller.signal });
      const data = await res.json();
      const suggestions = (data.suggestions || []).slice(0, 8);
      if (suggestCache.size >= SUGGEST_CACHE_MAX) suggestCache.delete(suggestCache.keys().next().value);
      suggestCache.set(q.toLowerCase(), suggestions);
      if (reqId !== suggestRequestId) return; // une saisie plus récente a déjà pris le relais
      renderSuggestionsList(suggestions);
    } catch (e) {
      if (e.name === 'AbortError') return;
      if (reqId === suggestRequestId) hideSuggestions();
    }
  }
  function renderSuggestionsList(suggestions) {
    activeSuggestions = suggestions;
    activeIndex = -1;
    const box = document.getElementById('suggestions');
    if (!activeSuggestions.length) { hideSuggestions(); return; }
    box.innerHTML = '';
    activeSuggestions.forEach(g => {
      const div = document.createElement('div');
      div.textContent = g.year ? `${g.name} (${g.year})` : g.name;
      // On envoie directement le nom exact de la suggestion : ça garantit un
      // essai qui correspond mot pour mot à la réponse (via le nom officiel),
      // et valide la manche sans délai supplémentaire de saisie.
      div.addEventListener('click', () => handleGuess(g.name));
      box.appendChild(div);
    });
    box.classList.add('open');
  }
  function hideSuggestions() {
    document.getElementById('suggestions').classList.remove('open');
    activeSuggestions = []; activeIndex = -1;
  }

  document.getElementById('guessInput').addEventListener('input', e => showSuggestions(e.target.value));
  document.getElementById('guessInput').addEventListener('keydown', e => {
    const box = document.getElementById('suggestions');
    if (e.key === 'ArrowDown' && activeSuggestions.length) {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, activeSuggestions.length - 1);
      Array.from(box.children).forEach((c, i) => c.classList.toggle('active', i === activeIndex));
    } else if (e.key === 'ArrowUp' && activeSuggestions.length) {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      Array.from(box.children).forEach((c, i) => c.classList.toggle('active', i === activeIndex));
    } else if (e.key === 'Enter') {
      if (activeIndex >= 0 && activeSuggestions[activeIndex]) handleGuess(activeSuggestions[activeIndex].name);
      else handleGuess(e.target.value);
    } else if (e.key === 'Escape') hideSuggestions();
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('suggestions').contains(e.target) && e.target !== document.getElementById('guessInput')) hideSuggestions();
  });

  document.getElementById('submitBtn').addEventListener('click', () => handleGuess(document.getElementById('guessInput').value));
  document.getElementById('skipBtn').addEventListener('click', handleSkip);
  document.getElementById('continueBtn').addEventListener('click', handleContinue);
  document.getElementById('retryBtn').addEventListener('click', handleRetry);
  document.getElementById('closeResultBtn').addEventListener('click', () => document.getElementById('resultModal').classList.remove('open'));

  window.addEventListener('resize', () => { if (img && state) { resizeCanvasToDisplay(); draw(); } });

  function subscribeRealtime() {
    realtimeChannel = supabaseClient
      .channel('pixels_game')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'pixels_public', filter: 'id=eq.pixels_game' }, payload => {
        if (payload.new?.data?.roundId) applyState(payload.new.data);
      })
      .subscribe();
  }

  async function init() {
    try {
      const res = await fetch('/api/pixels-state', { cache: 'no-store' });
      const data = await safeJson(res);
      if (!res.ok) throw new Error(data.error || 'Erreur serveur');
      await applyState(data);
      subscribeRealtime();
    } catch (e) {
      document.getElementById('loading').textContent = "Impossible de charger la partie (" + e.message + "). Réessaie dans un instant.";
    }
  }

  init();
})();
</script>

</body>
</html>
